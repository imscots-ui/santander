      '<input id="fb-subject" placeholder="Subject..." style="font-size:13px">' +
      '<select id="fb-category" style="font-size:13px"><option>General</option><option>Stock Request</option><option>Issue / Problem</option><option>Other</option></select>' +
    '</div>' +
    '<textarea id="fb-message" rows="3" placeholder="Describe your note or request..." style="font-size:13px;margin-bottom:8px"></textarea>' +
    '<button class="btn btn-primary btn-sm" id="fb-submit">Submit Note</button>' +
    '<span id="fb-error" style="color:var(--red);font-size:12px;margin-left:10px"></span>' +
  '</div>';

  // Admin can also submit notes to themselves for record-keeping
  const adminView = (open.length > 0 ? '<div class="section-label">Open (' + open.length + ')</div>' + open.map(itemHTML).join('') : '<div class="alert alert-success" style="margin-bottom:16px">✓ No open notes.</div>') +
    (replied.length > 0 ? '<div class="section-label" style="margin-top:16px">Replied (' + replied.length + ')</div>' + replied.map(itemHTML).join('') : '') +
    (closed.length > 0 ? '<div class="section-label" style="margin-top:16px">Closed (' + closed.length + ')</div>' + closed.map(itemHTML).join('') : '');

  const staffView = submitForm +
    (items.length > 0 ? '<div class="section-label">Your Notes</div>' + items.map(itemHTML).join('') : '<div class="empty">No notes submitted yet.</div>');

  showModal(mHead('💬 NOTES & FEEDBACK') + '<div class="modal-body">' + (isAdmin ? adminView : staffView) + '</div>' +
    '<div class="modal-footer"><button class="btn btn-ghost" data-action="close">Close</button></div>', true);

  // Submit
  document.getElementById('fb-submit')?.addEventListener('click', async () => {
    const subject = document.getElementById('fb-subject').value.trim();
    const message = document.getElementById('fb-message').value.trim();
    const category = document.getElementById('fb-category').value;
    const err = document.getElementById('fb-error');
    if (!subject || !message) { if(err) err.textContent = 'Please fill in subject and message'; return; }
    try {
      await POST('/feedback/', { subject, message, category });
      openFeedback();
    } catch(e) { if(err) err.textContent = e.message; }
  });

  // Admin reply
  document.querySelectorAll('.feedback-reply-btn').forEach(btn => {
    btn.onclick = async () => {
      const reply = document.getElementById('reply-' + btn.dataset.id)?.value.trim();
      if (!reply) return;
      await PATCH('/feedback/' + btn.dataset.id + '/reply', { reply });
      refreshFeedbackBadge();
      openFeedback();
    };
  });

  // Close
  document.querySelectorAll('.feedback-close-btn').forEach(btn => {
    btn.onclick = async () => {
      await PATCH('/feedback/' + btn.dataset.id + '/close', {});
      refreshFeedbackBadge();
      openFeedback();
    };
  });

  refreshFeedbackBadge();
}

async function openBadgeTracker(startView=null, startCat=null) {
  const [cadets, allBadges] = await Promise.all([loadCadets(), GET('/badges/items')]);
  const activeCadets = cadets.filter(c => c.active);
  const badges = allBadges.filter(b => b.routine_stock || b.quantity > 0);

  const categories = ['Rank Slides', 'Misc', 'Classification', 'PTS'];
  const catIcons = { 'Rank Slides': '🎖️', 'Misc': '📌', 'Classification': '⭐', 'PTS': '🏅' };
  const catDesc = {
    'Rank Slides': 'Cadet & Staff Cadet rank slides (pairs)',
    'Misc': 'Squadron identifier, beret badge, TRF, lanyard',
    'Classification': '1st Class, Leading, Senior, Master',
    'PTS': 'Progressive Training Standard badges'
  };

  const RANK_ORDER = ['Corporal', 'Sergeant', 'Flight Sergeant', 'Cadet Warrant Officer',
    'Corporal – Staff Cadet', 'Sergeant – Staff Cadet', 'Flight Sergeant – Staff Cadet', 'Cadet Warrant Officer – Staff Cadet'];
  const CLASS_ORDER = ['1st Class', 'Leading', 'Senior', 'Master'];

  let selectedCat = startCat || null;
  let view = startView || 'home'; // 'home', 'stock', 'issue', 'cadet'
  let selectedCadet = null;
  let selectedBadge = null;

  function getCatBadges(cat) {
    let list = badges.filter(b => b.category === cat);
    if (cat === 'Rank Slides') list = list.sort((a, b) => RANK_ORDER.indexOf(a.name) - RANK_ORDER.indexOf(b.name));
    if (cat === 'Classification') list = list.sort((a, b) => CLASS_ORDER.indexOf(a.name) - CLASS_ORDER.indexOf(b.name));
    return list;
  }

  function catStockCount(cat) {
    return badges.filter(b => b.category === cat).reduce((s, b) => s + b.quantity, 0);
  }

  function homeHTML() {
    const tiles = categories.map(c => {
      const total = catStockCount(c);
      return '<button class="home-btn" data-cat-tile="' + c + '" style="padding:24px;text-align:center">' +
        '<div class="home-btn-icon" style="font-size:28px;width:56px;height:56px">' + catIcons[c] + '</div>' +
        '<div class="home-btn-label" style="font-size:18px">' + c + '</div>' +
        '<div class="home-btn-sub">' + catDesc[c] + '</div>' +
        '<div style="margin-top:8px;font-size:11px;font-family:var(--mono);color:' + (total > 0 ? 'var(--green)' : 'var(--text3)') + '">' + total + ' IN STOCK</div>' +
        '</button>';
    }).join('');

    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">' + tiles + '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">' +
      '<button class="btn btn-ghost" id="bt-cadet-view">👤 View Cadet Badges</button>' +
      '</div>';
  }

  function stockHTML() {
    const list = getCatBadges(selectedCat);
    if (selectedCat === 'PTS') {
      const disciplines = [...new Set(list.map(b => b.subcategory))];
      let rows = '';
      disciplines.forEach(disc => {
        const discBadges = list.filter(b => b.subcategory === disc);
        rows += '<tr><td colspan="3" style="background:var(--bg);font-weight:700;font-size:12px;font-family:var(--mono);color:var(--text2);padding:8px 12px;letter-spacing:0.06em">' + disc.toUpperCase() + '</td></tr>';
        discBadges.forEach(b => {
          const level = b.name.split(' – ').pop();
          const levelColor = level === 'Blue' ? '#1d4ed8' : level === 'Bronze' ? '#92400e' : level === 'Silver' ? '#374151' : '#854d0e';
          rows += '<tr><td style="padding-left:24px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + levelColor + ';margin-right:8px;vertical-align:middle"></span>' + level + '</td>';
          rows += '<td><span style="font-size:20px;font-weight:800;color:' + (b.quantity > 0 ? 'var(--green)' : 'var(--red)') + '">' + b.quantity + '</span></td>';
          rows += '<td><button class="btn btn-ghost btn-sm badge-add-stock" data-id="' + b.id + '" data-name="' + b.name + '">+ Add Stock</button></td></tr>';
        });
      });
      return '<div class="table-wrap"><table><thead><tr><th>Badge</th><th>Stock</th><th>Actions</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
    }
    if (selectedCat === 'Rank Slides') {
      const subcats = [...new Set(list.map(b => b.subcategory || 'Other'))];
      let rows = '';
      subcats.forEach(sub => {
        const subBadges = list.filter(b => (b.subcategory || 'Other') === sub);
        rows += '<tr><td colspan="3" style="background:var(--bg);font-weight:700;font-size:12px;font-family:var(--mono);color:var(--text2);padding:8px 12px;letter-spacing:0.06em">' + sub.toUpperCase() + '</td></tr>';
        subBadges.forEach(b => {
          rows += '<tr><td style="padding-left:24px"><strong>' + b.name.replace(' – Staff Cadet', '') + '</strong></td>';
          rows += '<td><span style="font-size:20px;font-weight:800;color:' + (b.quantity > 0 ? 'var(--green)' : 'var(--red)') + '">' + b.quantity + '</span></td>';
          rows += '<td><button class="btn btn-ghost btn-sm badge-add-stock" data-id="' + b.id + '" data-name="' + b.name + '">+ Add Stock</button></td></tr>';
        });
      });
      return '<div class="table-wrap"><table><thead><tr><th>Rank Slide (Pairs)</th><th>Stock</th><th>Actions</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
    }
    const rows = list.map(b => '<tr><td><strong>' + b.name + '</strong></td><td><span style="font-size:20px;font-weight:800;color:' + (b.quantity > 0 ? 'var(--green)' : 'var(--red)') + '">' + b.quantity + '</span></td><td><button class="btn btn-ghost btn-sm badge-add-stock" data-id="' + b.id + '" data-name="' + b.name + '">+ Add Stock</button></td></tr>').join('');
    return '<div class="table-wrap"><table><thead><tr><th>Badge</th><th>Stock</th><th>Actions</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
  }

  function issueHTML() {
    const list = getCatBadges(selectedCat);
    const catChips = categories.map(c => '<button class="chip' + (selectedCat === c ? ' active' : '') + '" data-cat="' + c + '">' + c + '</button>').join('');
    let badgeList = '';
    if (selectedCat === 'PTS') {
      const disciplines = [...new Set(list.map(b => b.subcategory))];
      disciplines.forEach(disc => {
        const discBadges = list.filter(b => b.subcategory === disc);
        badgeList += '<div style="font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:0.1em;margin:8px 0 4px;text-transform:uppercase">' + disc + '</div>';
        discBadges.forEach(b => {
          const level = b.name.split(' – ').pop();
          const sel = selectedBadge && selectedBadge.id === b.id ? ' selected' : '';
          const op = b.quantity < 1 ? 'style="opacity:0.4"' : '';
          badgeList += '<div class="cadet-item' + sel + '" data-badge-id="' + b.id + '" ' + op + '><div style="font-size:13px;font-weight:600">' + level + '</div><div style="font-size:11px;color:' + (b.quantity > 0 ? 'var(--green)' : 'var(--red)') + '">' + b.quantity + ' in stock</div></div>';
        });
      });
    } else if (selectedCat === 'Rank Slides') {
      const subcats = [...new Set(list.map(b => b.subcategory || 'Other'))];
      subcats.forEach(sub => {
        badgeList += '<div style="font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:0.1em;margin:8px 0 4px;text-transform:uppercase">' + sub + '</div>';
        list.filter(b => (b.subcategory || 'Other') === sub).forEach(b => {
          const sel = selectedBadge && selectedBadge.id === b.id ? ' selected' : '';
          const op = b.quantity < 1 ? 'style="opacity:0.4"' : '';
          badgeList += '<div class="cadet-item' + sel + '" data-badge-id="' + b.id + '" ' + op + '><div style="font-size:13px;font-weight:600">' + b.name.replace(' – Staff Cadet', '') + '</div><div style="font-size:11px;color:' + (b.quantity > 0 ? 'var(--green)' : 'var(--red)') + '">' + b.quantity + ' pairs</div></div>';
        });
      });
    } else {
      list.forEach(b => {
        const sel = selectedBadge && selectedBadge.id === b.id ? ' selected' : '';
        const op = b.quantity < 1 ? 'style="opacity:0.4"' : '';
        badgeList += '<div class="cadet-item' + sel + '" data-badge-id="' + b.id + '" ' + op + '><div style="font-size:13px;font-weight:600">' + b.name + '</div><div style="font-size:11px;color:' + (b.quantity > 0 ? 'var(--green)' : 'var(--red)') + '">' + b.quantity + ' in stock</div></div>';
      });
    }
    const cadetList = activeCadets.map(c => '<div class="cadet-item' + (selectedCadet && selectedCadet.id === c.id ? ' selected' : '') + '" data-cadet-id="' + c.id + '" style="padding:8px 12px"><div style="font-size:13px"><strong>' + c.surname + '</strong>, ' + c.forename + ' <span style="color:var(--text3)">' + c.rank + '</span></div><div style="font-size:11px;font-family:var(--mono);color:var(--text3)">' + c.service_number + '</div></div>').join('');
    const selectedInfo = selectedBadge ? '<div style="background:var(--blue-pale);border-radius:6px;padding:8px 12px;font-size:13px;margin-bottom:8px">Selected: <strong>' + selectedBadge.name + '</strong></div>' : '';
    const issueDisabled = (!selectedBadge || !selectedCadet) ? 'disabled' : '';
    return '<div id="badge-issue-error"></div>' +
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">' + catChips + '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">' +
        '<div><div class="section-label">Select Badge</div><div style="max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:4px">' + badgeList + '</div></div>' +
        '<div><div class="section-label">Select Cadet</div><input id="badge-cadet-search" placeholder="Search cadets..." style="margin-bottom:8px"><div style="max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:4px">' + cadetList + '</div></div>' +
      '</div>' +
      '<div style="margin-top:12px">' + selectedInfo + '<button class="btn btn-primary" id="badge-issue-confirm" ' + issueDisabled + '>Issue Badge to Cadet</button></div>';
  }

  function cadetViewHTML() {
    const cadetList = activeCadets.map(c => '<div class="cadet-item' + (selectedCadet && selectedCadet.id === c.id ? ' selected' : '') + '" data-cadet-id2="' + c.id + '" style="padding:8px 12px"><div style="font-size:13px"><strong>' + c.surname + '</strong>, ' + c.forename + ' <span style="color:var(--text3)">' + c.rank + '</span></div><div style="font-size:11px;font-family:var(--mono);color:var(--text3)">' + c.service_number + '</div></div>').join('');
    return '<div class="section-label">Select Cadet</div><input id="badge-cadet-search2" placeholder="Search cadets..." style="margin-bottom:8px"><div style="max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-bottom:16px">' + cadetList + '</div><div id="cadet-badge-history">' + (selectedCadet ? '<div class="loading-text">Select a cadet above</div>' : '<div class="empty">Select a cadet to view their badges</div>') + '</div>';
  }

  function render() {
    let header, body, footer, backBtn;

    if (view === 'home') {
      header = mHead('BADGE TRACKER');
      body = homeHTML();
      footer = '<button class="btn btn-ghost" data-action="close">Close</button>';
    } else if (view === 'stock') {
      header = mHead(catIcons[selectedCat] + ' ' + selectedCat);
      body = '<div style="display:flex;gap:8px;margin-bottom:16px">' +
        '<button class="btn btn-primary btn-sm" id="bv-stock">📦 Stock</button>' +
        '<button class="btn btn-ghost btn-sm" id="bv-issue">➕ Issue Badge</button>' +
        '</div>' + stockHTML();
      footer = '<button class="btn btn-ghost" id="bt-back">← Back</button>';
    } else if (view === 'issue') {
      header = mHead('ISSUE BADGE');
      body = issueHTML();
      footer = '<button class="btn btn-ghost" id="bt-back">← Back</button>';
    } else if (view === 'cadet') {
      header = mHead('CADET BADGES');
      body = cadetViewHTML();
      footer = '<button class="btn btn-ghost" id="bt-back">← Back</button>';
    }

    showModal(header + '<div class="modal-body">' + body + '</div><div class="modal-footer">' + footer + '</div>', true);

    // Home tile clicks
    document.querySelectorAll('[data-cat-tile]').forEach(btn => {
      btn.onclick = () => { selectedCat = btn.dataset.catTile; view = 'stock'; render(); };
    });
    document.getElementById('bt-cadet-view')?.addEventListener('click', () => { view = 'cadet'; render(); });
    document.getElementById('bt-back')?.addEventListener('click', () => {
      if (view === 'issue') { view = 'stock'; render(); }
      else { view = 'home'; selectedCat = null; render(); }
    });

    // Stock view tabs
    document.getElementById('bv-stock')?.addEventListener('click', () => { view = 'stock'; render(); });
    document.getElementById('bv-issue')?.addEventListener('click', () => { view = 'issue'; render(); });

    // Category chips in issue view
    document.querySelectorAll('.chip[data-cat]').forEach(chip => {
      chip.onclick = () => { selectedCat = chip.dataset.cat; selectedBadge = null; render(); };
    });

    // Add stock
    document.querySelectorAll('.badge-add-stock').forEach(btn => {
      btn.onclick = async () => {
        const qty = parseInt(prompt("Add stock for " + btn.dataset.name + " - how many to add?"));
        if (!qty || qty < 1) return;
        await PATCH('/badges/stock/' + btn.dataset.id, { quantity: qty });
        // Reload from server to get accurate quantities
        const fresh = await GET('/badges/items');
        allBadges.length = 0; fresh.forEach(b => allBadges.push(b));
        badges.length = 0; fresh.filter(b => b.routine_stock || b.quantity > 0).forEach(b => badges.push(b));
        render();
      };
    });

    // Badge select in issue view
    document.querySelectorAll('[data-badge-id]').forEach(el => {
      el.onclick = () => {
        const b = badges.find(b => b.id === parseInt(el.dataset.badgeId));
        if (!b || b.quantity < 1) { if (document.getElementById('badge-issue-error')) showError('badge-issue-error', 'No stock for this badge'); return; }
        selectedBadge = b; render();
      };
    });

    document.querySelectorAll('[data-cadet-id]').forEach(el => {
      el.onclick = () => { selectedCadet = activeCadets.find(c => c.id === parseInt(el.dataset.cadetId)); render(); };
    });

    document.getElementById('badge-cadet-search')?.addEventListener('input', e => {
      const s = e.target.value.toLowerCase();
      document.querySelectorAll('[data-cadet-id]').forEach(el => { el.style.display = el.textContent.toLowerCase().includes(s) ? '' : 'none'; });
    });

    document.getElementById('badge-issue-confirm')?.addEventListener('click', async () => {
      if (!selectedBadge || !selectedCadet) return;
      const btn = document.getElementById('badge-issue-confirm');
      btn.disabled = true; btn.textContent = 'Issuing...';
      try {
        await POST('/badges/issue', { badge_item_id: selectedBadge.id, cadet_id: selectedCadet.id });
        selectedBadge.quantity--;
        const abi = allBadges.find(b => b.id === selectedBadge.id);
        if (abi) abi.quantity--;
        const name = selectedBadge.name;
        const cadetName = selectedCadet.rank + ' ' + selectedCadet.surname;
        selectedBadge = null; selectedCadet = null;
        showModal(mHead('BADGE ISSUED') + '<div class="modal-body"><div class="alert alert-success">✓ ' + name + ' issued to ' + cadetName + '.</div></div>' +
          '<div class="modal-footer"><button class="btn btn-ghost" id="bi-back">Issue Another</button><button class="btn btn-primary" data-action="close">Done</button></div>');
        document.getElementById('bi-back').onclick = () => { view = 'issue'; render(); };
      } catch(e) { btn.disabled = false; btn.textContent = 'Issue Badge to Cadet'; showError('badge-issue-error', e.message); }
    });

    // Cadet view
    document.querySelectorAll('[data-cadet-id2]').forEach(el => {
      el.onclick = async () => {
        selectedCadet = activeCadets.find(c => c.id === parseInt(el.dataset.cadetId2));
        render();
        const issued = await GET('/badges/issued/cadet/' + selectedCadet.id);
        const el2 = document.getElementById('cadet-badge-history');
        if (!el2) return;
        if (!issued.length) { el2.innerHTML = '<div class="empty">No badges issued to this cadet yet.</div>'; return; }
        let rows = issued.map(i => '<tr><td><strong>' + i.name + '</strong></td><td style="font-size:12px">' + i.category + '</td><td style="font-family:var(--mono);font-size:11px">' + fmt(i.issued_at) + '</td><td style="font-size:12px">' + i.issued_by + '</td><td><span class="badge ' + (i.returned ? 'badge-grey' : 'badge-green') + '">' + (i.returned ? 'Returned' : 'Active') + '</span></td><td>' + (!i.returned ? '<button class="btn btn-ghost btn-sm badge-return-btn" data-id="' + i.issued_id + '">Return</button>' : '') + '</td></tr>').join('');
        el2.innerHTML = '<div class="table-wrap"><table><thead><tr><th>Badge</th><th>Category</th><th>Issued</th><th>By</th><th>Status</th><th></th></tr></thead><tbody>' + rows + '</tbody></table></div>';
        document.querySelectorAll('.badge-return-btn').forEach(btn => {
          btn.onclick = async () => {
            if (!confirm('Return this badge to stock?')) return;
            await PATCH('/badges/return/' + btn.dataset.id, {});
            el.click();
          };
        });
      };
    });

    document.getElementById('badge-cadet-search2')?.addEventListener('input', e => {
      const s = e.target.value.toLowerCase();
      document.querySelectorAll('[data-cadet-id2]').forEach(el => { el.style.display = el.textContent.toLowerCase().includes(s) ? '' : 'none'; });
    });
  }

  render();
}


async function openReports() {
  const [cadets, items] = await Promise.all([loadCadets(), loadItems(), loadStock()]);
  const activeCadets = cadets.filter(c => c.active);

  showModal(`${mHead('REPORTS')}<div class="modal-body"><div class="loading-text">Generating reports...</div></div>`, true);

  try {
    // Stock summary using cached stock data
    const stockData = S.stock || [];
    const stockMap = {};
    stockData.forEach(s => {
      const item = items.find(i => i.id === s.item_id);
      const size = item?.sizes?.find(sz => sz.id === s.size_id);
      if (item && size) {
        if (!stockMap[item.short_name]) stockMap[item.short_name] = [];
        stockMap[item.short_name].push({ size: size.size_label, qty: s.quantity });
      }
    });

    // Kit deficiency - check each active cadet's issued items
    const kitChecks = await Promise.all(
      activeCadets.slice(0, 50).map(c => GET('/cadets/' + c.id + '/issued').catch(() => []))
    );

    const deficiencies = activeCadets.slice(0, 50).map((c, i) => {
      const issued = Array.isArray(kitChecks[i]) ? kitChecks[i] : [];
      const hasShirt = issued.some(it => it.short_name && it.short_name.toLowerCase().includes('shirt'));
      const hasTrousers = issued.some(it => it.short_name && (it.short_name.toLowerCase().includes('trouser') || it.short_name.toLowerCase().includes('skirt')));
      const hasBeret = issued.some(it => it.short_name && it.short_name.toLowerCase().includes('beret'));
      const missing = [];
      if (!hasShirt) missing.push('Shirt');
      if (!hasTrousers) missing.push('Trousers/Skirt');
      if (!hasBeret) missing.push('Beret');
      return { cadet: c, missing, total: issued.length };
    }).filter(d => d.missing.length > 0);

    showModal(`${mHead('REPORTS')}<div class="modal-body">
      <div class="section-label">Kit Deficiencies — Active Cadets Missing Core Items</div>
      ${deficiencies.length === 0
        ? '<div class="alert alert-success" style="margin-bottom:16px">✓ All active cadets have core uniform items issued.</div>'
        : `<div class="table-wrap"><table>
          <thead><tr><th>Cadet</th><th>Service No</th><th>Missing</th><th>Issued</th></tr></thead>
          <tbody>${deficiencies.map(d => `<tr>
            <td><strong>${d.cadet.rank} ${d.cadet.surname}</strong>, ${d.cadet.forename}</td>
            <td style="font-family:var(--mono);font-size:12px">${d.cadet.service_number}</td>
            <td>${d.missing.map(m => `<span class="badge badge-gold" style="margin-right:4px;font-size:10px">${m}</span>`).join('')}</td>
            <td style="text-align:center;font-family:var(--mono)">${d.total}</td>
          </tr>`).join('')}</tbody>
        </table></div>`}

      <div class="section-label" style="margin-top:24px">Current Stock Summary</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Item</th><th>Sizes Available</th><th>Total</th></tr></thead>
        <tbody>${Object.entries(stockMap).map(([name, sizes]) => {
          const total = sizes.reduce((sum, s) => sum + s.qty, 0);
          const inStock = sizes.filter(s => s.qty > 0);
          return `<tr>
            <td><strong>${name}</strong></td>
            <td style="font-size:12px;color:var(--text2)">${inStock.length > 0 ? inStock.map(s => s.size + ': ' + s.qty).join(', ') : '<span style="color:var(--red)">None in stock</span>'}</td>
            <td style="font-weight:700;color:${total > 0 ? 'var(--green)' : 'var(--red)'};font-family:var(--mono)">${total}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" data-action="admin">← Back</button></div>`, true);

  } catch(e) {
    showModal(`${mHead('REPORTS')}<div class="modal-body"><div class="alert alert-danger">Error: ${e.message}</div></div>
    <div class="modal-footer"><button class="btn btn-ghost" data-action="admin">← Back</button></div>`);
  }
}

async function openChangePin() {
  let newPin = '';
  let confirmPin = '';
  let mode = 'new'; // 'new' or 'confirm'

  function renderChangePin() {
    showModal(`${mHead('CHANGE YOUR PIN')}<div class="modal-body">
      <p style="color:var(--text2);font-size:14px;margin-bottom:20px">Set a new PIN or password for your account. You will need this to access admin functions.</p>
      <div id="cp-error"></div>
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:8px">${mode==='new'?'ENTER NEW PIN':'CONFIRM NEW PIN'}</div>
        <div style="font-size:32px;letter-spacing:12px;color:var(--blue);font-family:var(--mono);min-height:48px;padding:12px;background:var(--bg);border-radius:8px;border:1.5px solid var(--border)">
          ${mode==='new'?(newPin?'●'.repeat(newPin.length):'<span style="color:var(--text3);font-size:14px">Enter new PIN</span>'):(confirmPin?'●'.repeat(confirmPin.length):'<span style="color:var(--text3);font-size:14px">Confirm PIN</span>')}
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto 16px">
        ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k => k==='' ? '<div></div>' : `<button class="pin-key btn btn-ghost" data-key="${k}" style="padding:18px;font-size:20px;font-weight:700;border-radius:10px">${k}</button>`).join('')}
      </div>
      <div style="text-align:center">
        <input id="cp-text" type="password" placeholder="Or type your PIN here..." style="max-width:240px;text-align:center;letter-spacing:4px">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-action="close">Cancel</button>
      <button class="btn btn-primary" id="cp-next">${mode==='new'?'Next →':'Save PIN'}</button>
    </div>`);

    document.querySelectorAll('.pin-key').forEach(btn => {
      btn.onclick = () => {
        const k = btn.dataset.key;
        if (mode === 'new') {
          if (k === '⌫') newPin = newPin.slice(0,-1);
          else newPin += k;
        } else {
          if (k === '⌫') confirmPin = confirmPin.slice(0,-1);
          else confirmPin += k;
        }
        const disp = document.querySelector('.modal-body div[style*="32px"]');
        if (disp) {
          const val = mode === 'new' ? newPin : confirmPin;
          disp.innerHTML = val ? '●'.repeat(val.length) : `<span style="color:var(--text3);font-size:14px">${mode==='new'?'Enter new PIN':'Confirm PIN'}</span>`;
        }
      };
    });

    document.getElementById('cp-next').onclick = async () => {
      const textVal = document.getElementById('cp-text').value;
      if (mode === 'new') {
        if (textVal) newPin = textVal;
        if (!newPin) { showError('cp-error', 'Please enter a PIN'); return; }
        mode = 'confirm';
        document.getElementById('cp-text').value = '';
        renderChangePin();
      } else {
        if (textVal) confirmPin = textVal;
        if (!confirmPin) { showError('cp-error', 'Please confirm your PIN'); return; }
        if (newPin !== confirmPin) { showError('cp-error', 'PINs do not match — try again'); confirmPin=''; renderChangePin(); return; }
        const btn = document.getElementById('cp-next');
        btn.disabled = true; btn.textContent = 'Saving...';
        try {
          await PATCH(`/users/${S.user.id}/change-pin`, { new_pin: newPin });
          showModal(`${mHead('PIN CHANGED')}<div class="modal-body">
            <div class="alert alert-success">✓ Your PIN has been updated successfully.</div>
          </div><div class="modal-footer"><button class="btn btn-primary" data-action="close">Done</button></div>`);
        } catch(e) {
          btn.disabled=false; btn.textContent='Save PIN';
          showError('cp-error', e.message);
        }
      }
    };
  }

  renderChangePin();
}

async function openAuditLog() {
  const [cadets, items] = await Promise.all([loadCadets(), loadItems()]);
  let logs = [];
  let filters = { staff: '', cadet: '', item: '', action: '' };

  async function loadLogs() {
    let path = '/audit/?limit=200';
    if (filters.action) path += `&action=${filters.action}`;
    logs = await GET(path);
  }

  async function renderAudit() {
    await loadLogs();

    // Apply client-side filters
    let filtered = logs;
    if (filters.cadet) filtered = filtered.filter(l => l.cadet_id === parseInt(filters.cadet));
    if (filters.staff) filtered = filtered.filter(l => l.user_name.toLowerCase().includes(filters.staff.toLowerCase()));
    if (filters.item) filtered = filtered.filter(l => l.item_id === parseInt(filters.item));

    const actionTypes = ['', 'ISSUE', 'RETURN', 'STOCK_ADD', 'STOCK_REMOVE', 'STOCK_BULK_ADD', 'CADET_CREATE', 'CADET_DEACTIVATE', 'CADET_REACTIVATE', 'USER_CREATE', 'USER_DEACTIVATE', 'STOCK_DELETE'];

    showModal(`${mHead('AUDIT LOG')}<div class="modal-body">
      <!-- Filters -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:16px">
        <div>
          <label>Filter by Staff</label>
          <input id="af-staff" placeholder="Staff name..." value="${filters.staff}">
        </div>
        <div>
          <label>Filter by Cadet</label>
          <select id="af-cadet">
            <option value="">All Cadets</option>
            ${cadets.map(c=>`<option value="${c.id}" ${filters.cadet==c.id?'selected':''}>${c.surname}, ${c.forename}</option>`).join('')}
          </select>
        </div>
        <div>
          <label>Filter by Item</label>
          <select id="af-item">
            <option value="">All Items</option>
            ${items.map(i=>`<option value="${i.id}" ${filters.item==i.id?'selected':''}>${i.short_name}</option>`).join('')}
          </select>
        </div>
        <div>
          <label>Filter by Action</label>
          <select id="af-action">
            ${actionTypes.map(a=>`<option value="${a}" ${filters.action===a?'selected':''}>${a||'All Actions'}</option>`).join('')}
          </select>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:16px;align-items:center">
        <button class="btn btn-primary btn-sm" id="af-apply">Apply Filters</button>
        <button class="btn btn-ghost btn-sm" id="af-clear">Clear</button>
        <span style="font-size:12px;color:var(--text3);font-family:var(--mono)">${filtered.length} records</span>
      </div>

      <!-- Results -->
      <div class="table-wrap">
        <table>
          <thead><tr><th>Timestamp</th><th>Action</th><th>Staff</th><th>Details</th></tr></thead>
          <tbody>
            ${filtered.length === 0
              ? '<tr><td colspan="4"><div class="empty">No records found</div></td></tr>'
              : filtered.map(l => `<tr>
                <td style="font-family:var(--mono);font-size:11px;white-space:nowrap">${fmt(l.timestamp)}</td>
                <td><span class="badge ${
                  l.action.includes('ISSUE') ? 'badge-blue' :
                  l.action.includes('RETURN') ? 'badge-green' :
                  l.action.includes('STOCK') ? 'badge-gold' :
                  l.action.includes('CADET') ? 'badge-grey' : 'badge-grey'
                }">${l.action}</span></td>
                <td style="font-size:13px">${l.user_name}</td>
                <td style="font-size:12px;color:var(--text2)">${l.details||'—'}</td>
              </tr>`).join('')
            }
          </tbody>
        </table>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-action="admin">← Back</button>
    </div>`, true);

    document.getElementById('af-apply').onclick = async () => {
      filters.staff = document.getElementById('af-staff').value;
      filters.cadet = document.getElementById('af-cadet').value;
      filters.item = document.getElementById('af-item').value;
      filters.action = document.getElementById('af-action').value;
      await renderAudit();
    };

    document.getElementById('af-clear').onclick = async () => {
      filters = { staff: '', cadet: '', item: '', action: '' };
      await renderAudit();
    };
  }

  await renderAudit();
}

function bind() {
  document.body.onclick = function(e) {
    const btn = e.target.closest('button');
    const id = btn ? btn.id : (e.target.id || '');
    if (!id) return;
    if (id === 'feedback-btn') openFeedback();
    else if (id === 'dark-mode-btn') {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('dark-mode-btn').textContent = isDark ? '🌙' : '☀️';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }
    else if (id === 'change-pin-btn') openChangePin();
    else if (id === 'signout-btn') { if(confirm('Change user?')) doLogout(); }
    else if (id === 'btn-cadets') openCadets();
    else if (id === 'btn-issue') openIssueFlow();
    else if (id === 'btn-return') openReturnFlow();
    else if (id === 'btn-badges') openBadgeTracker();
    else if (id === 'btn-search') openSearchUniform();
    else if (id === 'btn-badges') openBadgeTracker();
    else if (id === 'btn-admin') openAdmin(); // openAdminAuth() disabled temporarily
  };

  // Load staff list for selector screen
  if (!S.user) {
    loadStaffList().then(staff => {
      const list = document.getElementById('staff-list');
      if (!list) return;
      if (!staff || staff.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:var(--text3);padding:20px">No staff found. Check backend is running.</div>';
        return;
      }
      list.innerHTML = staff.map(u => `
        <button class="staff-select-btn" data-user='${JSON.stringify(u).replace(/'/g,"&#39;")}' style="
          display:flex;align-items:center;gap:14px;padding:14px 16px;
          background:white;border:1.5px solid var(--border);border-radius:10px;
          cursor:pointer;transition:all 0.15s;text-align:left;width:100%;
          font-family:var(--body);
        ">
          <div style="width:42px;height:42px;border-radius:50%;background:var(--blue);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0">
            ${u.forename[0]}${u.surname[0]}
          </div>
          <div>
            <div style="font-weight:700;color:var(--text);font-size:15px">${u.display_name}</div>
            ${u.role ? `<div style="font-size:12px;color:var(--text3);font-family:var(--mono)">${u.role}</div>` : ''}
          </div>
          ${u.is_admin ? '<span style="margin-left:auto;font-size:10px;background:#fef9c3;color:#854d0e;padding:3px 8px;border-radius:4px;font-family:var(--mono)">ADMIN</span>' : ''}
        </button>
      `).join('');

      list.querySelectorAll('.staff-select-btn').forEach(btn => {
        btn.onmouseover = () => { btn.style.borderColor = 'var(--blue-light)'; btn.style.background = 'var(--blue-pale)'; };
        btn.onmouseout = () => { btn.style.borderColor = 'var(--border)'; btn.style.background = 'white'; };
        btn.onclick = () => {
          const user = JSON.parse(btn.dataset.user);
          selectUser(user);
        };
      });
    }).catch(err => {
      const list = document.getElementById('staff-list');
      if (list) list.innerHTML = `<div class="alert alert-danger">Cannot connect to backend. Make sure the server is running.</div>`;
    });
  }
}

// ── ADMIN AUTH - PIN or Pattern ────────────────────────
function openAdminAuth() {
  if (!S.user?.is_admin) {
    showModal(`${mHead('ADMIN ACCESS')}<div class="modal-body">
      <div class="alert alert-danger">Your account does not have admin privileges.</div>
    </div><div class="modal-footer"><button class="btn btn-ghost" data-action="close">Close</button></div>`);
    return;
  }

  let authMode = 'pin'; // 'pin' or 'pattern'
  let pinValue = '';
  let patternSelected = [];
  const PATTERN_DOTS = 9;

  function renderAuth() {
    showModal(`${mHead('ADMIN AUTHENTICATION')}<div class="modal-body">
      <p style="color:var(--text2);margin-bottom:20px;font-size:14px">Verify your identity to access admin functions.</p>

      <div style="display:flex;gap:8px;margin-bottom:20px">
        <button class="btn ${authMode==='pin'?'btn-primary':'btn-ghost'} btn-sm" id="auth-pin-tab">PIN / Password</button>
        <button class="btn ${authMode==='pattern'?'btn-primary':'btn-ghost'} btn-sm" id="auth-pattern-tab">Pattern</button>
      </div>

      <div id="auth-error"></div>

      ${authMode === 'pin' ? `
        <div style="text-align:center;margin-bottom:20px">
          <div style="font-size:32px;letter-spacing:12px;color:var(--blue);font-family:var(--mono);min-height:48px;padding:12px;background:var(--bg);border-radius:8px;border:1.5px solid var(--border)">
            ${'●'.repeat(pinValue.length) || '<span style="color:var(--text3);font-size:14px">Enter PIN or password</span>'}
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto 16px">
          ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k => k==='' ? '<div></div>' : `
            <button class="pin-key btn btn-ghost" data-key="${k}" style="padding:18px;font-size:20px;font-weight:700;border-radius:10px">${k}</button>
          `).join('')}
        </div>
        <div style="text-align:center">
          <input id="pin-text-input" type="password" placeholder="Or type password here..." style="max-width:240px;text-align:center;letter-spacing:4px">
        </div>
      ` : `
        <div style="text-align:center;margin-bottom:16px">
          <p style="font-size:13px;color:var(--text3);margin-bottom:16px">Draw your pattern</p>
          <div id="pattern-grid" style="display:inline-grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:24px;background:var(--bg);border-radius:12px;border:1.5px solid var(--border)">
            ${Array.from({length:9},(_,i)=>`
              <div class="pattern-dot" data-dot="${i}" style="
                width:44px;height:44px;border-radius:50%;
                background:${patternSelected.includes(i)?'var(--blue)':'var(--border)'};
                cursor:pointer;transition:all 0.1s;
                display:flex;align-items:center;justify-content:center;
                color:white;font-weight:700;font-size:13px;
              ">${patternSelected.includes(i)?patternSelected.indexOf(i)+1:''}</div>
            `).join('')}
          </div>
          <div style="margin-top:12px">
            <button class="btn btn-ghost btn-sm" id="clear-pattern">Clear</button>
          </div>
        </div>
      `}
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-action="close">Cancel</button>
      <button class="btn btn-primary" id="auth-submit">Verify →</button>
    </div>`);

    // Tab switching
    document.getElementById('auth-pin-tab').onclick = () => { authMode='pin'; pinValue=''; renderAuth(); };
    document.getElementById('auth-pattern-tab').onclick = () => { authMode='pattern'; patternSelected=[]; renderAuth(); };

    // PIN keypad
    document.querySelectorAll('.pin-key').forEach(btn => {
      btn.onclick = () => {
        const k = btn.dataset.key;
        if (k === '⌫') pinValue = pinValue.slice(0,-1);
        else pinValue += k;
        // Update display without full re-render
        const disp = document.querySelector('#auth-pin-tab')?.closest('.modal-body')?.querySelector('div[style*="32px"]');
        if (disp) disp.innerHTML = pinValue ? '●'.repeat(pinValue.length) : '<span style="color:var(--text3);font-size:14px">Enter PIN or password</span>';
      };
    });

    // Pattern dots
    document.querySelectorAll('.pattern-dot').forEach(dot => {
      dot.onclick = () => {
        const i = parseInt(dot.dataset.dot);
        if (!patternSelected.includes(i)) {
          patternSelected.push(i);
          dot.style.background = 'var(--blue)';
          dot.textContent = patternSelected.length;
        }
      };
    });
    document.getElementById('clear-pattern')?.addEventListener('click', () => { patternSelected=[]; renderAuth(); });

    // Submit
    document.getElementById('auth-submit').onclick = async () => {
      let pin = '';
      if (authMode === 'pin') {
        pin = document.getElementById('pin-text-input')?.value || pinValue;
      } else {
        pin = patternSelected.join('');
      }
      if (!pin) { showError('auth-error', 'Please enter your PIN or draw a pattern'); return; }
      const btn = document.getElementById('auth-submit');
      btn.disabled=true; btn.textContent='Verifying...';
      try {
        await verifyAdminPin(S.user.id, pin);
        S.adminVerified = true;
        closeModal();
        openAdmin();
      } catch(e) {
        btn.disabled=false; btn.textContent='Verify →';
        showError('auth-error', e.message);
        pinValue='';
        patternSelected=[];
      }
    };
  }

  renderAuth();
}
