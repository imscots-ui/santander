async function openKitList() {
  showModal(`${mHead('REQUIRED KIT LIST')}<div class="modal-body"><div class="loading-text">Loading kit list...</div></div>`, true);
  const [kitItems, allItems] = await Promise.all([GET('/kit-list/'), loadItems()]);

  function render() {
    const groups = {};
    kitItems.filter(k=>k.group_key).forEach(k => { if(!groups[k.group_key]) groups[k.group_key]=[]; groups[k.group_key].push(k); });

    showModal(`${mHead('REQUIRED KIT LIST')}<div class="modal-body">
      <div class="alert alert-info" style="margin-bottom:16px">This list defines what items each active cadet is expected to have issued. Kit deficiency reports are based on this list.</div>
      <div class="section-label">Current Required Items (${kitItems.length})</div>
      ${kitItems.length===0?'<div class="empty">No items on the kit list yet.</div>':`
      <div class="table-wrap"><table>
        <thead><tr><th>Item</th><th>Category</th><th>Gender</th><th>Group / Note</th><th></th></tr></thead>
        <tbody>${kitItems.map(k=>`<tr>
          <td><strong>${k.display_label||k.item_name}</strong>${k.display_label?`<br><span style="font-size:11px;color:var(--text3)">${k.item_name}</span>`:''}</td>
          <td style="font-size:12px;color:var(--text3)">${k.category||'—'}</td>
          <td>${k.gender_restriction?`<span class="badge ${k.gender_restriction==='female'?'badge-gold':'badge-blue'}">${k.gender_restriction}</span>`:'<span style="font-size:12px;color:var(--text3)">All</span>'}</td>
          <td style="font-size:12px;color:var(--text3)">${k.group_key?`<span title="Items in the same group satisfy each other">Group: <strong>${k.group_key}</strong></span>`:'—'}</td>
          <td><button class="btn btn-danger btn-sm kl-remove" data-id="${k.id}" data-name="${k.display_label||k.item_name}">Remove</button></td>
        </tr>`).join('')}</tbody>
      </table></div>`}

      <div class="section-label" style="margin-top:24px">Add Item to Kit List</div>
      <div id="kl-error"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div class="form-group" style="margin:0"><label>Item <span style="color:var(--red)">*</span></label>
          <select id="kl-item">
            <option value="">— Select item —</option>
            ${allItems.map(i=>`<option value="${i.id}">${i.short_name} (${i.category||'Uncategorised'})</option>`).join('')}
          </select>
        </div>
        <div class="form-group" style="margin:0"><label>Gender Restriction</label>
          <select id="kl-gender">
            <option value="">All (no restriction)</option>
            <option value="male">Male only</option>
            <option value="female">Female only</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group" style="margin:0"><label>Display Label <span style="font-weight:400;color:var(--text3)">(optional)</span></label>
          <input id="kl-label" placeholder="e.g. Skirt or Slacks">
        </div>
        <div class="form-group" style="margin:0"><label>Group Key <span style="font-weight:400;color:var(--text3)">(optional — links "either/or" items)</span></label>
          <input id="kl-group" placeholder="e.g. legwear-female">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-action="admin">← Back</button>
      <button class="btn btn-primary" id="kl-add">+ Add to Kit List</button>
    </div>`, true);

    document.querySelectorAll('.kl-remove').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm(`Remove "${btn.dataset.name}" from the required kit list?\n\nThis will affect missing kit calculations for all cadets.`)) return;
        btn.disabled = true; btn.textContent = 'Removing...';
        try {
          await DELETE(`/kit-list/${btn.dataset.id}`);
          const idx = kitItems.findIndex(k => k.id === parseInt(btn.dataset.id));
          if (idx >= 0) kitItems.splice(idx, 1);
          render();
        } catch(e) { btn.disabled=false; btn.textContent='Remove'; alert('Error: '+e.message); }
      };
    });

    document.getElementById('kl-add').onclick = async () => {
      const itemId = parseInt(document.getElementById('kl-item').value);
      const gender = document.getElementById('kl-gender').value || null;
      const label = document.getElementById('kl-label').value.trim() || null;
      const group = document.getElementById('kl-group').value.trim() || null;
      if (!itemId) { showError('kl-error', 'Please select an item'); return; }
      const addBtn = document.getElementById('kl-add');
      addBtn.disabled = true; addBtn.textContent = 'Adding...';
      try {
        const newEntry = await POST('/kit-list/', { item_id: itemId, gender_restriction: gender, display_label: label, group_key: group });
        kitItems.push(newEntry);
        render();
      } catch(e) { addBtn.disabled=false; addBtn.textContent='+ Add to Kit List'; showError('kl-error', e.message); }
    };
  }

  render();
}

async function openManageItems() {
  showModal(`${mHead('MANAGE ITEMS')}<div class="modal-body"><div class="loading-text">Loading items...</div></div>`, true);
  S.items = null; // force fresh load
  const items = await loadItems();
  let archivedItems = [];
  try { archivedItems = await GET('/items/archived'); } catch {}
  const CATEGORIES = [...new Set(items.map(i=>i.category).filter(Boolean))].sort();
  let addSizeItemId = null;
  let miCatFilter = null;

  function render() {
    const displayItems = miCatFilter ? items.filter(i => i.category === miCatFilter) : items;
    showModal(`${mHead('MANAGE ITEMS')}<div class="modal-body">
      <div class="alert alert-info" style="margin-bottom:16px">Manage the uniform catalogue. Add new sizes to existing items or create new item types.</div>

      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
        <div class="search-wrap" style="flex:1;min-width:180px;margin:0"><span class="search-icon">🔍</span><input id="mi-search" placeholder="Search items..." type="text" style="padding-left:32px"></div>
        ${CATEGORIES.map(c=>`<button class="btn btn-ghost btn-sm mi-cat-chip" data-cat="${c}" style="padding:4px 10px;font-size:12px${miCatFilter===c?';background:var(--blue);color:white;border-color:var(--blue)':''}">${c}</button>`).join('')}
      </div>

      <div class="section-label">Current Items <span id="mi-count" style="font-weight:400;color:var(--text3)">(${displayItems.length}${displayItems.length<items.length?' of '+items.length:''})</span></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Item</th><th>Category</th><th>Sizes</th><th></th></tr></thead>
        <tbody id="mi-tbody">${displayItems.map(i=>`<tr data-item-name="${(i.short_name+' '+i.name+' '+(i.category||'')).toLowerCase()}">
          <td><strong>${i.short_name}</strong><br><span style="font-size:11px;color:var(--text3)">${i.name}</span></td>
          <td style="font-size:12px;color:var(--text3)">${i.category||'—'}</td>
          <td style="font-size:12px">${i.sizes.map(s=>`<span class="size-tag" style="display:inline-flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-family:var(--mono);font-size:11px;margin-right:3px;margin-bottom:2px">${s.size_label}<button class="del-size-btn" data-item-id="${i.id}" data-size-id="${s.id}" data-size-label="${s.size_label}" title="Remove size" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:10px;padding:0 0 0 4px;line-height:1">✕</button></span>`).join('')}
            ${addSizeItemId === i.id
              ? `<input id="new-size-input" type="text" placeholder="e.g. 185/96" autocomplete="off" style="font-family:var(--mono);font-size:11px;width:100px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);margin-left:4px"><button class="btn btn-primary btn-sm" id="new-size-submit" data-item-id="${i.id}" style="font-size:11px;padding:2px 8px;margin-left:4px">Add</button><button class="btn btn-ghost btn-sm" id="new-size-cancel" style="font-size:11px;padding:2px 8px;margin-left:4px">✕</button>`
              : `<button class="btn btn-ghost btn-sm add-size-btn" data-item-id="${i.id}" data-item-name="${i.short_name}" style="font-size:11px;padding:2px 8px;margin-left:4px">+ Size</button>`}
          </td>
          <td style="white-space:nowrap">
            <button class="btn btn-ghost btn-sm edit-item-btn" data-id="${i.id}" style="font-size:11px;padding:2px 8px">Edit</button>
            <button class="btn btn-ghost btn-sm archive-item-btn" data-id="${i.id}" data-name="${i.short_name}" style="font-size:11px;padding:2px 8px;color:var(--text3);margin-left:4px">Archive</button>
          </td>
        </tr>`).join('')}
        </tbody>
      </table></div>

      ${archivedItems.length > 0 ? `<div class="section-label" style="margin-top:24px;color:var(--text3)">Archived Items (${archivedItems.length})</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Item</th><th>Category</th><th></th></tr></thead>
        <tbody>${archivedItems.map(a=>`<tr style="opacity:0.65">
          <td><strong>${a.short_name}</strong><br><span style="font-size:11px;color:var(--text3)">${a.name}</span></td>
          <td style="font-size:12px;color:var(--text3)">${a.category||'—'}</td>
          <td><button class="btn btn-ghost btn-sm restore-item-btn" data-id="${a.id}" data-name="${a.short_name}" style="font-size:11px;padding:2px 8px">Restore</button></td>
        </tr>`).join('')}</tbody>
      </table></div>` : ''}

      <div class="section-label" style="margin-top:24px">Add New Item</div>
      <div id="ni-error"></div>
      <div class="grid-2">
        <div class="form-group"><label>Short Name <span style="color:var(--red)">*</span></label><input id="ni-short" placeholder="e.g. No.1 Jacket"></div>
        <div class="form-group"><label>Full Name <span style="color:var(--red)">*</span></label><input id="ni-name" placeholder="e.g. Number 1 Dress Jacket"></div>
        <div class="form-group"><label>Category</label>
          <input id="ni-cat" list="ni-cat-list" placeholder="e.g. Jacket">
          <datalist id="ni-cat-list">${CATEGORIES.map(c=>`<option value="${c}">`).join('')}</datalist>
        </div>
        <div class="form-group"><label>Sizes <span style="font-weight:400;color:var(--text3)">(comma-separated)</span></label><input id="ni-sizes" placeholder="e.g. S, M, L, XL" style="font-family:var(--mono)"></div>
      </div>
      <div class="form-group" style="margin-top:-8px"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;font-size:14px;font-weight:600;color:var(--text)"><input type="checkbox" id="ni-multi" style="width:auto;accent-color:var(--blue)"> Allow multiple issues to same cadet</label></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-action="admin">← Back</button>
      <button class="btn btn-primary" id="ni-submit">Add Item</button>
    </div>`, true);

    // Search filter (DOM visibility, no re-render)
    function applyMiSearch() {
      const s = document.getElementById('mi-search')?.value?.toLowerCase() || '';
      let vis = 0;
      document.querySelectorAll('#mi-tbody tr').forEach(row => {
        const show = !s || (row.dataset.itemName || '').includes(s);
        row.style.display = show ? '' : 'none';
        if (show) vis++;
      });
      const countEl = document.getElementById('mi-count');
      const base = miCatFilter ? items.filter(i => i.category === miCatFilter).length : items.length;
      if (countEl) countEl.textContent = `(${vis}${vis < items.length ? ' of ' + items.length : ''})`;
    }
    document.getElementById('mi-search')?.addEventListener('input', applyMiSearch);

    // Category chips (re-render with filter)
    document.querySelectorAll('.mi-cat-chip').forEach(chip => {
      chip.onclick = () => { miCatFilter = miCatFilter === chip.dataset.cat ? null : chip.dataset.cat; addSizeItemId = null; render(); };
    });

    // Delete size buttons
    document.querySelectorAll('.del-size-btn').forEach(btn => {
      btn.onclick = async (e) => {
        e.stopPropagation();
        if (!confirm(`Remove size "${btn.dataset.sizeLabel}" from this item?\n\nThis cannot be done if any issued records use this size.`)) return;
        btn.disabled = true; btn.textContent = '…';
        try {
          await DELETE(`/items/${btn.dataset.itemId}/sizes/${btn.dataset.sizeId}`);
          const item = items.find(i => i.id === parseInt(btn.dataset.itemId));
          if (item) item.sizes = item.sizes.filter(s => s.id !== parseInt(btn.dataset.sizeId));
          S.items = null;
          render();
        } catch(e) { alert('Error: ' + e.message); btn.disabled = false; btn.textContent = '✕'; }
      };
    });

    // Edit item
    document.querySelectorAll('.edit-item-btn').forEach(btn => {
      btn.onclick = () => {
        const item = items.find(i => i.id === parseInt(btn.dataset.id));
        if (!item) return;
        const CATS = [...new Set([...CATEGORIES, item.category].filter(Boolean))].sort();
        showModal(`${mHead('EDIT ITEM')}<div class="modal-body">
          <div style="font-size:13px;color:var(--text2);margin-bottom:16px">Editing: <strong>${item.short_name}</strong></div>
          <div id="ei-error"></div>
          <div class="grid-2">
            <div class="form-group"><label>Short Name <span style="color:var(--red)">*</span></label>
              <input id="ei-short" value="${item.short_name}">
            </div>
            <div class="form-group"><label>Full Name <span style="color:var(--red)">*</span></label>
              <input id="ei-name" value="${item.name}">
            </div>
            <div class="form-group"><label>Category</label>
              <input id="ei-cat" list="ei-cat-list" value="${item.category||''}">
              <datalist id="ei-cat-list">${CATS.map(c=>`<option value="${c}">`).join('')}</datalist>
            </div>
          </div>
          <div class="form-group"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;font-size:14px;font-weight:600;color:var(--text)"><input type="checkbox" id="ei-multi" style="width:auto;accent-color:var(--blue)"${item.allows_multiples?' checked':''}> Allow multiple issues to same cadet</label></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" id="ei-cancel">Cancel</button>
          <button class="btn btn-primary" id="ei-save">Save Changes</button>
        </div>`);
        document.getElementById('ei-cancel').onclick = () => { addSizeItemId = null; render(); };
        document.getElementById('ei-save').onclick = async () => {
          const short_name = document.getElementById('ei-short').value.trim();
          const name = document.getElementById('ei-name').value.trim();
          const category = document.getElementById('ei-cat').value.trim() || null;
          const allows_multiples = document.getElementById('ei-multi').checked;
          if (!short_name || !name) { showError('ei-error', 'Short name and full name are required'); return; }
          const saveBtn = document.getElementById('ei-save');
          saveBtn.disabled = true; saveBtn.textContent = 'Saving...';
          try {
            const updated = await PATCH(`/items/${item.id}`, { name, short_name, category, allows_multiples });
            Object.assign(item, updated);
            S.items = null;
            render();
          } catch(e) { saveBtn.disabled = false; saveBtn.textContent = 'Save Changes'; showError('ei-error', e.message); }
        };
      };
    });

    // Archive item
    document.querySelectorAll('.archive-item-btn').forEach(btn => {
      btn.onclick = async (e) => {
        e.stopPropagation();
        if (!confirm(`Archive "${btn.dataset.name}"?\n\nIt will be removed from the active catalogue. Cannot be done if any items are currently issued.`)) return;
        btn.disabled = true; btn.textContent = '…';
        try {
          await PATCH(`/items/${btn.dataset.id}/deactivate`);
          const idx = items.findIndex(i => i.id === parseInt(btn.dataset.id));
          if (idx >= 0) { archivedItems.push(items[idx]); items.splice(idx, 1); }
          S.items = null;
          render();
        } catch(e) { alert('Error: ' + e.message); btn.disabled = false; btn.textContent = 'Archive'; }
      };
    });

    // Restore archived item
    document.querySelectorAll('.restore-item-btn').forEach(btn => {
      btn.onclick = async (e) => {
        e.stopPropagation();
        btn.disabled = true; btn.textContent = '…';
        try {
          await PATCH(`/items/${btn.dataset.id}/reactivate`);
          const idx = archivedItems.findIndex(a => a.id === parseInt(btn.dataset.id));
          if (idx >= 0) { items.push(archivedItems[idx]); archivedItems.splice(idx, 1); }
          S.items = null;
          render();
        } catch(e) { alert('Error: ' + e.message); btn.disabled = false; btn.textContent = 'Restore'; }
      };
    });

    document.querySelectorAll('.add-size-btn').forEach(btn => {
      btn.onclick = () => { addSizeItemId = parseInt(btn.dataset.itemId); render(); };
    });
    document.getElementById('new-size-cancel')?.addEventListener('click', () => { addSizeItemId = null; render(); });
    const newSizeSubmit = document.getElementById('new-size-submit');
    if (newSizeSubmit) {
      document.getElementById('new-size-input')?.focus();
      document.getElementById('new-size-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') newSizeSubmit.click(); });
      newSizeSubmit.onclick = async () => {
        const label = document.getElementById('new-size-input')?.value.trim();
        if (!label) return;
        newSizeSubmit.disabled = true; newSizeSubmit.textContent = 'Adding...';
        try {
          const size = await POST(`/items/${newSizeSubmit.dataset.itemId}/sizes`, { size_label: label });
          const item = items.find(i => i.id === parseInt(newSizeSubmit.dataset.itemId));
          if (item) item.sizes.push(size);
          S.items = null;
          addSizeItemId = null;
          render();
        } catch(e) { newSizeSubmit.disabled=false; newSizeSubmit.textContent='Add'; showError('ni-error', e.message); }
      };
    }

    document.getElementById('ni-submit').onclick = async () => {
      const shortName = document.getElementById('ni-short').value.trim();
      const name = document.getElementById('ni-name').value.trim();
      const category = document.getElementById('ni-cat').value.trim() || null;
      const sizesRaw = document.getElementById('ni-sizes').value.trim();
      const sizes = sizesRaw ? sizesRaw.split(',').map(s=>s.trim()).filter(Boolean) : [];
      const multi = document.getElementById('ni-multi').checked;
      if (!shortName || !name) { showError('ni-error', 'Short name and full name are required'); return; }
      const btn = document.getElementById('ni-submit');
      btn.disabled = true; btn.textContent = 'Adding...';
      try {
        const newItem = await POST('/items/', { name, short_name: shortName, category, allows_multiples: multi, sizes });
        items.push(newItem);
        S.items = null;
        render();
      } catch(e) { btn.disabled=false; btn.textContent='Add Item'; showError('ni-error', e.message); }
    };
  }

  render();
}

    try {
      await POST('/users/',{forename:fore,surname:sur,rank:document.getElementById('s-rank')?.value||null,role:document.getElementById('s-role')?.value||null,is_admin:document.getElementById('s-admin').checked});
      S.users=null;
      showModal(`${mHead('ADD STAFF USER')}<div class="modal-body">
        <div class="alert alert-success">✓ User created successfully.</div>
        <div style="background:var(--blue-pale);padding:16px;border-radius:var(--r);font-size:14px"><strong>Username:</strong> ${sur.toLowerCase()}.${fore.toLowerCase()}<br><strong>Default PIN:</strong> 1701</div>
      </div><div class="modal-footer"><button class="btn btn-ghost" data-action="close">Done</button><button class="btn btn-primary" data-action="addstaff">Add Another</button></div>`);
    } catch(e) { btn.disabled=false; btn.textContent='Create User'; showError('staff-error',e.message); }
  };
}

function openAddCadet() {
  const rankOpts = ['Cdt','Cpl','Sgt','FS','CWO'].map(r => '<option value="' + r + '"' + (r==='Cdt'?' selected':'') + '>' + r + '</option>').join('');
  showModal(mHead('ADD CADET') + '<div class="modal-body">' +
    '<div id="cadet-error"></div>' +
    '<div class="alert alert-info" style="margin-bottom:16px">Service number is auto-generated (1701xxx). Leave blank to auto-assign, or enter manually to re-enrol an existing cadet.</div>' +
    '<div class="grid-2">' +
      '<div class="form-group"><label>Forename</label><input id="c-fore" autofocus></div>' +
      '<div class="form-group"><label>Surname</label><input id="c-sur"></div>' +
      '<div class="form-group"><label>Rank</label><select id="c-rank">' + rankOpts + '</select></div>' +
      '<div class="form-group"><label>Gender</label><select id="c-gender"><option value="male">Male</option><option value="female">Female</option><option value="other">Other</option></select></div>' +
      '<div class="form-group"><label>Flight (Optional)</label><input id="c-flight" placeholder="e.g. Alpha"></div>' +
      '<div class="form-group"><label>Service Number <span style="font-weight:400;color:var(--text3)">(optional — leave blank to auto-assign)</span></label><input id="c-svcno" placeholder="e.g. 2501701" style="font-family:var(--mono)"></div>' +
    '</div></div>' +
    '<div class="modal-footer"><button class="btn btn-ghost" id="cadet-back">← Back</button><button class="btn btn-primary" id="cadet-submit">Add Cadet</button></div>');
  document.getElementById('cadet-back').onclick = openManageCadets;
  document.getElementById('cadet-submit').onclick = async () => {
    const btn=document.getElementById('cadet-submit'); btn.disabled=true; btn.textContent='Adding...';
    try {
      // Use manual service number if provided, otherwise auto-generate
      let svcNum = document.getElementById('c-svcno').value.trim();
      if (!svcNum) {
        const existing = S.cadets || await loadCadets();
        const nums = existing.map(c => {
          const m = String(c.service_number||'').match(/^1701(\d+)$/);
          return m ? parseInt(m[1]) : 0;
        });
        const nextNum = (Math.max(0, ...nums) + 1).toString().padStart(3, '0');
        svcNum = '1701' + nextNum;
      }
      await POST('/cadets/', {
        service_number: svcNum,
        rank: document.getElementById('c-rank').value,
        forename: document.getElementById('c-fore').value.trim(),
        surname: document.getElementById('c-sur').value.trim(),
        gender: document.getElementById('c-gender').value,
        flight: document.getElementById('c-flight').value.trim()||null
      });
      S.cadets=null;
      showModal(mHead('ADD CADET') + '<div class="modal-body"><div class="alert alert-success">✓ Cadet added successfully. Service number: <strong>' + svcNum + '</strong></div></div><div class="modal-footer"><button class="btn btn-ghost" data-action="close">Done</button><button class="btn btn-primary" data-action="addcadet">Add Another</button></div>');
    } catch(e) { btn.disabled=false; btn.textContent='Add Cadet'; showError('cadet-error',e.message); }
  };
}

async function openBulkStock() {
  const items = await loadItems();
  await loadStock();
  const stockMap = {};
  (S.stock || []).forEach(s => { stockMap[`${s.item_id}-${s.size_id}`] = s.quantity; });

  function countQueued() {
    return [...document.querySelectorAll('.size-qty-input')].filter(i => parseInt(i.value) > 0).length;
  }
  function updateSubmitBtn() {
    const count = countQueued();
    const btn = document.getElementById('stk-submit');
    if (!btn) return;
    btn.disabled = count === 0;
    btn.textContent = count > 0 ? `Add to Stock (${count} sizes)` : 'Add to Stock';
  }
  function updateItemBadge(itemId) {
    const total = [...document.querySelectorAll(`.size-qty-input[data-item="${itemId}"]`)].reduce((s, i) => s + (parseInt(i.value) || 0), 0);
    const badge = document.getElementById(`bulk-badge-${itemId}`);
    const header = document.querySelector(`.bulk-item-header[data-id="${itemId}"]`);
    if (badge) { badge.style.display = total > 0 ? 'inline-block' : 'none'; badge.textContent = `+${total}`; }
    if (header) header.style.background = total > 0 ? 'var(--green-light)' : 'var(--bg2)';
  }

  const itemRows = items.map(item => {
    const sizeInputs = item.sizes.map(s => {
      const cur = stockMap[`${item.id}-${s.id}`] ?? 0;
      return `<div style="border:1px solid var(--border);border-radius:8px;padding:10px">
        <div style="font-family:var(--mono);font-size:12px;color:var(--text2);margin-bottom:2px">${s.size_label}</div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:6px">${cur} in stock</div>
        <input type="number" class="size-qty-input" data-item="${item.id}" data-size="${s.id}" placeholder="0" min="0" style="text-align:center;font-size:14px;font-weight:700;padding:6px">
      </div>`;
    }).join('');
    return `<div class="bulk-item-row" data-name="${item.short_name.toLowerCase()}" style="border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden">
      <div class="bulk-item-header" data-id="${item.id}" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;background:var(--bg2)">
        <div><div style="font-weight:700;font-size:14px">${item.short_name}</div><div style="font-size:11px;color:var(--text3)">${item.category||''} · ${item.sizes.length} sizes</div></div>
        <div style="display:flex;align-items:center;gap:8px"><span id="bulk-badge-${item.id}" class="badge badge-green" style="display:none"></span><span style="color:var(--text3);font-size:18px">›</span></div>
      </div>
      <div id="bulk-sizes-${item.id}" style="display:none;padding:14px;background:var(--bg);border-top:1px solid var(--border)">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px">${sizeInputs}</div>
      </div>
    </div>`;
  }).join('');

  showModal(`${mHead('RECEIVE DELIVERY')}<div class="modal-body">
    <div class="alert alert-info" style="margin-bottom:16px">Tap items to expand and enter received quantities. Multiple items can be open at once — submit them all in one go.</div>
    <div id="stock-error"></div>
    <div class="form-group" style="margin-bottom:12px">
      <label style="font-size:12px">Delivery Reference <span style="font-weight:400;color:var(--text3)">(optional — shown in audit log)</span></label>
      <input id="stk-ref" placeholder="e.g. DEL/2025/001 or RAF Stores Stafford" style="font-size:13px">
    </div>
    <div class="search-wrap" style="margin-bottom:12px"><span class="search-icon">🔍</span><input id="stk-search" placeholder="Search items..." type="text"></div>
    <div style="display:flex;flex-direction:column;gap:6px">${itemRows}</div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" data-action="admin">← Back</button>
    <button class="btn btn-primary" id="stk-submit" disabled>Add to Stock</button>
  </div>`, true);

  document.getElementById('stk-search')?.addEventListener('input', e => {
    const s = e.target.value.toLowerCase();
    document.querySelectorAll('.bulk-item-row').forEach(row => { row.style.display = row.dataset.name.includes(s) ? '' : 'none'; });
  });

  document.querySelectorAll('.bulk-item-header').forEach(h => {
    h.onclick = () => {
      const sizes = document.getElementById('bulk-sizes-' + h.dataset.id);
      if (!sizes) return;
      sizes.style.display = sizes.style.display === 'none' ? 'block' : 'none';
    };
  });

  document.querySelectorAll('.size-qty-input').forEach(inp => {
    inp.addEventListener('input', () => { updateItemBadge(inp.dataset.item); updateSubmitBtn(); });
  });

  document.getElementById('stk-submit')?.addEventListener('click', async () => {
    const ref = document.getElementById('stk-ref')?.value?.trim() || null;
    const reason = ref ? `Delivery: ${ref}` : 'Delivery received';
    const adj = [];
    document.querySelectorAll('.size-qty-input').forEach(inp => { const q = parseInt(inp.value); if (q > 0) adj.push({ item_id: parseInt(inp.dataset.item), size_id: parseInt(inp.dataset.size), quantity: q, reason }); });
    if (adj.length === 0) { showError('stock-error', 'Please enter at least one quantity'); return; }
    const btn = document.getElementById('stk-submit'); btn.disabled = true; btn.textContent = 'Adding stock...';
    try {
      await POST('/stock/bulk-adjust', adj); S.stock = null;
      const itemCount = new Set(adj.map(a => a.item_id)).size;
      showModal(`${mHead('DELIVERY RECEIVED')}<div class="modal-body">
        <div class="alert alert-success">✓ ${adj.length} size${adj.length!==1?'s':''} across ${itemCount} item${itemCount!==1?'s':''} added to inventory.</div>
      </div><div class="modal-footer">
        <button class="btn btn-ghost" data-action="close">Done</button>
        <button class="btn btn-primary" id="stk-another">Receive Another Delivery</button>

      document.getElementById('stk-another').onclick = openBulkStock;
    } catch(e) { btn.disabled = false; btn.textContent = 'Add to Stock'; showError('stock-error', e.message); }
  });
}

async function openManageCadets() {
  const cadets = await loadCadets();
  const sortFn = (a,b) => a.surname.localeCompare(b.surname) || a.forename.localeCompare(b.forename);
  const active = cadets.filter(c => c.active).sort(sortFn);
  const inactive = cadets.filter(c => !c.active).sort(sortFn);
  const flights = [...new Set(active.map(c=>c.flight).filter(Boolean))].sort();
  let mcFlight = null;

  function getFilteredActive(searchStr) {
    let list = active;
    if (mcFlight) list = list.filter(c => c.flight === mcFlight);
    if (searchStr) list = list.filter(c => (c.surname+c.forename+(c.flight||'')+(c.service_number||'')).toLowerCase().includes(searchStr));
    return list;
  }

  function renderManageCadets() {
    showModal(`${mHead('MANAGE CADETS')}<div class="modal-body">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
        <button class="btn btn-primary" id="mc-addcadet">+ Add Cadet</button>
        <button class="btn btn-ghost" id="mc-import">📥 Import CSV</button>
        <a id="mc-template" download="cadet-import-template.csv" href="data:text/csv;charset=utf-8,service_number%2Crank%2Cforename%2Csurname%2Cgender%2Cflight%0A2501701%2CCadet%2CJane%2CSmith%2Cfemale%2CA" class="btn btn-ghost" style="text-decoration:none">⬇ CSV Template</a>
      </div>
      ${flights.length>1?`<div id="mc-flight-chips" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
        ${flights.map(f=>`<button class="btn btn-ghost mc-flight-chip" data-flight="${f}" style="padding:4px 12px;font-size:12px">${f}</button>`).join('')}
      </div>`:''}
      <div class="search-wrap"><span class="search-icon">🔍</span><input id="mc-search" placeholder="Search by name or service number..." type="text"></div>

      <div class="section-label" style="margin-top:16px">Active Cadets <span id="mc-active-count" style="font-weight:400;color:var(--text3)">(${active.length})</span></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Service No</th><th>Name</th><th>Flight</th><th>Actions</th></tr></thead>
        <tbody id="mc-active-tbody">${activeTableHTML(active)}</tbody>
      </table></div>

      ${inactive.length > 0 ? `
      <div class="section-label" style="margin-top:24px">Inactive Cadets <span style="font-weight:400;color:var(--text3)">(${inactive.length})</span></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Service No</th><th>Name</th><th>Flight</th><th>Actions</th></tr></thead>
        <tbody id="mc-inactive-tbody">${inactiveTableHTML(inactive)}</tbody>
      </table></div>` : ''}
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" data-action="admin">← Back</button><button class="btn btn-ghost" id="mc-export">📥 Export CSV</button></div>`, true);

    document.getElementById('mc-addcadet').onclick = openAddCadet;
    document.getElementById('mc-import').onclick = openImportCadets;
    document.getElementById('mc-export').onclick = () => {
      const header = 'service_number,rank,forename,surname,gender,flight,status\n';
      const rows = cadets.map(c =>
        [c.service_number||'', c.rank||'', c.forename, c.surname, c.gender||'', c.flight||'', c.active?'active':'inactive']
          .map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')
      ).join('\n');
      const blob = new Blob([header + rows], { type:'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = '1701-cadets.csv'; a.click();
      URL.revokeObjectURL(url);
    };

    function refreshMcTable() {
      const s = document.getElementById('mc-search')?.value?.toLowerCase()||'';
      const fa = getFilteredActive(s);
      const fi = inactive.filter(c => !s || (c.surname+c.forename+(c.flight||'')+(c.service_number||'')).toLowerCase().includes(s));
      document.getElementById('mc-active-tbody').innerHTML = activeTableHTML(fa);
      const countEl = document.getElementById('mc-active-count');
      if (countEl) countEl.textContent = `(${fa.length}${fa.length<active.length?' of '+active.length:''})`;
      if (document.getElementById('mc-inactive-tbody')) document.getElementById('mc-inactive-tbody').innerHTML = inactiveTableHTML(fi);
      document.querySelectorAll('.mc-flight-chip').forEach(chip => {
        const on = chip.dataset.flight === mcFlight;
        chip.style.background = on ? 'var(--blue)' : '';
        chip.style.color = on ? 'white' : '';
        chip.style.borderColor = on ? 'var(--blue)' : '';
      });
      bindCadetTableActions();
    }

    document.getElementById('mc-search').oninput = refreshMcTable;
    document.querySelectorAll('.mc-flight-chip').forEach(chip => {
      chip.onclick = () => { mcFlight = mcFlight===chip.dataset.flight ? null : chip.dataset.flight; refreshMcTable(); };
    });

    bindCadetTableActions();
  }

  function activeTableHTML(list) {
    if (!list.length) return '<tr><td colspan="4"><div class="empty">No active cadets found</div></td></tr>';
    return list.map(c => `<tr>
      <td style="font-family:var(--mono);font-size:12px;color:var(--text2)">${c.service_number||'—'}</td>
      <td><strong>${c.surname}</strong>, ${c.forename} <span style="color:var(--text3);font-size:12px">${c.rank}</span></td>
      <td style="font-size:13px">${c.flight||'—'}</td>
      <td style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" data-view="${c.id}">View</button><button class="btn btn-danger btn-sm mc-deactivate" data-id="${c.id}" data-name="${c.rank} ${c.surname}">Deactivate</button></td>
    </tr>`).join('');
  }

  function inactiveTableHTML(list) {
    if (!list.length) return '<tr><td colspan="4"><div class="empty">No inactive cadets found</div></td></tr>';
    return list.map(c => `<tr style="opacity:0.7">
      <td style="font-family:var(--mono);font-size:12px;color:var(--text2)">${c.service_number||'—'}</td>
      <td><strong>${c.surname}</strong>, ${c.forename} <span style="color:var(--text3);font-size:12px">${c.rank}</span></td>
      <td style="font-size:13px">${c.flight||'—'}</td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" data-view="${c.id}">View Record</button>
        <button class="btn btn-ghost btn-sm mc-reactivate" data-id="${c.id}">Reactivate</button>
      </td>
    </tr>`).join('');
  }

  function bindCadetTableActions() {
    document.querySelectorAll('[data-view]').forEach(btn => {
      btn.onclick = () => openCadetRecord(parseInt(btn.dataset.view));
    });
    document.querySelectorAll('.mc-deactivate').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm(`Deactivate ${btn.dataset.name}?\n\nThey must have no outstanding kit. Their history will be kept.`)) return;
        btn.disabled = true; btn.textContent = 'Working...';
        try {
          await PATCH(`/cadets/${btn.dataset.id}/deactivate`);
          S.cadets = null;
          await loadCadets();
          renderManageCadets();
        } catch(e) { alert('Error: ' + e.message); btn.disabled=false; btn.textContent='Deactivate'; }
      };
    });

    document.querySelectorAll('.mc-reactivate').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm('Reactivate this cadet?')) return;
        btn.disabled = true; btn.textContent = 'Working...';
        try {
          await PATCH(`/cadets/${btn.dataset.id}/reactivate`);
          S.cadets = null;
          await loadCadets();
          renderManageCadets();
        } catch(e) { alert('Error: ' + e.message); btn.disabled=false; btn.textContent='Reactivate'; }
      };
    });
  }

  renderManageCadets();
}

async function openImportCadets() {
  showModal(`${mHead('IMPORT CADETS — CSV')}
  <div class="modal-body">
    <div class="alert alert-warning" style="margin-bottom:16px">
      ⚠ Each row will be added as a new cadet. Duplicates (same service number) will be skipped.
    </div>
    <div style="background:var(--blue-pale);border-radius:var(--r);padding:14px;margin-bottom:16px;font-size:13px">
      <strong>Required columns:</strong> service_number, rank, forename, surname, gender (male/female)<br>
      <strong>Optional columns:</strong> flight<br>
      <span style="color:var(--text3);font-size:12px">Download the template above for the correct format.</span>
    </div>
    <div class="form-group">
      <label>Select CSV file</label>
      <input type="file" id="import-file" accept=".csv" style="padding:8px;border:1.5px solid var(--border);border-radius:var(--r);width:100%;font-family:var(--body);font-size:13px;cursor:pointer">
    </div>
    <div id="import-preview" style="margin-top:12px"></div>
    <div id="import-error"></div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" id="imp-back">← Back</button>
    <button class="btn btn-primary" id="imp-run" disabled>Import</button>
  </div>`, true);

  document.getElementById('imp-back').onclick = openManageCadets;

  let parsedRows = [];

  document.getElementById('import-file').onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const lines = ev.target.result.trim().split('\n').filter(l => l.trim());
      if (lines.length < 2) { document.getElementById('import-error').innerHTML = '<div class="alert alert-danger">File appears empty or has no data rows.</div>'; return; }
      const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
      const required = ['service_number','rank','forename','surname','gender'];
      const missing = required.filter(r => !headers.includes(r));
      if (missing.length) { document.getElementById('import-error').innerHTML = `<div class="alert alert-danger">Missing columns: ${missing.join(', ')}</div>`; return; }
      parsedRows = [];
      const errors = [];
      lines.slice(1).forEach((line, i) => {
        const vals = line.split(',').map(v => v.trim().replace(/^"|"$/g,''));
        const row = {};
        headers.forEach((h, idx) => row[h] = vals[idx] || '');
        if (!row.service_number || !row.forename || !row.surname) { errors.push(`Row ${i+2}: missing required fields`); return; }
        if (!['male','female'].includes(row.gender?.toLowerCase())) { errors.push(`Row ${i+2}: gender must be 'male' or 'female'`); return; }
        parsedRows.push({ service_number: row.service_number, rank: row.rank||'Cadet', forename: row.forename, surname: row.surname, gender: row.gender.toLowerCase(), flight: row.flight||null });
      });
      const previewHTML = parsedRows.length > 0
        ? `<div class="section-label">${parsedRows.length} cadet(s) ready to import</div>
           <div class="table-wrap" style="max-height:200px;overflow-y:auto"><table>
             <thead><tr><th>Svc No</th><th>Rank</th><th>Name</th><th>Gender</th><th>Flight</th></tr></thead>
             <tbody>${parsedRows.map(r => `<tr><td style="font-family:var(--mono);font-size:12px">${r.service_number}</td><td>${r.rank}</td><td>${r.forename} ${r.surname}</td><td>${r.gender}</td><td>${r.flight||'—'}</td></tr>`).join('')}</tbody>
           </table></div>`
        : '';
      document.getElementById('import-preview').innerHTML = previewHTML + (errors.length ? `<div class="alert alert-warning" style="margin-top:8px">${errors.length} row(s) skipped: ${errors.slice(0,3).join('; ')}${errors.length>3?'…':''}</div>` : '');
      document.getElementById('import-error').innerHTML = '';
      document.getElementById('imp-run').disabled = parsedRows.length === 0;
    };
    reader.readAsText(file);
  };

  document.getElementById('imp-run').onclick = async () => {
    const btn = document.getElementById('imp-run'); btn.disabled = true; btn.textContent = 'Importing...';
    let added = 0, skipped = 0, failed = [];
    for (const row of parsedRows) {
      try { await POST('/cadets/', row); added++; }
      catch(e) { if (e.message.toLowerCase().includes('already') || e.message.includes('409') || e.message.includes('duplicate')) skipped++; else failed.push(row.surname + ': ' + e.message); }
    }
    S.cadets = null;
    showModal(`${mHead('IMPORT COMPLETE')}<div class="modal-body">
      <div class="alert alert-success">✓ ${added} cadet(s) imported successfully.</div>
      ${skipped > 0 ? `<div class="alert alert-warning" style="margin-top:8px">⚠ ${skipped} skipped (service number already exists).</div>` : ''}
      ${failed.length > 0 ? `<div class="alert alert-danger" style="margin-top:8px">✕ ${failed.length} failed: ${failed.slice(0,3).join('; ')}</div>` : ''}
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" data-action="close">Done</button><button class="btn btn-primary" id="imp-manage">View Cadets</button></div>`, true);
    document.getElementById('imp-manage').onclick = openManageCadets;
  };
}
