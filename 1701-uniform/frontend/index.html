        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div style="font-family:var(--head);font-size:22px;color:var(--blue)">${selectedItem.short_name}</div>
          <button class="btn btn-ghost btn-sm" id="adj-change">Change Item</button>
        </div>
        <div class="form-group" style="margin-bottom:12px">
          <label>Reason for Removal <span style="color:var(--red)">*</span></label>
          <select id="adj-reason" style="font-size:13px">
            <option value="">— Select reason —</option>
            ${['Damaged in use','Lost / stolen','Written off','Audit correction','Returned to stores','Other'].map(r=>`<option>${r}</option>`).join('')}
          </select>
          <div id="adj-other-wrap" style="display:none;margin-top:6px">
            <input id="adj-other-text" placeholder="Please describe…" style="font-size:13px;width:100%">
          </div>
        </div>
        <div class="section-label">Select Size and Quantity to Remove</div>
        <div id="adj-error"></div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">
          ${selectedItem.sizes.map(s => {
            const qty = (S.stock||[]).find(st=>st.item_id===selectedItem.id&&st.size_id===s.id)?.quantity??0;
            return `<div style="border:1px solid var(--border);border-radius:8px;padding:12px">
              <div style="font-family:var(--mono);font-size:12px;color:var(--text2);margin-bottom:4px">${s.size_label}</div>
              <div style="font-size:13px;color:${qty===0?'var(--red)':'var(--green)'};font-weight:700;margin-bottom:8px">${qty} in stock</div>
              ${qty > 0 ? `
                <input type="number" class="adj-qty" data-item="${selectedItem.id}" data-size="${s.id}" data-max="${qty}" placeholder="Remove qty" min="1" max="${qty}" style="font-size:13px;padding:6px 10px">
              ` : `<div style="font-size:12px;color:var(--text3)">None in stock</div>`}
            </div>`;
          }).join('')}
        </div>
      `}
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-action="admin">← Back</button>
      ${selectedItem ? `<button class="btn btn-danger" id="adj-submit">Remove Stock</button>` : ''}
    </div>`, true);

    document.getElementById('adj-change')?.addEventListener('click', () => { selectedItem=null; renderAdjust(); });
    document.getElementById('adj-reason')?.addEventListener('change', e => {
      const wrap = document.getElementById('adj-other-wrap');
      if (wrap) wrap.style.display = e.target.value === 'Other' ? '' : 'none';
    });
    document.getElementById('adj-search')?.addEventListener('input', e => {
      const s = e.target.value.toLowerCase();
      document.querySelectorAll('#adj-item-grid .item-card[data-name]').forEach(card => {
        card.style.display = card.dataset.name.includes(s) ? '' : 'none';
      });
    });
    document.querySelectorAll('.item-card').forEach(c => { c.onclick = () => { selectedItem=items.find(i=>i.id===parseInt(c.dataset.id)); renderAdjust(); }; });

    document.getElementById('adj-submit')?.addEventListener('click', async () => {
      const reasonSel = document.getElementById('adj-reason')?.value?.trim() || '';
      if (!reasonSel) { showError('adj-error', 'Please select a reason for the removal'); return; }
      const otherText = document.getElementById('adj-other-text')?.value?.trim() || '';
      if (reasonSel === 'Other' && !otherText) { showError('adj-error', 'Please describe the reason'); return; }
      const reason = reasonSel === 'Other' ? `Other: ${otherText}` : reasonSel;
      const adjustments = [];
      let hasError = false;
      document.querySelectorAll('.adj-qty').forEach(inp => {
        const qty = parseInt(inp.value);
        const max = parseInt(inp.dataset.max);
        if (!qty || qty <= 0) return;
        if (qty > max) { showError('adj-error', `Cannot remove more than ${max} from a size`); hasError=true; return; }
        adjustments.push({ item_id: parseInt(inp.dataset.item), size_id: parseInt(inp.dataset.size), quantity: -qty, reason });
      });
      if (hasError) return;
      if (adjustments.length === 0) { showError('adj-error', 'Please enter a quantity to remove for at least one size'); return; }

      const btn = document.getElementById('adj-submit');
      btn.disabled = true; btn.textContent = 'Removing...';
      try {
        await POST('/stock/bulk-adjust', adjustments);
        S.stock = null;
        showModal(`${mHead('ADJUST STOCK')}<div class="modal-body">
          <div class="alert alert-success">&#10003; Stock updated. ${adjustments.length} size${adjustments.length!==1?'s':''} adjusted.</div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" data-action="close">Done</button>
          <button class="btn btn-primary" id="adj-another">Adjust More Stock</button>
        </div>`);
        document.getElementById('adj-another').onclick = openRemoveStock;
      } catch(e) { btn.disabled=false; btn.textContent='Remove Stock'; showError('adj-error', e.message); }
    });
  }

  renderAdjust();
}


async function openInactiveCadets() {
  await loadCadets();
  const inactive = (S.cadets||[]).filter(c => !c.active)
    .sort((a,b) => a.surname.localeCompare(b.surname) || a.forename.localeCompare(b.forename));

  showModal(`${mHead('INACTIVE CADETS')}<div class="modal-body">
    <div class="alert alert-info">These cadets have been deactivated. Their kit history and audit records are fully preserved.</div>
    ${inactive.length === 0
      ? '<div class="empty">No inactive cadets on record.</div>'
      : `<div class="search-wrap" style="margin-bottom:12px"><span class="search-icon">🔍</span><input id="ic-search" placeholder="Search by name or service number..." type="text"></div>
      <div class="section-label">Inactive Cadets <span id="ic-count" style="font-weight:400;color:var(--text3)">(${inactive.length})</span></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Service No</th><th>Name</th><th>Gender</th><th>Flight</th><th>Actions</th></tr></thead>
        <tbody id="ic-tbody">
          ${inactive.map(c => `<tr data-ic-name="${(c.surname+' '+c.forename+' '+(c.service_number||'')).toLowerCase()}">
            <td style="font-family:var(--mono);font-size:12px;color:var(--text2)">${c.service_number||'—'}</td>
            <td><strong>${c.surname}</strong>, ${c.forename} <span style="color:var(--text3);font-size:12px">${c.rank}</span></td>
            <td style="font-size:13px">${c.gender}</td>
            <td style="font-size:13px">${c.flight||'—'}</td>
            <td style="display:flex;gap:6px">
              <button class="btn btn-ghost btn-sm" data-view="${c.id}">View Record</button>
              <button class="btn btn-ghost btn-sm reactivate-btn" data-id="${c.id}" data-name="${c.rank} ${c.surname}">Reactivate</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table></div>`
    }
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" data-action="admin">← Back</button>
  </div>`, true);

  document.getElementById('ic-search')?.addEventListener('input', e => {
    const s = e.target.value.toLowerCase();
    let vis = 0;
    document.querySelectorAll('#ic-tbody tr').forEach(row => {
      const show = !s || (row.dataset.icName||'').includes(s);
      row.style.display = show ? '' : 'none';
      if (show) vis++;
    });
    const cnt = document.getElementById('ic-count');
    if (cnt) cnt.textContent = `(${vis}${vis < inactive.length ? ' of ' + inactive.length : ''})`;
  });

  document.querySelectorAll('[data-view]').forEach(btn => {
    btn.onclick = () => openCadetRecord(parseInt(btn.dataset.view));
  });

  document.querySelectorAll('.reactivate-btn').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm(`Reactivate ${btn.dataset.name}?`)) return;
      btn.disabled = true; btn.textContent = 'Working...';
      try {
        await PATCH(`/cadets/${btn.dataset.id}/reactivate`);
        S.cadets = null;
        await loadCadets();
        openInactiveCadets();
      } catch(e) { alert('Error: ' + e.message); btn.disabled=false; btn.textContent='Reactivate'; }
    };
  });
}

async function openFeedback() {
  const items = await GET('/feedback/');
  const isAdmin = S.user.is_admin;
  const open = items.filter(f => f.status === 'open');
  const replied = items.filter(f => f.status === 'replied');
  const closed = items.filter(f => f.status === 'closed');

  function statusBadge(s) {
    if (s === 'open') return '<span class="badge badge-gold">Open</span>';
    if (s === 'replied') return '<span class="badge badge-green">Replied</span>';
    return '<span class="badge badge-grey">Closed</span>';
  }

  function catBadge(c) {
    const map = { 'Stock Request': 'badge-blue', 'Issue / Problem': 'badge-gold', 'General': 'badge-grey', 'Other': 'badge-grey' };
    return '<span class="badge ' + (map[c] || 'badge-grey') + '" style="margin-right:6px">' + c + '</span>';
  }

  function itemHTML(f) {
    return '<div style="border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">' +
        '<div style="font-weight:700;font-size:14px">' + f.subject + '</div>' +
        '<div style="display:flex;gap:6px;align-items:center">' + catBadge(f.category) + statusBadge(f.status) + '</div>' +
      '</div>' +
      '<div style="font-size:12px;color:var(--text3);margin-bottom:8px">From: ' + (f.submitted_by_rank ? f.submitted_by_rank + ' ' : '') + f.submitted_by + ' · ' + fmt(f.created_at) + '</div>' +
      '<div style="font-size:13px;color:var(--text2);background:var(--bg);padding:10px;border-radius:6px;margin-bottom:8px">' + f.message.split('\n').join('<br>') + '</div>' +
      (f.admin_reply ? '<div style="font-size:12px;color:var(--text3);margin-bottom:4px">Reply from ' + f.replied_by + ' · ' + fmt(f.replied_at) + '</div><div style="font-size:13px;background:var(--green-light);color:var(--green);padding:10px;border-radius:6px;margin-bottom:8px">' + f.admin_reply.split('\n').join('<br>') + '</div>' : '') +
      (isAdmin && f.status === 'open' ? '<div style="display:flex;gap:8px;align-items:flex-end"><textarea id="reply-' + f.id + '" rows="2" placeholder="Type a reply..." style="flex:1;font-size:13px"></textarea><button class="btn btn-primary btn-sm feedback-reply-btn" data-id="' + f.id + '">Reply</button><button class="btn btn-ghost btn-sm feedback-close-btn" data-id="' + f.id + '">Close</button></div>' : '') +
      (isAdmin && f.status === 'replied' ? '<button class="btn btn-ghost btn-sm feedback-close-btn" data-id="' + f.id + '">Mark Closed</button>' : '') +
    '</div>';
  }

  const submitForm = '<div style="background:var(--blue-pale);border-radius:var(--r);padding:16px;margin-bottom:16px">' +
    '<div class="section-label" style="margin-bottom:12px">Submit a Note to Admin</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">' +
      '<input id="fb-subject" placeholder="Subject..." style="font-size:13px">' +
      '<select id="fb-category" style="font-size:13px"><option value="General">General</option><option value="Stock Request">Stock Request</option><option value="Issue / Problem">Issue / Problem</option><option value="Other">Other</option></select>' +
    '</div>' +
    '<textarea id="fb-message" rows="3" placeholder="Describe your note or request..." style="font-size:13px;margin-bottom:8px"></textarea>' +
    '<button class="btn btn-primary btn-sm" id="fb-submit">Submit Note</button>' +
    '<span id="fb-error" style="color:var(--red);font-size:12px;margin-left:10px"></span>' +
  '</div>';

  // Admin can also submit notes to themselves for record-keeping
  const adminView = (open.length > 0 ? '<div class="section-label">Open (' + open.length + ')</div>' + open.map(itemHTML).join('') : '<div class="alert alert-success" style="margin-bottom:16px">✓ No open notes.</div>') +
    (replied.length > 0 ? '<div class="section-label" style="margin-top:16px">Replied (' + replied.length + ')</div>' + replied.map(itemHTML).join('') : '') +
    (closed.length > 0 ? '<div class="section-label" style="margin-top:16px">Closed (' + closed.length + ')</div>' + closed.map(itemHTML).join('') : '');

  const staffView = submitForm +
    (items.length > 0 ? '<div class="section-label">Your Notes</div>' + items.map(itemHTML).join('') : '<div class="empty">No notes submitted yet.</div>');

  showModal(mHead('💬 NOTES & FEEDBACK') + '<div class="modal-body">' + (isAdmin ? adminView : staffView) + '</div>' +
    '<div class="modal-footer"><button class="btn btn-ghost" data-action="close">Close</button></div>', true);

  // Submit
  document.getElementById('fb-submit')?.addEventListener('click', async () => {
    const subject = document.getElementById('fb-subject').value.trim();
    const message = document.getElementById('fb-message').value.trim();
    const category = document.getElementById('fb-category').value;
    const err = document.getElementById('fb-error');
    if (!subject || !message) { if(err) err.textContent = 'Please fill in subject and message'; return; }
    try {
      await POST('/feedback/', { subject, message, category });
      openFeedback();
    } catch(e) { if(err) err.textContent = e.message; }
  });

  // Admin reply
  document.querySelectorAll('.feedback-reply-btn').forEach(btn => {
    btn.onclick = async () => {
      const reply = document.getElementById('reply-' + btn.dataset.id)?.value.trim();
      if (!reply) return;
      await PATCH('/feedback/' + btn.dataset.id + '/reply', { reply });
      refreshFeedbackBadge();
      openFeedback();
    };
  });

  // Close
  document.querySelectorAll('.feedback-close-btn').forEach(btn => {
    btn.onclick = async () => {
      await PATCH('/feedback/' + btn.dataset.id + '/close', {});
      refreshFeedbackBadge();
      openFeedback();
    };
  });

  refreshFeedbackBadge();
}

async function loadHomeDashboard() {
  const el = document.getElementById('home-stats');
  if (!el) return;
  try {
    const d = await GET('/dashboard/');
    const lowStockCount = (d.low_stock || []).length;
    const kitGapCount = typeof d.cadets_missing_kit === 'number' ? d.cadets_missing_kit : (d.missing_kit_detail || []).length;
    const stats = [
      { label:'Active Cadets', value: d.total_active_cadets, color:'var(--blue)' },
      { label:'Items Outstanding', value: d.total_items_outstanding ?? d.total_items_issued ?? 0, color:'var(--green)' },
      { label:'Cadets w/ Kit Gap', value: kitGapCount, color: kitGapCount > 0 ? 'var(--red)' : 'var(--green)', action: kitGapCount > 0 ? 'reports' : '' },
      { label:'Low Stock Lines', value: lowStockCount, color: lowStockCount > 0 ? '#d97706' : 'var(--green)', warn: lowStockCount > 0, action: lowStockCount > 0 ? 'stock' : '' },
    ];
    el.innerHTML = stats.map(s => `<div data-stat-action="${s.action||''}" style="background:var(--bg2);backdrop-filter:blur(4px);border:1px solid ${s.warn?'#d97706':'var(--border)'};border-radius:10px;padding:12px 20px;min-width:110px;text-align:center;position:relative;${s.action?'cursor:pointer':''}">
      ${s.warn?'<div style="position:absolute;top:-6px;right:-6px;width:12px;height:12px;background:#d97706;border-radius:50%;border:2px solid var(--bg)"></div>':''}
      <div style="font-family:var(--head);font-size:28px;color:${s.color};line-height:1">${s.value}</div>
      <div style="font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-top:4px">${s.label}</div>
    </div>`).join('');
    el.querySelectorAll('[data-stat-action]').forEach(card => {
      const action = card.dataset.statAction;
      if (!action) return;
      card.addEventListener('click', () => {
        if (action === 'reports') openReports();
        else if (action === 'stock') openSearchUniform();
      });
    });
    // Update Search Stock tile badge
    const searchBtn = document.getElementById('btn-search');
    if (searchBtn && lowStockCount > 0) {
      searchBtn.querySelector('.home-btn-sub').textContent = `${lowStockCount} line${lowStockCount===1?'':'s'} running low`;
      searchBtn.style.borderColor = '#d97706';
    }

    // Recent activity feed
    const recentEl = document.getElementById('home-recent');
    if (recentEl && d.recent_activity && d.recent_activity.length > 0) {
      const actionColor = a => a.includes('ISSUE') ? 'var(--blue)' : a.includes('RETURN') ? 'var(--green)' : a.includes('STOCK') ? '#d97706' : 'var(--text3)';
      const actionIcon = a => a.includes('ISSUE') ? '📤' : a.includes('RETURN') ? '📥' : a.includes('STOCK') ? '📦' : a.includes('CADET') ? '👤' : '📋';
      recentEl.innerHTML = `<div style="font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px">Recent Activity</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${d.recent_activity.slice(0,6).map(a => `<div style="display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px">
            <span style="font-size:16px">${actionIcon(a.action)}</span>
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;font-weight:600;color:${actionColor(a.action)}">${a.action}</div>
              <div style="font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.details||'—'}</div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">${fmt(a.timestamp)}</div>
              <div style="font-size:10px;color:var(--text3)">${a.user}</div>
            </div>
          </div>`).join('')}
        </div>`;
    }
  } catch { /* silently skip if backend unreachable */ }
}


async function openBadgeTracker(startView=null, startCat=null) {
  const [cadets, allBadges] = await Promise.all([loadCadets(), GET('/badges/items')]);
  const activeCadets = cadets.filter(c => c.active);
  const badges = allBadges.filter(b => b.routine_stock || b.quantity > 0);

  const categories = ['Rank Slides', 'Misc', 'Classification', 'PTS'];
  const catIcons = { 'Rank Slides': '🎖️', 'Misc': '📌', 'Classification': '⭐', 'PTS': '🏅' };
  const catDesc = {
    'Rank Slides': 'Cadet & Staff Cadet rank slides (pairs)',
    'Misc': 'Squadron identifier, beret badge, TRF, lanyard',
    'Classification': '1st Class, Leading, Senior, Master',
    'PTS': 'Progressive Training Standard badges'
  };

  const RANK_ORDER = ['Corporal', 'Sergeant', 'Flight Sergeant', 'Cadet Warrant Officer',
    'Corporal – Staff Cadet', 'Sergeant – Staff Cadet', 'Flight Sergeant – Staff Cadet', 'Cadet Warrant Officer – Staff Cadet'];
  const CLASS_ORDER = ['1st Class', 'Leading', 'Senior', 'Master'];

  let selectedCat = startCat || null;
  let view = startView || 'home'; // 'home', 'stock', 'issue', 'cadet'
  let selectedCadet = null;
  let selectedBadge = null;
  let addStockBadgeId = null;
  let badgeCadetFlight = null;

  function addStockCell(b) {
    if (addStockBadgeId === b.id) {
      return '<td><input id="stock-qty-input" type="number" min="1" placeholder="Qty" style="width:60px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px"><button class="btn btn-primary btn-sm" id="stock-qty-submit" data-id="' + b.id + '" data-name="' + b.name + '" style="margin-left:4px">Add</button><button class="btn btn-ghost btn-sm" id="stock-qty-cancel" style="margin-left:4px">✕</button></td>';
    }
    return '<td><button class="btn btn-ghost btn-sm badge-add-stock" data-id="' + b.id + '" data-name="' + b.name + '">+ Add Stock</button></td>';
  }

  function getCatBadges(cat) {
    let list = badges.filter(b => b.category === cat);
    if (cat === 'Rank Slides') list = list.sort((a, b) => RANK_ORDER.indexOf(a.name) - RANK_ORDER.indexOf(b.name));
    if (cat === 'Classification') list = list.sort((a, b) => CLASS_ORDER.indexOf(a.name) - CLASS_ORDER.indexOf(b.name));
    return list;
  }

  function catStockCount(cat) {
    return badges.filter(b => b.category === cat).reduce((s, b) => s + b.quantity, 0);
  }

  function homeHTML() {
    const tiles = categories.map(c => {
      const total = catStockCount(c);
      return '<button class="home-btn" data-cat-tile="' + c + '" style="padding:24px;text-align:center">' +
        '<div class="home-btn-icon" style="font-size:28px;width:56px;height:56px">' + catIcons[c] + '</div>' +
        '<div class="home-btn-label" style="font-size:18px">' + c + '</div>' +
        '<div class="home-btn-sub">' + catDesc[c] + '</div>' +
        '<div style="margin-top:8px;font-size:11px;font-family:var(--mono);color:' + (total > 0 ? 'var(--green)' : 'var(--text3)') + '">' + total + ' IN STOCK</div>' +
        '</button>';
    }).join('');

    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">' + tiles + '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">' +
      '<button class="btn btn-ghost" id="bt-cadet-view">👤 View Cadet Badges</button>' +
      '</div>';
  }

  function stockHTML() {
    const list = getCatBadges(selectedCat);
    if (selectedCat === 'PTS') {
      const disciplines = [...new Set(list.map(b => b.subcategory))];
      let rows = '';
      disciplines.forEach(disc => {
        const discBadges = list.filter(b => b.subcategory === disc);
        rows += '<tr><td colspan="3" style="background:var(--bg);font-weight:700;font-size:12px;font-family:var(--mono);color:var(--text2);padding:8px 12px;letter-spacing:0.06em">' + disc.toUpperCase() + '</td></tr>';
        discBadges.forEach(b => {
          const level = b.name.split(' – ').pop();
          const levelColor = level === 'Blue' ? '#1d4ed8' : level === 'Bronze' ? '#92400e' : level === 'Silver' ? '#374151' : '#854d0e';
          rows += '<tr><td style="padding-left:24px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + levelColor + ';margin-right:8px;vertical-align:middle"></span>' + level + '</td>';
          rows += '<td><span style="font-size:20px;font-weight:800;color:' + (b.quantity > 0 ? 'var(--green)' : 'var(--red)') + '">' + b.quantity + '</span></td>';
          rows += addStockCell(b) + '</tr>';
        });
      });
      return '<div class="table-wrap"><table><thead><tr><th>Badge</th><th>Stock</th><th>Actions</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
    }
    if (selectedCat === 'Rank Slides') {
      const subcats = [...new Set(list.map(b => b.subcategory || 'Other'))];
      let rows = '';
      subcats.forEach(sub => {
        const subBadges = list.filter(b => (b.subcategory || 'Other') === sub);
        rows += '<tr><td colspan="3" style="background:var(--bg);font-weight:700;font-size:12px;font-family:var(--mono);color:var(--text2);padding:8px 12px;letter-spacing:0.06em">' + sub.toUpperCase() + '</td></tr>';
        subBadges.forEach(b => {
          rows += '<tr><td style="padding-left:24px"><strong>' + b.name.replace(' – Staff Cadet', '') + '</strong></td>';
          rows += '<td><span style="font-size:20px;font-weight:800;color:' + (b.quantity > 0 ? 'var(--green)' : 'var(--red)') + '">' + b.quantity + '</span></td>';
          rows += addStockCell(b) + '</tr>';
        });
      });
      return '<div class="table-wrap"><table><thead><tr><th>Rank Slide (Pairs)</th><th>Stock</th><th>Actions</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
    }
    const rows = list.map(b => '<tr><td><strong>' + b.name + '</strong></td><td><span style="font-size:20px;font-weight:800;color:' + (b.quantity > 0 ? 'var(--green)' : 'var(--red)') + '">' + b.quantity + '</span></td>' + addStockCell(b) + '</tr>').join('');
    return '<div class="table-wrap"><table><thead><tr><th>Badge</th><th>Stock</th><th>Actions</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
  }

  function issueHTML() {
    const list = getCatBadges(selectedCat);
    const catChips = categories.map(c => '<button class="chip' + (selectedCat === c ? ' active' : '') + '" data-cat="' + c + '">' + c + '</button>').join('');
    let badgeList = '';
    if (selectedCat === 'PTS') {
      const disciplines = [...new Set(list.map(b => b.subcategory))];
      disciplines.forEach(disc => {
        const discBadges = list.filter(b => b.subcategory === disc);
        badgeList += '<div style="font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:0.1em;margin:8px 0 4px;text-transform:uppercase">' + disc + '</div>';
        discBadges.forEach(b => {
          const level = b.name.split(' – ').pop();
          const sel = selectedBadge && selectedBadge.id === b.id ? ' selected' : '';
          const op = b.quantity < 1 ? 'style="opacity:0.4"' : '';
          badgeList += '<div class="cadet-item' + sel + '" data-badge-id="' + b.id + '" ' + op + '><div style="font-size:13px;font-weight:600">' + level + '</div><div style="font-size:11px;color:' + (b.quantity > 0 ? 'var(--green)' : 'var(--red)') + '">' + b.quantity + ' in stock</div></div>';
        });
      });
    } else if (selectedCat === 'Rank Slides') {
      const subcats = [...new Set(list.map(b => b.subcategory || 'Other'))];
      subcats.forEach(sub => {
        badgeList += '<div style="font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:0.1em;margin:8px 0 4px;text-transform:uppercase">' + sub + '</div>';
        list.filter(b => (b.subcategory || 'Other') === sub).forEach(b => {
          const sel = selectedBadge && selectedBadge.id === b.id ? ' selected' : '';
          const op = b.quantity < 1 ? 'style="opacity:0.4"' : '';
          badgeList += '<div class="cadet-item' + sel + '" data-badge-id="' + b.id + '" ' + op + '><div style="font-size:13px;font-weight:600">' + b.name.replace(' – Staff Cadet', '') + '</div><div style="font-size:11px;color:' + (b.quantity > 0 ? 'var(--green)' : 'var(--red)') + '">' + b.quantity + ' pairs</div></div>';
        });
      });
    } else {
      list.forEach(b => {
        const sel = selectedBadge && selectedBadge.id === b.id ? ' selected' : '';
        const op = b.quantity < 1 ? 'style="opacity:0.4"' : '';
        badgeList += '<div class="cadet-item' + sel + '" data-badge-id="' + b.id + '" ' + op + '><div style="font-size:13px;font-weight:600">' + b.name + '</div><div style="font-size:11px;color:' + (b.quantity > 0 ? 'var(--green)' : 'var(--red)') + '">' + b.quantity + ' in stock</div></div>';
      });
    }
    const issueFlights = [...new Set(activeCadets.map(c=>c.flight).filter(Boolean))].sort();
    const issueFlightChips = issueFlights.length > 1
      ? '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">' +
        '<button class="chip' + (!badgeCadetFlight ? ' active' : '') + '" data-bif="all">All</button>' +
        issueFlights.map(f => '<button class="chip' + (badgeCadetFlight === f ? ' active' : '') + '" data-bif="' + f + '">' + f + '</button>').join('') +
        '</div>' : '';
    const issueCadets = badgeCadetFlight ? activeCadets.filter(c => c.flight === badgeCadetFlight) : activeCadets;
    const cadetList = issueCadets.map(c => '<div class="cadet-item' + (selectedCadet && selectedCadet.id === c.id ? ' selected' : '') + '" data-cadet-id="' + c.id + '" style="padding:8px 12px"><div style="font-size:13px"><strong>' + c.surname + '</strong>, ' + c.forename + ' <span style="color:var(--text3)">' + c.rank + '</span></div><div style="font-size:11px;font-family:var(--mono);color:var(--text3)">' + c.service_number + '</div></div>').join('');
    const selectedInfo = selectedBadge ? '<div style="background:var(--blue-pale);border-radius:6px;padding:8px 12px;font-size:13px;margin-bottom:8px">Selected: <strong>' + selectedBadge.name + '</strong></div>' : '';
    const issueDisabled = (!selectedBadge || !selectedCadet) ? 'disabled' : '';
    return '<div id="badge-issue-error"></div>' +
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">' + catChips + '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">' +
        '<div><div class="section-label">Select Badge</div><div style="max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:4px">' + badgeList + '</div></div>' +
        '<div><div class="section-label">Select Cadet</div>' + issueFlightChips + '<input id="badge-cadet-search" placeholder="Search cadets..." style="margin-bottom:8px"><div style="max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:4px">' + cadetList + '</div></div>' +
      '</div>' +
      '<div style="margin-top:12px">' + selectedInfo + '<button class="btn btn-primary" id="badge-issue-confirm" ' + issueDisabled + '>Issue Badge to Cadet</button></div>';
  }

  function cadetViewHTML() {
    const cvFlights = [...new Set(activeCadets.map(c=>c.flight).filter(Boolean))].sort();
    const cvFlightChips = cvFlights.length > 1
      ? '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">' +
        '<button class="chip' + (!badgeCadetFlight ? ' active' : '') + '" data-bcf="all">All</button>' +
        cvFlights.map(f => '<button class="chip' + (badgeCadetFlight === f ? ' active' : '') + '" data-bcf="' + f + '">' + f + '</button>').join('') +
        '</div>' : '';
    const cvCadets = badgeCadetFlight ? activeCadets.filter(c => c.flight === badgeCadetFlight) : activeCadets;
    const cadetList = cvCadets.map(c => '<div class="cadet-item' + (selectedCadet && selectedCadet.id === c.id ? ' selected' : '') + '" data-cadet-id2="' + c.id + '" style="padding:8px 12px"><div style="font-size:13px"><strong>' + c.surname + '</strong>, ' + c.forename + ' <span style="color:var(--text3)">' + c.rank + '</span></div><div style="font-size:11px;font-family:var(--mono);color:var(--text3)">' + c.service_number + '</div></div>').join('');
    return '<div class="section-label">Select Cadet</div>' + cvFlightChips + '<input id="badge-cadet-search2" placeholder="Search cadets..." style="margin-bottom:8px"><div style="max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-bottom:16px">' + cadetList + '</div><div id="cadet-badge-history">' + (selectedCadet ? '<div class="loading-text">Select a cadet above</div>' : '<div class="empty">Select a cadet to view their badges</div>') + '</div>';
  }

  function render() {
    let header, body, footer, backBtn;

    if (view === 'home') {
      header = mHead('BADGE TRACKER');
      body = homeHTML();
      footer = '<button class="btn btn-ghost" data-action="close">Close</button>';
    } else if (view === 'stock') {
      header = mHead(catIcons[selectedCat] + ' ' + selectedCat);
      body = '<div style="display:flex;gap:8px;margin-bottom:16px">' +
        '<button class="btn btn-primary btn-sm" id="bv-stock">📦 Stock</button>' +
        '<button class="btn btn-ghost btn-sm" id="bv-issue">➕ Issue Badge</button>' +
        '</div>' + stockHTML();
      footer = '<button class="btn btn-ghost" id="bt-back">← Back</button>';
    } else if (view === 'issue') {
      header = mHead('ISSUE BADGE');
      body = issueHTML();
      footer = '<button class="btn btn-ghost" id="bt-back">← Back</button>';
    } else if (view === 'cadet') {
      header = mHead('CADET BADGES');
      body = cadetViewHTML();
      footer = '<button class="btn btn-ghost" id="bt-back">← Back</button>';
    }

    showModal(header + '<div class="modal-body">' + body + '</div><div class="modal-footer">' + footer + '</div>', true);

    // Home tile clicks
    document.querySelectorAll('[data-cat-tile]').forEach(btn => {
      btn.onclick = () => { selectedCat = btn.dataset.catTile; addStockBadgeId = null; view = 'stock'; render(); };
    });
    document.getElementById('bt-cadet-view')?.addEventListener('click', () => { view = 'cadet'; render(); });
    document.getElementById('bt-back')?.addEventListener('click', () => {
      if (view === 'issue') { view = 'stock'; addStockBadgeId = null; render(); }
      else { view = 'home'; selectedCat = null; addStockBadgeId = null; render(); }
    });

    // Stock view tabs
    document.getElementById('bv-stock')?.addEventListener('click', () => { addStockBadgeId = null; view = 'stock'; render(); });
    document.getElementById('bv-issue')?.addEventListener('click', () => { view = 'issue'; render(); });

    // Category chips in issue view
    document.querySelectorAll('.chip[data-cat]').forEach(chip => {
      chip.onclick = () => { selectedCat = chip.dataset.cat; selectedBadge = null; render(); };
    });

    // Flight chips in issue/cadet view
    document.querySelectorAll('[data-bif]').forEach(chip => {
      chip.onclick = () => { badgeCadetFlight = chip.dataset.bif === 'all' ? null : chip.dataset.bif; render(); };
    });
    document.querySelectorAll('[data-bcf]').forEach(chip => {
      chip.onclick = () => { badgeCadetFlight = chip.dataset.bcf === 'all' ? null : chip.dataset.bcf; render(); };
    });

    // Add stock — inline form
    document.querySelectorAll('.badge-add-stock').forEach(btn => {
      btn.onclick = () => { addStockBadgeId = parseInt(btn.dataset.id); render(); };
    });
    document.getElementById('stock-qty-cancel')?.addEventListener('click', () => { addStockBadgeId = null; render(); });
    const stockQtySubmit = document.getElementById('stock-qty-submit');
    if (stockQtySubmit) {
      document.getElementById('stock-qty-input')?.focus();
      document.getElementById('stock-qty-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') stockQtySubmit.click(); });
      stockQtySubmit.onclick = async () => {
        const qty = parseInt(document.getElementById('stock-qty-input')?.value);
        if (!qty || qty < 1) return;
        stockQtySubmit.disabled = true; stockQtySubmit.textContent = 'Adding...';
        try {
          await PATCH('/badges/stock/' + stockQtySubmit.dataset.id, { quantity: qty });
          const fresh = await GET('/badges/items');
          allBadges.length = 0; fresh.forEach(b => allBadges.push(b));
          badges.length = 0; fresh.filter(b => b.routine_stock || b.quantity > 0).forEach(b => badges.push(b));
          addStockBadgeId = null;
          render();
        } catch(e) { stockQtySubmit.disabled = false; stockQtySubmit.textContent = 'Add'; alert('Error: ' + e.message); }
      };
    }

    // Badge select in issue view
    document.querySelectorAll('[data-badge-id]').forEach(el => {
      el.onclick = () => {
        const b = badges.find(b => b.id === parseInt(el.dataset.badgeId));
        if (!b || b.quantity < 1) { if (document.getElementById('badge-issue-error')) showError('badge-issue-error', 'No stock for this badge'); return; }
        selectedBadge = b; render();
      };
    });

    document.querySelectorAll('[data-cadet-id]').forEach(el => {
      el.onclick = () => { selectedCadet = activeCadets.find(c => c.id === parseInt(el.dataset.cadetId)); render(); };
    });

    document.getElementById('badge-cadet-search')?.addEventListener('input', e => {
      const s = e.target.value.toLowerCase();
      document.querySelectorAll('[data-cadet-id]').forEach(el => { el.style.display = el.textContent.toLowerCase().includes(s) ? '' : 'none'; });
    });

    document.getElementById('badge-issue-confirm')?.addEventListener('click', async () => {
      if (!selectedBadge || !selectedCadet) return;
      const btn = document.getElementById('badge-issue-confirm');
      btn.disabled = true; btn.textContent = 'Issuing...';
      try {
        await POST('/badges/issue', { badge_item_id: selectedBadge.id, cadet_id: selectedCadet.id });
        selectedBadge.quantity--;
        const abi = allBadges.find(b => b.id === selectedBadge.id);
        if (abi) abi.quantity--;
        const name = selectedBadge.name;
        const cadetName = selectedCadet.rank + ' ' + selectedCadet.surname;
        selectedBadge = null; selectedCadet = null;
        showModal(mHead('BADGE ISSUED') + '<div class="modal-body"><div class="alert alert-success">✓ ' + name + ' issued to ' + cadetName + '.</div></div>' +
          '<div class="modal-footer"><button class="btn btn-ghost" id="bi-back">Issue Another</button><button class="btn btn-primary" data-action="close">Done</button></div>');
        document.getElementById('bi-back').onclick = () => { view = 'issue'; render(); };
      } catch(e) { btn.disabled = false; btn.textContent = 'Issue Badge to Cadet'; showError('badge-issue-error', e.message); }
    });

    // Cadet view
    document.querySelectorAll('[data-cadet-id2]').forEach(el => {
      el.onclick = async () => {
        selectedCadet = activeCadets.find(c => c.id === parseInt(el.dataset.cadetId2));
        render();
        const issued = await GET('/badges/issued/cadet/' + selectedCadet.id);
        const el2 = document.getElementById('cadet-badge-history');
        if (!el2) return;
        if (!issued.length) { el2.innerHTML = '<div class="empty">No badges issued to this cadet yet.</div>'; return; }
        let rows = issued.map(i => '<tr><td><strong>' + i.name + '</strong></td><td style="font-size:12px">' + i.category + '</td><td style="font-family:var(--mono);font-size:11px">' + fmt(i.issued_at) + '</td><td style="font-size:12px">' + i.issued_by + '</td><td><span class="badge ' + (i.returned ? 'badge-grey' : 'badge-green') + '">' + (i.returned ? 'Returned' : 'Active') + '</span></td><td>' + (!i.returned ? '<button class="btn btn-ghost btn-sm badge-return-btn" data-id="' + i.issued_id + '">Return</button>' : '') + '</td></tr>').join('');
        el2.innerHTML = '<div class="table-wrap"><table><thead><tr><th>Badge</th><th>Category</th><th>Issued</th><th>By</th><th>Status</th><th></th></tr></thead><tbody>' + rows + '</tbody></table></div>';
        document.querySelectorAll('.badge-return-btn').forEach(btn => {
          btn.onclick = async () => {
            if (!confirm('Return this badge to stock?')) return;
            await PATCH('/badges/return/' + btn.dataset.id, {});
            el.click();
          };
        });
      };
    });

    document.getElementById('badge-cadet-search2')?.addEventListener('input', e => {
      const s = e.target.value.toLowerCase();
      document.querySelectorAll('[data-cadet-id2]').forEach(el => { el.style.display = el.textContent.toLowerCase().includes(s) ? '' : 'none'; });
    });
  }

  render();
}


async function openReports() {
  const [items] = await Promise.all([loadItems(), loadStock()]);

  showModal(`${mHead('REPORTS')}<div class="modal-body"><div class="loading-text">Generating reports...</div></div>`, true);

  try {
    // Stock summary using cached stock data
    const stockData = S.stock || [];
    const stockMap = {};
    stockData.forEach(s => {
      const item = items.find(i => i.id === s.item_id);
      const size = item?.sizes?.find(sz => sz.id === s.size_id);
      if (item && size) {
        if (!stockMap[item.short_name]) stockMap[item.short_name] = [];
        stockMap[item.short_name].push({ size: size.size_label, qty: s.quantity });
      }
    });

    // Kit deficiency, issued summary and outstanding ledger — fetch in parallel
    const [dashData, issuedSummary, ledgerData] = await Promise.all([
      GET('/dashboard/'),
      GET('/transactions/issued-summary'),
      GET('/transactions/outstanding-by-cadet').catch(() => []),
    ]);
    const deficiencies = dashData.missing_kit_detail || [];

    // Build size-demand map: { itemName: [{size, outstanding}] } sorted by count desc
    const demandMap = {};
    issuedSummary.forEach(row => {
      const item = items.find(i => i.id === row.item_id);
      const size = item?.sizes?.find(s => s.id === row.size_id);
      if (!item || !size) return;
      if (!demandMap[item.short_name]) demandMap[item.short_name] = [];
      demandMap[item.short_name].push({ size: size.size_label, count: row.count });
    });
    Object.values(demandMap).forEach(arr => arr.sort((a,b) => b.count - a.count));

    showModal(`${mHead('REPORTS')}<div class="modal-body">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><div class="section-label" style="margin-bottom:0">Kit Deficiencies — Active Cadets Missing Kit Items</div>${deficiencies.length>0?`<span style="font-size:11px;color:var(--text3)">Click a row to view cadet record</span>`:''}</div>
      ${deficiencies.length === 0
        ? '<div class="alert alert-success" style="margin-bottom:16px">✓ All active cadets have their required kit issued.</div>'
        : (() => {
            const defFlights = [...new Set(deficiencies.map(d=>d.flight).filter(Boolean))].sort();
            return (defFlights.length>1?`<div id="def-flight-chips" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
              ${defFlights.map(f=>`<button class="btn btn-ghost def-flight-chip" data-flight="${f}" style="padding:4px 12px;font-size:12px">${f}</button>`).join('')}
            </div>`:'') +
            `<div class="table-wrap"><table>
              <thead><tr><th>Cadet</th><th>Service No</th><th>Missing</th></tr></thead>
              <tbody>${deficiencies.map(d => `<tr class="def-row" data-cadet-id="${d.cadet_id}" data-flight="${d.flight||''}" style="cursor:pointer" title="Open cadet record">
                <td><strong>${d.rank} ${d.surname}</strong>, ${d.forename}${d.flight?` <span style="font-size:11px;color:var(--text3)">(${d.flight})</span>`:''}</td>
                <td style="font-family:var(--mono);font-size:12px">${d.service_number}</td>
                <td>${d.missing_items.map(m => `<span class="badge badge-gold" style="margin-right:4px;font-size:10px">${m}</span>`).join('')}</td>
              </tr>`).join('')}</tbody>
            </table></div>`;
          })()}

      <div class="section-label" style="margin-top:24px">Current Stock Summary</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Item</th><th>Sizes Available</th><th>Total</th></tr></thead>
        <tbody>${Object.entries(stockMap).map(([name, sizes]) => {
          const total = sizes.reduce((sum, s) => sum + s.qty, 0);
          const inStock = sizes.filter(s => s.qty > 0);
          return `<tr>
            <td><strong>${name}</strong></td>
            <td style="font-size:12px;color:var(--text2)">${inStock.length > 0 ? inStock.map(s => s.size + ': ' + s.qty).join(', ') : '<span style="color:var(--red)">None in stock</span>'}</td>
            <td style="font-weight:700;color:${total > 0 ? 'var(--green)' : 'var(--red)'};font-family:var(--mono)">${total}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>

      <div class="section-label" style="margin-top:24px">Size Demand — Currently Outstanding</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px">Sizes most commonly held by cadets right now — use for procurement planning.</div>
      ${Object.keys(demandMap).length === 0
        ? '<div class="alert alert-info">No items currently issued.</div>'
        : `<div class="table-wrap"><table>
          <thead><tr><th>Item</th><th>Sizes in Demand (most → least)</th><th>Total Out</th></tr></thead>
          <tbody>${Object.entries(demandMap).map(([name, sizes]) => {
            const total = sizes.reduce((sum,s)=>sum+s.count,0);
            return `<tr>
              <td><strong>${name}</strong></td>
              <td style="font-size:12px">${sizes.map(s=>`<span style="display:inline-flex;align-items:center;gap:4px;margin-right:6px;margin-bottom:2px;background:var(--blue-pale);border-radius:4px;padding:2px 7px"><span style="font-family:var(--mono);font-size:12px;font-weight:600">${s.size}</span><span style="font-size:11px;color:var(--blue);font-weight:700">×${s.count}</span></span>`).join('')}</td>
              <td style="font-weight:700;font-family:var(--mono);color:var(--blue)">${total}</td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>`}

      <div class="section-label" style="margin-top:24px">Outstanding Kit Ledger <span id="ledger-count-badge" style="font-weight:400;color:var(--text3)">(${ledgerData.length} cadet${ledgerData.length!==1?'s':''})</span></div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px">All currently issued kit, one row per cadet. Useful for parade night kit checks.</div>
      ${ledgerData.length === 0
        ? '<div class="alert alert-success">No items currently outstanding.</div>'
        : (() => {
            const lFlights = [...new Set(ledgerData.map(c=>c.flight).filter(Boolean))].sort();
            return `<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
              <div class="search-wrap" style="flex:1;min-width:180px;margin:0"><span class="search-icon">🔍</span><input id="ledger-search" placeholder="Search ledger..." type="text" style="padding-left:32px"></div>
              ${lFlights.map(f=>`<button class="btn btn-ghost btn-sm ledger-flight-chip" data-flight="${f}" style="padding:4px 10px;font-size:12px">${f}</button>`).join('')}
            </div>
            <div class="table-wrap"><table>
              <thead><tr><th>Cadet</th><th>Flight</th><th>Outstanding Items</th><th style="text-align:right">Count</th></tr></thead>
              <tbody>${ledgerData.map(c => `<tr class="ledger-row" data-cadet-id="${c.cadet_id}" data-flight="${c.flight||''}" data-name="${(c.rank+' '+c.surname+' '+c.forename+' '+c.service_number).toLowerCase()}" style="cursor:pointer" title="Open cadet record">
                <td><strong>${c.rank} ${c.surname}</strong>, ${c.forename}<br><span style="font-size:10px;font-family:var(--mono);color:var(--text3)">${c.service_number}</span></td>
                <td style="font-size:13px">${c.flight||'—'}</td>
                <td style="font-size:12px">${c.items.map(i=>`<span style="background:var(--blue-pale);color:var(--blue);border-radius:4px;padding:1px 6px;font-size:11px;font-weight:600;margin-right:3px;margin-bottom:2px;display:inline-block">${i.item_name} <span style="font-family:var(--mono);font-weight:400">${i.size_label}</span></span>`).join('')}</td>
                <td style="text-align:right;font-family:var(--mono);font-weight:700;color:var(--blue)">${c.items.length}</td>
              </tr>`).join('')}</tbody>
            </table></div>`;
          })()}
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-action="admin">← Back</button>

async function openChangePin() {
  let newPin = '';
  let confirmPin = '';
  let mode = 'new'; // 'new' or 'confirm'

  function renderChangePin() {
    showModal(`${mHead('CHANGE YOUR PIN')}<div class="modal-body">
      <p style="color:var(--text2);font-size:14px;margin-bottom:20px">Set a new PIN or password for your account. You will need this to access admin functions.</p>
      <div id="cp-error"></div>
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:8px">${mode==='new'?'ENTER NEW PIN':'CONFIRM NEW PIN'}</div>
        <div style="font-size:32px;letter-spacing:12px;color:var(--blue);font-family:var(--mono);min-height:48px;padding:12px;background:var(--bg);border-radius:8px;border:1.5px solid var(--border)">
          ${mode==='new'?(newPin?'●'.repeat(newPin.length):'<span style="color:var(--text3);font-size:14px">Enter new PIN</span>'):(confirmPin?'●'.repeat(confirmPin.length):'<span style="color:var(--text3);font-size:14px">Confirm PIN</span>')}
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto 16px">
        ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k => k==='' ? '<div></div>' : `<button class="pin-key btn btn-ghost" data-key="${k}" style="padding:18px;font-size:20px;font-weight:700;border-radius:10px">${k}</button>`).join('')}
      </div>
      <div style="text-align:center">
        <input id="cp-text" type="password" placeholder="Or type your PIN here..." style="max-width:240px;text-align:center;letter-spacing:4px">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-action="close">Cancel</button>
      <button class="btn btn-primary" id="cp-next">${mode==='new'?'Next →':'Save PIN'}</button>
    </div>`);

    document.querySelectorAll('.pin-key').forEach(btn => {
      btn.onclick = () => {
        const k = btn.dataset.key;
        if (mode === 'new') {
          if (k === '⌫') newPin = newPin.slice(0,-1);
          else newPin += k;
        } else {
          if (k === '⌫') confirmPin = confirmPin.slice(0,-1);
          else confirmPin += k;
        }
        const disp = document.querySelector('.modal-body div[style*="32px"]');
        if (disp) {
          const val = mode === 'new' ? newPin : confirmPin;
          disp.innerHTML = val ? '●'.repeat(val.length) : `<span style="color:var(--text3);font-size:14px">${mode==='new'?'Enter new PIN':'Confirm PIN'}</span>`;
        }
      };
    });

    document.getElementById('cp-next').onclick = async () => {
      const textVal = document.getElementById('cp-text').value;
      if (mode === 'new') {
        if (textVal) newPin = textVal;
        if (!newPin) { showError('cp-error', 'Please enter a PIN'); return; }
        mode = 'confirm';
        document.getElementById('cp-text').value = '';
        renderChangePin();
      } else {
        if (textVal) confirmPin = textVal;
        if (!confirmPin) { showError('cp-error', 'Please confirm your PIN'); return; }
        if (newPin !== confirmPin) { showError('cp-error', 'PINs do not match — try again'); confirmPin=''; renderChangePin(); return; }
        const btn = document.getElementById('cp-next');
        btn.disabled = true; btn.textContent = 'Saving...';
        try {
          await PATCH(`/users/${S.user.id}/change-pin`, { new_pin: newPin });
          showModal(`${mHead('PIN CHANGED')}<div class="modal-body">
            <div class="alert alert-success">✓ Your PIN has been updated successfully.</div>
          </div><div class="modal-footer"><button class="btn btn-primary" data-action="close">Done</button></div>`);
        } catch(e) {
          btn.disabled=false; btn.textContent='Save PIN';
          showError('cp-error', e.message);
        }
      }
    };
  }

  renderChangePin();
}

    if (filters.action) path += `&action=${filters.action}`;
    logs = await GET(path);
  }

  async function renderAudit() {
    await loadLogs();

    // Apply client-side filters
    let filtered = logs;
    if (filters.cadet) filtered = filtered.filter(l => l.cadet_id === parseInt(filters.cadet));
    if (filters.staff) filtered = filtered.filter(l => l.user_name.toLowerCase().includes(filters.staff.toLowerCase()));
    if (filters.item) filtered = filtered.filter(l => l.item_id === parseInt(filters.item));
    if (filters.dateFrom) { const d = new Date(filters.dateFrom); filtered = filtered.filter(l => new Date(l.timestamp) >= d); }
    if (filters.dateTo) { const d = new Date(filters.dateTo); d.setHours(23,59,59,999); filtered = filtered.filter(l => new Date(l.timestamp) <= d); }

    const actionTypes = ['', 'ISSUE', 'RETURN', 'STOCK_ADD', 'STOCK_REMOVE', 'STOCK_BULK_ADD', 'STOCK_DELETE', 'CADET_CREATE', 'CADET_UPDATE', 'CADET_RANK_UPDATE', 'CADET_DEACTIVATE', 'CADET_REACTIVATE', 'BADGE_CREATE', 'BADGE_STOCK_ADJUST', 'BADGE_ISSUE', 'BADGE_RETURN', 'USER_CREATE', 'USER_DEACTIVATE', 'USER_REACTIVATE', 'USER_EDIT', 'USER_PASSWORD_RESET', 'FEEDBACK_SUBMIT', 'FEEDBACK_REPLY'];

    showModal(`${mHead('AUDIT LOG')}<div class="modal-body">
      <!-- Filters -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:8px">
        <div>
          <label>Filter by Staff</label>
          <input id="af-staff" placeholder="Staff name..." value="${filters.staff}">
        </div>
        <div>
          <label>Filter by Cadet</label>
          <select id="af-cadet">
            <option value="">All Cadets</option>
            ${cadets.map(c=>`<option value="${c.id}" ${filters.cadet==c.id?'selected':''}>${c.surname}, ${c.forename}</option>`).join('')}
          </select>
        </div>
        <div>
          <label>Filter by Item</label>
          <select id="af-item">
            <option value="">All Items</option>
            ${items.map(i=>`<option value="${i.id}" ${filters.item==i.id?'selected':''}>${i.short_name}</option>`).join('')}
          </select>
        </div>
        <div>
          <label>Filter by Action</label>
          <select id="af-action">
            ${actionTypes.map(a=>`<option value="${a}" ${filters.action===a?'selected':''}>${a||'All Actions'}</option>`).join('')}
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 2fr;gap:10px;margin-bottom:12px">
        <div>
          <label>From Date</label>
          <input type="date" id="af-date-from" value="${filters.dateFrom}" style="font-size:13px">
        </div>
        <div>
          <label>To Date</label>
          <input type="date" id="af-date-to" value="${filters.dateTo}" style="font-size:13px">
        </div>
        <div style="display:flex;align-items:flex-end;gap:8px;padding-bottom:2px">
          <button class="btn btn-primary btn-sm" id="af-apply">Apply Filters</button>
          <button class="btn btn-ghost btn-sm" id="af-clear">Clear All</button>
          <span style="font-size:12px;color:var(--text3);font-family:var(--mono)">${filtered.length} records${filters.dateFrom||filters.dateTo?' (date filtered)':''}</span>
        </div>
      </div>

      <!-- Results -->
      <div class="table-wrap">
        <table>
          <thead><tr><th>Timestamp</th><th>Action</th><th>Staff</th><th>Details</th></tr></thead>
          <tbody>
            ${filtered.length === 0
              ? '<tr><td colspan="4"><div class="empty">No records found</div></td></tr>'
              : filtered.map(l => `<tr>
                <td style="font-family:var(--mono);font-size:11px;white-space:nowrap">${fmt(l.timestamp)}</td>
                <td><span class="badge ${
                  l.action.includes('ISSUE') ? 'badge-blue' :
                  l.action.includes('RETURN') ? 'badge-green' :
                  l.action.includes('STOCK') ? 'badge-gold' :
                  l.action.includes('CADET') ? 'badge-grey' : 'badge-grey'
                }">${l.action}</span></td>
                <td style="font-size:13px">${l.user_name}</td>
                <td style="font-size:12px;color:var(--text2)">${l.details||'—'}</td>
              </tr>`).join('')
            }
          </tbody>
        </table>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-action="admin">← Back</button>
      <button class="btn btn-ghost" id="audit-csv">📥 Export CSV</button>
      <button class="btn btn-ghost" id="audit-print">🖨 Print</button>
    </div>`, true);

    document.getElementById('audit-csv').onclick = () => {
      const header = 'Timestamp,Action,Staff,Details\n';
      const rows = filtered.map(l =>
        [fmt(l.timestamp), l.action, l.user_name, l.details||''].map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')
      ).join('\n');
      const blob = new Blob([header + rows], { type:'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = '1701-audit-log.csv'; a.click();
      URL.revokeObjectURL(url);
    };

    document.getElementById('audit-print').onclick = () => {
      const dateStr = new Date().toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'});
      const rowsHTML = filtered.map(l => `<tr>
        <td style="font-family:monospace;font-size:10px;white-space:nowrap">${fmt(l.timestamp)}</td>
        <td><span style="background:${l.action.includes('ISSUE')?'#e8eef8':l.action.includes('RETURN')?'#dcfce7':'#fef3c7'};color:${l.action.includes('ISSUE')?'#002868':l.action.includes('RETURN')?'#166534':'#92400e'};padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700">${l.action}</span></td>
        <td style="font-size:11px">${l.user_name}</td>
        <td style="font-size:11px;color:#5a5a5a">${l.details||'—'}</td>
      </tr>`).join('');
      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Audit Log — 1701 Sqn</title>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Figtree:wght@400;600;700&display=swap" rel="stylesheet">
        <style>*{box-sizing:border-box}body{margin:0;font-family:'Figtree',sans-serif;color:#0d1b3e}
        @page{size:A4 landscape;margin:12mm 14mm}
        @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}.no-print{display:none!important}}</style>
      </head><body style="padding:20px 24px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:36px;height:36px;border-radius:50%;background:conic-gradient(#4a90d9 0deg 120deg,#ffffff 120deg 240deg,#c8202d 240deg 360deg)"></div>
            <div><div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.06em;color:#002868">1701 JOHNSTONE SQUADRON — AUDIT LOG</div>
            <div style="font-size:10px;color:#9099b5;letter-spacing:0.06em">ROYAL AIR FORCE AIR CADETS</div></div>
          </div>
          <div style="text-align:right;font-size:10px;color:#9099b5">${dateStr}<br>${filtered.length} records</div>
        </div>
        <div style="border-top:2px solid #002868;margin-bottom:12px"></div>
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="background:#e8eef8;border-bottom:2px solid #dde3f0">
            <th style="padding:6px 10px;text-align:left;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;color:#9099b5">Timestamp</th>
            <th style="padding:6px 10px;text-align:left;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;color:#9099b5">Action</th>
            <th style="padding:6px 10px;text-align:left;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;color:#9099b5">Staff</th>
            <th style="padding:6px 10px;text-align:left;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;color:#9099b5">Details</th>
          </tr></thead>
          <tbody>${rowsHTML}</tbody>
        </table>
        <button class="no-print" onclick="window.print()" style="margin-top:16px;padding:10px 20px;background:#002868;color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Figtree',sans-serif">🖨 Print</button>
        <div style="margin-top:12px;font-size:9px;color:#9099b5;border-top:1px solid #dde3f0;padding-top:8px">OFFICIAL · Audit records retained per AP 1919. DPA 2018 applies.</div>
      </body></html>`;
      const w = window.open('', '_blank', 'width=1100,height=700');
      w.document.write(html); w.document.close(); w.focus(); setTimeout(() => w.print(), 600);
    };

    document.getElementById('af-apply').onclick = async () => {
      filters.staff = document.getElementById('af-staff').value;
      filters.cadet = document.getElementById('af-cadet').value;
      filters.item = document.getElementById('af-item').value;
      filters.action = document.getElementById('af-action').value;
      filters.dateFrom = document.getElementById('af-date-from').value;
      filters.dateTo = document.getElementById('af-date-to').value;
      await renderAudit();
    };

    document.getElementById('af-clear').onclick = async () => {
      filters = { staff: '', cadet: '', item: '', action: '', dateFrom: '', dateTo: '' };
      await renderAudit();
    };
  }

  await renderAudit();
}

function bind() {
  document.body.onclick = function(e) {
    const btn = e.target.closest('button');
    const id = btn ? btn.id : (e.target.id || '');
    if (!id) return;
    if (id === 'feedback-btn') openFeedback();
    else if (id === 'dark-mode-btn') {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('dark-mode-btn').textContent = isDark ? '🌙' : '☀️';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }
    else if (id === 'change-pin-btn') openChangePin();
    else if (id === 'signout-btn') { if(confirm('Change user?')) doLogout(); }
    else if (id === 'btn-cadets') openCadets();
    else if (id === 'btn-issue') openIssueFlow();
    else if (id === 'btn-return') openReturnFlow();
    else if (id === 'btn-badges') openBadgeTracker();
    else if (id === 'btn-search') openSearchUniform();
    else if (id === 'btn-admin') openAdmin(); // openAdminAuth() disabled temporarily
  };

  // Load dashboard stats on home screen
  if (S.user) loadHomeDashboard();

  // Load staff list for selector screen
  if (!S.user) {
    loadStaffList().then(staff => {
      const list = document.getElementById('staff-list');
      if (!list) return;
      if (!staff || staff.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:var(--text3);padding:20px">No staff found. Check backend is running.</div>';
        return;
      }
      list.innerHTML = staff.map(u => `
        <button class="staff-select-btn" data-user='${JSON.stringify(u).replace(/'/g,"&#39;")}' style="
          display:flex;align-items:center;gap:14px;padding:14px 16px;
          background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;
          cursor:pointer;transition:all 0.15s;text-align:left;width:100%;
          font-family:var(--body);
        ">
          <div style="width:42px;height:42px;border-radius:50%;background:var(--blue);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0">
            ${u.forename[0]}${u.surname[0]}
          </div>
          <div>
            <div style="font-weight:700;color:var(--text);font-size:15px">${u.display_name}</div>
            ${u.role ? `<div style="font-size:12px;color:var(--text3);font-family:var(--mono)">${u.role}</div>` : ''}
          </div>
          ${u.is_admin ? '<span style="margin-left:auto;font-size:10px;background:#fef9c3;color:#854d0e;padding:3px 8px;border-radius:4px;font-family:var(--mono)">ADMIN</span>' : ''}
        </button>
      `).join('');

      list.querySelectorAll('.staff-select-btn').forEach(btn => {
        btn.onmouseover = () => { btn.style.borderColor = 'var(--blue-light)'; btn.style.background = 'var(--blue-pale)'; };
        btn.onmouseout = () => { btn.style.borderColor = 'var(--border)'; btn.style.background = ''; };
        btn.onclick = () => {
          const user = JSON.parse(btn.dataset.user);
          selectUser(user);
        };
      });
    }).catch(err => {
      const list = document.getElementById('staff-list');
      if (list) list.innerHTML = `<div class="alert alert-danger">Cannot connect to backend. Make sure the server is running.</div>`;
    });
  }
}

// ── ADMIN AUTH - PIN or Pattern ────────────────────────
function openAdminAuth() {
  if (!S.user?.is_admin) {
    showModal(`${mHead('ADMIN ACCESS')}<div class="modal-body">
      <div class="alert alert-danger">Your account does not have admin privileges.</div>
    </div><div class="modal-footer"><button class="btn btn-ghost" data-action="close">Close</button></div>`);
    return;
  }

  let authMode = 'pin'; // 'pin' or 'pattern'
  let pinValue = '';
  let patternSelected = [];
  const PATTERN_DOTS = 9;

  function renderAuth() {
    showModal(`${mHead('ADMIN AUTHENTICATION')}<div class="modal-body">
      <p style="color:var(--text2);margin-bottom:20px;font-size:14px">Verify your identity to access admin functions.</p>

      <div style="display:flex;gap:8px;margin-bottom:20px">
        <button class="btn ${authMode==='pin'?'btn-primary':'btn-ghost'} btn-sm" id="auth-pin-tab">PIN / Password</button>
        <button class="btn ${authMode==='pattern'?'btn-primary':'btn-ghost'} btn-sm" id="auth-pattern-tab">Pattern</button>
      </div>

      <div id="auth-error"></div>

      ${authMode === 'pin' ? `
        <div style="text-align:center;margin-bottom:20px">
          <div style="font-size:32px;letter-spacing:12px;color:var(--blue);font-family:var(--mono);min-height:48px;padding:12px;background:var(--bg);border-radius:8px;border:1.5px solid var(--border)">
            ${'●'.repeat(pinValue.length) || '<span style="color:var(--text3);font-size:14px">Enter PIN or password</span>'}
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto 16px">
          ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k => k==='' ? '<div></div>' : `
            <button class="pin-key btn btn-ghost" data-key="${k}" style="padding:18px;font-size:20px;font-weight:700;border-radius:10px">${k}</button>
          `).join('')}
        </div>
        <div style="text-align:center">
          <input id="pin-text-input" type="password" placeholder="Or type password here..." style="max-width:240px;text-align:center;letter-spacing:4px">
        </div>
      ` : `
        <div style="text-align:center;margin-bottom:16px">
          <p style="font-size:13px;color:var(--text3);margin-bottom:16px">Draw your pattern</p>
          <div id="pattern-grid" style="display:inline-grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:24px;background:var(--bg);border-radius:12px;border:1.5px solid var(--border)">
            ${Array.from({length:9},(_,i)=>`
              <div class="pattern-dot" data-dot="${i}" style="
                width:44px;height:44px;border-radius:50%;
                background:${patternSelected.includes(i)?'var(--blue)':'var(--border)'};
                cursor:pointer;transition:all 0.1s;
                display:flex;align-items:center;justify-content:center;
                color:white;font-weight:700;font-size:13px;
              ">${patternSelected.includes(i)?patternSelected.indexOf(i)+1:''}</div>
            `).join('')}
          </div>
          <div style="margin-top:12px">
            <button class="btn btn-ghost btn-sm" id="clear-pattern">Clear</button>
          </div>
        </div>
      `}
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-action="close">Cancel</button>
      <button class="btn btn-primary" id="auth-submit">Verify →</button>
    </div>`);

    // Tab switching
    document.getElementById('auth-pin-tab').onclick = () => { authMode='pin'; pinValue=''; renderAuth(); };
    document.getElementById('auth-pattern-tab').onclick = () => { authMode='pattern'; patternSelected=[]; renderAuth(); };

    // PIN keypad
    document.querySelectorAll('.pin-key').forEach(btn => {
      btn.onclick = () => {
        const k = btn.dataset.key;
        if (k === '⌫') pinValue = pinValue.slice(0,-1);
        else pinValue += k;
        // Update display without full re-render
        const disp = document.querySelector('#auth-pin-tab')?.closest('.modal-body')?.querySelector('div[style*="32px"]');
        if (disp) disp.innerHTML = pinValue ? '●'.repeat(pinValue.length) : '<span style="color:var(--text3);font-size:14px">Enter PIN or password</span>';
      };
    });

    // Pattern dots
    document.querySelectorAll('.pattern-dot').forEach(dot => {
      dot.onclick = () => {
        const i = parseInt(dot.dataset.dot);
        if (!patternSelected.includes(i)) {
          patternSelected.push(i);
          dot.style.background = 'var(--blue)';
          dot.textContent = patternSelected.length;
        }
      };
    });
    document.getElementById('clear-pattern')?.addEventListener('click', () => { patternSelected=[]; renderAuth(); });

    // Submit
    document.getElementById('auth-submit').onclick = async () => {
      let pin = '';
      if (authMode === 'pin') {
        pin = document.getElementById('pin-text-input')?.value || pinValue;
      } else {
        pin = patternSelected.join('');
      }
      if (!pin) { showError('auth-error', 'Please enter your PIN or draw a pattern'); return; }
      const btn = document.getElementById('auth-submit');
      btn.disabled=true; btn.textContent='Verifying...';
      try {
        await verifyAdminPin(S.user.id, pin);
        S.adminVerified = true;
        closeModal();
        openAdmin();
      } catch(e) {
        btn.disabled=false; btn.textContent='Verify →';
        showError('auth-error', e.message);
        pinValue='';
        patternSelected=[];
      }
    };
  }

  renderAuth();
}

// Secret admin passage - triple click crest
let crestClicks = 0, crestTimer = null;
document.addEventListener('click', (e) => {
  if (e.target && e.target.id === 'login-crest') {
    crestClicks++;
    clearTimeout(crestTimer);
    crestTimer = setTimeout(() => { crestClicks = 0; }, 1500);
    if (crestClicks >= 3) {
      crestClicks = 0;
      // Secret admin passage - use the public users list to find admin user
      fetch(API + '/users/public').then(r => r.json()).then(staff => {
        const adminUser = staff.find(u => u.is_admin);
        if (adminUser) {
          S.user = adminUser;
          sessionStorage.setItem('user', JSON.stringify(adminUser));
          render();
        }
      }).catch(() => {});
    }
  }
});

// Apply saved theme
(function() {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();

// Escape key closes modals
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const overlay = document.getElementById('overlay');
    if (overlay) closeModal();
  }
});

render();

// Load feedback badge count
async function refreshFeedbackBadge() {
  if (!S.user) return;
  try {
    const data = await GET('/feedback/unread-count');
    const badge = document.getElementById('feedback-badge');
    if (badge) {
      if (data.count > 0) {
        badge.textContent = data.count;
        badge.style.display = 'block';
      } else {
        badge.style.display = 'none';
      }
    }
  } catch(e) {}
}
setTimeout(refreshFeedbackBadge, 1000);
setInterval(refreshFeedbackBadge, 60000);

// 30 second stock refresh
setInterval(async () => {
  if (S.user) {
    S.stock = null;
    await loadStock();
  }
}, 30000);
</script>
