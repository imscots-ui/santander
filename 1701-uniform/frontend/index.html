<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; connect-src *; script-src 'self' 'unsafe-inline';">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1701 Squadron v3 — Uniform Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #002868;
  --blue-mid: #0a3d8f;
  --blue-light: #1557c0;
  --blue-pale: #e8eef8;
  --gold: #c9a84c;
  --red: #c0392b;
  --red-light: #fee2e2;
  --green: #166534;
  --green-light: #dcfce7;
  --amber: #92400e;
  --amber-light: #fef3c7;
  --bg: #f4f6fb;
  --surface: #ffffff;
  --border: #dde3f0;
  --text: #0d1b3e;
  --text2: #4a5578;
  --text3: #9099b5;
  --mono: 'DM Mono', monospace;
  --head: 'Bebas Neue', sans-serif;
  --body: 'Figtree', sans-serif;
  --r: 10px;
  --r-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--body); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; -webkit-font-smoothing: antialiased; }

.login-screen { min-height: 100vh; display: flex; background: var(--blue); position: relative; overflow: hidden; }
.login-left { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px; position: relative; z-index: 2; }
.login-right { width: 420px; background: white; display: flex; flex-direction: column; justify-content: center; padding: 56px 48px; }
.login-roundel { width: 80px; height: 80px; border-radius: 50%; background: conic-gradient(#1a5fad 0deg 120deg, #ffffff 120deg 240deg, #c8202d 240deg 360deg); margin-bottom: 24px; box-shadow: 0 0 0 6px rgba(255,255,255,0.1); }
.login-left h1 { font-family: var(--head); font-size: 64px; color: white; letter-spacing: 0.04em; line-height: 0.9; text-align: center; }
.login-left p { color: rgba(255,255,255,0.5); font-family: var(--mono); font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 16px; text-align: center; }
.login-right h2 { font-family: var(--head); font-size: 36px; letter-spacing: 0.05em; color: var(--blue); margin-bottom: 8px; }
.login-right > p { color: var(--text3); font-size: 13px; margin-bottom: 32px; }
.login-bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; }

.home-screen { min-height: 100vh; display: flex; flex-direction: column; }
.topbar { background: var(--blue); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.topbar-brand { display: flex; align-items: center; gap: 14px; }
.topbar-roundel { width: 32px; height: 32px; border-radius: 50%; background: conic-gradient(#4a90d9 0deg 120deg, #ffffff 120deg 240deg, #c8202d 240deg 360deg); flex-shrink: 0; }
.topbar-brand span { font-family: var(--head); font-size: 22px; letter-spacing: 0.08em; color: white; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.topbar-user-name { font-size: 13px; font-weight: 600; color: white; line-height: 1.2; text-align: right; }
.topbar-user-role { font-size: 10px; color: rgba(255,255,255,0.45); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; text-align: right; }
.btn-signout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); padding: 7px 14px; border-radius: 6px; font-family: var(--body); font-size: 12px; cursor: pointer; transition: all 0.15s; }
.btn-signout:hover { background: rgba(255,255,255,0.18); color: white; }

.home-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; }
.home-greeting { text-align: center; margin-bottom: 56px; }
.home-greeting h2 { font-family: var(--head); font-size: 48px; letter-spacing: 0.04em; color: var(--blue); line-height: 1; }
.home-greeting p { color: var(--text3); font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 8px; }
.home-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: 800px; }
.home-btn { background: white; border: 1px solid var(--border); border-radius: var(--r-lg); padding: 32px 24px; cursor: pointer; transition: all 0.2s; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 14px; box-shadow: 0 2px 12px rgba(0,40,104,0.06); position: relative; overflow: hidden; }
.home-btn::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--blue); transform: scaleX(0); transition: transform 0.2s; pointer-events: none; }
.home-btn:hover { border-color: var(--blue-light); box-shadow: 0 8px 32px rgba(0,40,104,0.14); transform: translateY(-2px); }
.home-btn:hover::before { transform: scaleX(1); }
.home-btn.admin::before { background: var(--gold); }
.home-btn-icon { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; background: var(--blue-pale); pointer-events: none; }
.home-btn.green .home-btn-icon { background: var(--green-light); }
.home-btn.red .home-btn-icon { background: var(--red-light); }
.home-btn.amber .home-btn-icon { background: var(--amber-light); }
.home-btn.gold .home-btn-icon { background: #fef9e7; }
.home-btn-label { font-family: var(--head); font-size: 22px; letter-spacing: 0.05em; color: var(--blue); line-height: 1; pointer-events: none; }
.home-btn-sub { font-size: 12px; color: var(--text3); line-height: 1.4; pointer-events: none; }

.overlay { position: fixed; inset: 0; background: rgba(0,24,80,0.55); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(4px); animation: fadeIn 0.15s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal { background: white; border-radius: var(--r-lg); width: 100%; max-width: 640px; max-height: 88vh; display: flex; flex-direction: column; box-shadow: 0 32px 80px rgba(0,0,0,0.3); animation: slideUp 0.2s ease; overflow: hidden; }
.modal-wide { max-width: 860px; }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--blue); }
.modal-title { font-family: var(--head); font-size: 24px; letter-spacing: 0.06em; color: white; }
.modal-close { background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.7); width: 32px; height: 32px; border-radius: 6px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.modal-close:hover { background: rgba(255,255,255,0.2); color: white; }
.modal-body { flex: 1; overflow-y: auto; padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0; background: #fafbfe; }

.form-group { margin-bottom: 18px; }
label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text2); margin-bottom: 6px; font-family: var(--mono); }
input, select, textarea { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--body); font-size: 14px; color: var(--text); background: white; transition: border-color 0.15s, box-shadow 0.15s; outline: none; appearance: none; }
input:focus, select:focus, textarea:focus { border-color: var(--blue-light); box-shadow: 0 0 0 3px rgba(21,87,192,0.1); }

.btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: 8px; font-family: var(--body); font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap; }
.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover { background: var(--blue-mid); }
.btn-success { background: var(--green); color: white; }
.btn-success:hover { background: #144a2d; }
.btn-danger { background: var(--red); color: white; }
.btn-danger:hover { background: #a93226; }
.btn-ghost { background: white; color: var(--text2); border: 1.5px solid var(--border); }
.btn-ghost:hover { background: var(--bg); color: var(--text); }
.btn-sm { padding: 7px 14px; font-size: 13px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; border-left: 4px solid; line-height: 1.5; }
.alert-danger { background: var(--red-light); border-color: var(--red); color: #7f1d1d; }
.alert-success { background: var(--green-light); border-color: var(--green); color: #14532d; }
.alert-warning { background: var(--amber-light); border-color: #d97706; color: var(--amber); }
.alert-info { background: var(--blue-pale); border-color: var(--blue-light); color: var(--blue); }

.badge { display: inline-block; padding: 3px 9px; border-radius: 4px; font-size: 11px; font-family: var(--mono); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
.badge-blue { background: var(--blue-pale); color: var(--blue); }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-red { background: var(--red-light); color: var(--red); }
.badge-gold { background: #fef9c3; color: #854d0e; }
.badge-grey { background: #f1f3f9; color: var(--text3); border: 1px solid var(--border); }

.table-wrap { overflow-x: auto; border-radius: var(--r); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th { background: #f8f9fd; padding: 10px 14px; text-align: left; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:hover { background: #f8f9fd; }
tbody tr:last-child { border-bottom: none; }
td { padding: 11px 14px; vertical-align: middle; }

.item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 8px; }
.item-card { background: white; border: 1.5px solid var(--border); border-radius: var(--r); padding: 16px; cursor: pointer; transition: all 0.15s; text-align: center; }
.item-card:hover { border-color: var(--blue-light); background: var(--blue-pale); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,40,104,0.1); }
.item-card.selected { border-color: var(--blue); background: var(--blue-pale); box-shadow: 0 0 0 2px var(--blue); }
.item-card-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
.item-card-cat { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 4px; }

.size-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.size-btn { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 6px; background: white; font-family: var(--mono); font-size: 13px; cursor: pointer; transition: all 0.12s; color: var(--text); }
.size-btn:hover { border-color: var(--blue-light); background: var(--blue-pale); }
.size-btn.selected { border-color: var(--blue); background: var(--blue); color: white; }
.size-btn.out-of-stock { opacity: 0.4; cursor: not-allowed; }
.size-btn.low-stock { border-color: #d97706; color: #92400e; }

.cadet-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: var(--r); cursor: pointer; transition: all 0.12s; border: 1.5px solid transparent; }
.cadet-item:hover { background: var(--blue-pale); border-color: var(--border); }
.cadet-item.selected { background: var(--blue-pale); border-color: var(--blue); }
.cadet-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
.cadet-name { font-size: 14px; font-weight: 600; color: var(--text); }
.cadet-meta { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-top: 1px; }

.search-wrap { position: relative; margin-bottom: 16px; }
.search-wrap input { padding-left: 38px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; }

.section-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); margin-bottom: 10px; margin-top: 20px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.section-label:first-child { margin-top: 0; }

.steps { display: flex; gap: 0; margin-bottom: 24px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.step { flex: 1; padding: 10px; text-align: center; font-size: 12px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); background: #f8f9fd; border-right: 1px solid var(--border); transition: all 0.15s; }
.step:last-child { border-right: none; }
.step.active { background: var(--blue); color: white; }
.step.done { background: var(--green-light); color: var(--green); }

.condition-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
.condition-btn { padding: 20px; border: 2px solid var(--border); border-radius: var(--r); background: white; cursor: pointer; transition: all 0.15s; text-align: center; }
.condition-btn:hover { border-color: var(--blue-light); }
.condition-btn.selected-good { border-color: var(--green); background: var(--green-light); }
.condition-btn.selected-bad { border-color: var(--red); background: var(--red-light); }
.condition-icon { font-size: 28px; margin-bottom: 8px; }
.condition-label { font-size: 14px; font-weight: 700; color: var(--text); }
.condition-sub { font-size: 12px; color: var(--text3); margin-top: 3px; }

.empty { text-align: center; padding: 40px; color: var(--text3); font-size: 14px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.loading-text { text-align: center; padding: 40px; color: var(--text3); font-family: var(--mono); font-size: 13px; letter-spacing: 0.05em; }
.chip-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; }
.chip { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: white; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.12s; color: var(--text2); }
.chip:hover { border-color: var(--blue-light); color: var(--blue); }
.chip.active { background: var(--blue); border-color: var(--blue); color: white; }

@media (max-width: 680px) {
  .login-left { display: none; }
  .login-right { width: 100%; }
  .home-grid { grid-template-columns: 1fr 1fr; }
  .modal { max-width: 100%; }
  .grid-2 { grid-template-columns: 1fr; }
}

  [data-theme="dark"] {
    --blue: #4a90d9;
    --blue-light: #6aaae8;
    --blue-pale: #1a2a3e;
    --bg: #0f1117;
    --bg2: #1a1d27;
    --text: #e8eaf0;
    --text2: #a0a8b8;
    --text3: #606880;
    --border: #2a2d3e;
    --green: #4caf82;
    --green-light: #0d2318;
    --red: #e05555;
    --gold: #c9a84c;
  }
  [data-theme="dark"] .topbar { background: #0d1525; border-bottom: 1px solid #1a2a3e; }
  [data-theme="dark"] .home-btn { background: #1a1d27; border-color: #2a2d3e; }
  [data-theme="dark"] .home-btn:hover { background: #222538; }
  [data-theme="dark"] .modal { background: #1a1d27; }
  [data-theme="dark"] .modal-header { background: #0d1525; }
  [data-theme="dark"] .login-screen { background: #0a0e1a; }
  [data-theme="dark"] .login-right { background: #1a1d27; }
  [data-theme="dark"] input, [data-theme="dark"] select, [data-theme="dark"] textarea { background: #0f1117; border-color: #2a2d3e; color: #e8eaf0; }
  [data-theme="dark"] table thead th { background: #0f1117; color: #a0a8b8; }
  [data-theme="dark"] table tbody tr:hover { background: #1e2235; }
  [data-theme="dark"] .item-card { background: #1a1d27; border-color: #2a2d3e; }
  [data-theme="dark"] .item-card:hover { background: #222538; border-color: var(--blue); }
  [data-theme="dark"] .cadet-item { background: #1a1d27; }
  [data-theme="dark"] .cadet-item:hover { background: #222538; }
  [data-theme="dark"] .staff-select-btn { background: #1a1d27 !important; border-color: #2a2d3e !important; }
  [data-theme="dark"] .staff-select-btn:hover { background: #222538 !important; border-color: var(--blue) !important; }

  </style>
</head>
<body>
<div id="app"></div>
<script>
const API = 'http://localhost:8000';
let S = {
  // No login — staff selected from dropdown
  user: JSON.parse(sessionStorage.getItem('user')||'null'),
  error: null,
  items: null, cadets: null, stock: null, users: null,
  // Admin auth
  adminVerified: false,
};

// Get a token for the current user on demand
let _tokenCache = null;
let _tokenExpiry = 0;

async function getToken() {
  // Use admin account token for all API calls - backend auth still works
  // We just skip the login screen and select staff from dropdown
  if (_tokenCache && Date.now() < _tokenExpiry) return _tokenCache;
  const form = new URLSearchParams({username: 'admin', password: 'Password1!'});
  const res = await fetch(API + '/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: form.toString()
  });
  if (!res.ok) return null;
  const data = await res.json();
  _tokenCache = data.access_token;
  _tokenExpiry = Date.now() + 55 * 60 * 1000; // 55 min
  return _tokenCache;
}

async function api(method, path, body=null) {
  const h = {'Content-Type':'application/json'};
  const token = await getToken();
  if (token) h['Authorization'] = `Bearer ${token}`;
  const opts = {method, headers:h};
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(API+path, opts);
    if (!res.ok) { const e=await res.json().catch(()=>({detail:'Unknown error'})); throw new Error(e.detail||'Request failed'); }
    setConnected(true);
    return res.json();
  } catch(e) {
    if (e instanceof TypeError && e.message.includes('fetch')) {
      setConnected(false);
      throw new Error('Cannot reach the server. Check the backend is running.');
    }
    throw e;
  }
}

let _connected = true;
function setConnected(ok) {
  if (ok === _connected) return;
  _connected = ok;
  const banner = document.getElementById('conn-banner');
  if (!banner) return;
  if (ok) {
    banner.style.display = 'none';
  } else {
    banner.style.display = 'flex';
  }
}
const GET = p => api('GET',p);
const POST = (p,b) => api('POST',p,b);
const PATCH = (p,b) => api('PATCH',p,b);
const DELETE = p => api('DELETE',p);

async function loadItems() { if (!S.items) S.items = await GET('/items/'); return S.items; }
async function loadCadets() { S.cadets = await GET('/cadets/?active_only=false'); return S.cadets; }
async function loadStock() { S.stock = await GET('/stock/'); return S.stock; }
async function loadUsers() { S.users = await GET('/users/'); return S.users; }

async function loadStaffList() {
  const res = await fetch(API + '/users/public');
  if (!res.ok) throw new Error('Could not load staff list');
  return res.json();
}

function selectUser(user) {
  S.user = user;
  S.adminVerified = false;
  sessionStorage.setItem('user', JSON.stringify(user));
  render();
}

function doLogout() {
  S.user = null;
  S.adminVerified = false;
  S.items = null; S.cadets = null; S.stock = null; S.users = null;
  sessionStorage.removeItem('user');
  render();
}

async function verifyAdminPin(userId, pin) {
  const res = await fetch(API + '/users/verify-pin', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({user_id: userId, pin})
  });
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e.detail || 'Incorrect PIN');
  }
  return res.json();
}

function render() {
  document.getElementById('app').innerHTML = !S.user ? staffSelectorHTML() : homeHTML();
  bind();
}

function staffSelectorHTML() {
  return `<div class="login-screen">
    <div class="login-bg-grid" style="pointer-events:none"></div>
    <div class="login-left">
      <img src="1701_crest.png" style="width:200px;height:200px;object-fit:contain;mix-blend-mode:screen;margin-bottom:16px" alt="1701 Crest">
      <h1>JOHNSTONE<br>SQUADRON</h1>
      <p>1701 Air Training Corps · Uniform Inventory</p>
    </div>
    <div class="login-right">
      <h2>WHO ARE YOU?</h2>
      <p style="margin-bottom:20px">Select your name to continue</p>
      <div id="staff-list" style="display:flex;flex-direction:column;gap:8px;max-height:420px;overflow-y:auto">
        <div style="text-align:center;color:var(--text3);padding:20px;font-family:var(--mono)">Loading staff...</div>
      </div>
      <p style="margin-top:16px;font-size:12px;color:var(--text3);text-align:center;font-family:var(--mono)">ROYAL AIR FORCE AIR CADETS</p>
    </div>
  </div>`;
}

function homeHTML() {
  const isAdmin = S.user?.is_admin;
  return `<div class="home-screen">
  <div id="conn-banner" style="display:none;align-items:center;justify-content:center;gap:10px;background:#c0392b;color:white;padding:9px 16px;font-size:13px;font-weight:600;font-family:var(--body)">

function showModal(html, wide=false) {
  document.getElementById('modal-root').innerHTML = `<div class="overlay" id="overlay"><div class="modal${wide?' modal-wide':''}">${html}</div></div>`;
  document.getElementById('overlay').addEventListener('click', e => { if(e.target.id==='overlay') closeModal(); });
  document.querySelectorAll('.modal-close').forEach(b => b.onclick = closeModal);
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const a = btn.dataset.action;
      if (a === 'close') closeModal();
      else if (a === 'cadets') openCadets();
      else if (a === 'admin') openAdmin();
      else if (a === 'addstaff') openAddStaff();
      else if (a === 'addcadet') openAddCadet();
      else if (a === 'bulkstock') openBulkStock();
    });
  });
}
function closeModal() { const r=document.getElementById('modal-root'); if(r) r.innerHTML=''; }
function mHead(title) { return `<div class="modal-header"><span class="modal-title">${title}</span><button class="modal-close">✕</button></div>`; }
function showError(id, msg) { const el=document.getElementById(id); if(el) el.innerHTML=`<div class="alert alert-danger">${msg}</div>`; }
function fmt(dt) { if(!dt) return '—'; return new Date(dt).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }

async function openCadets() {
  showModal(`${mHead('VIEW CADETS')}<div class="modal-body"><div class="loading-text">Loading cadets...</div></div>`, true);
  await loadCadets();
  const cadets = (S.cadets||[]).filter(c => c.active);
  showModal(`${mHead('VIEW CADETS')}<div class="modal-body">
    <div class="search-wrap"><span class="search-icon">🔍</span><input id="cadet-search" placeholder="Search by name or service number..." type="text"></div>
    <div id="cadet-list">${cadetListHTML(cadets)}</div>
  </div>`, true);
  document.getElementById('cadet-search').oninput = e => {
    const s=e.target.value.toLowerCase();

    document.getElementById('cadet-list').innerHTML = cadetListHTML(activeCadets.filter(c=>(c.surname+c.forename+(c.flight||'')).toLowerCase().includes(s)));

function cadetListHTML(cadets) {

function bindCadetItems() { document.querySelectorAll('.cadet-item[data-id]').forEach(el => { el.onclick = () => openCadetRecord(parseInt(el.dataset.id)); }); }

// ── ISSUE FLOW ──
async function openIssueFlow(preselectedCadetId=null) {
  const [items, cadets] = await Promise.all([loadItems(), loadCadets()]);
  await loadStock();
  const cadetPreselected = !!preselectedCadetId;
  let step=1, selectedItem=null, selectedSize=null;
  let selectedCadet = preselectedCadetId ? cadets.find(c=>c.id===preselectedCadetId) : null;

  function renderStep() {
    const steps = cadetPreselected
      ? [{l:'1 · Select Item',s:1},{l:'2 · Select Size',s:2},{l:'3 · Confirm',s:3}]
      : [{l:'1 · Select Item',s:1},{l:'2 · Select Size',s:2},{l:'3 · Select Cadet',s:3},{l:'4 · Confirm',s:4}];
    const maxStep = cadetPreselected ? 3 : 4;
    const isLast = step === maxStep;

    showModal(`${mHead('ISSUE UNIFORM')}<div class="modal-body">
      ${cadetPreselected ? `<div style="margin-bottom:16px;padding:10px 14px;background:var(--blue-pale);border-radius:var(--r);font-size:13px;color:var(--blue)">Issuing to: <strong>${selectedCadet.rank} ${selectedCadet.surname}, ${selectedCadet.forename}</strong></div>` : ''}
      <div class="steps">${steps.map(s=>`<div class="step ${step===s.s?'active':step>s.s?'done':''}">${s.l}</div>`).join('')}</div>
      <div id="issue-error"></div>
      ${step===1?s1():step===2?s2():(cadetPreselected&&step===3)?sConfirm():step===3?s3():sConfirm()}
    </div>
    <div class="modal-footer">
      ${step>1?`<button class="btn btn-ghost" id="i-back">← Back</button>`:''}
      <button class="btn btn-ghost" data-action="close">Cancel</button>
      ${!isLast?`<button class="btn btn-primary" id="i-next">Next →</button>`:`<button class="btn btn-success" id="i-confirm">Confirm Issue</button>`}
    </div>`, true);

    document.getElementById('i-back')?.addEventListener('click', () => { step--; if(step===1) selectedCategory=null; renderStep(); });

    if (step===1) {
      // Category buttons
      document.querySelectorAll('.cat-btn').forEach(c => {
        c.onclick = () => { selectedCategory = c.dataset.cat; renderStep(); };
      });

      // Auto-advance: direct items (single-item categories) go straight to sizes
      document.querySelectorAll('.item-card:not(.cat-btn)').forEach(c => {
        c.onclick = () => {
          selectedItem = items.find(i => i.id === parseInt(c.dataset.id));
          selectedSize = null;
          step = 2; renderStep();
        };
      });

      // Back to categories
      document.getElementById('cat-back')?.addEventListener('click', () => { selectedCategory = null; selectedItem = null; renderStep(); });

      // Item cards in category view - auto advance to sizes
      document.querySelectorAll('.item-card:not(.cat-btn)').forEach(c => {
        c.onclick = () => {
          selectedItem = items.find(i => i.id === parseInt(c.dataset.id));
          selectedSize = null;
          step = 2; renderStep();
        };
      });
    }

    if (step===2) {
      document.querySelectorAll('.size-btn').forEach(b => {
        b.onclick = () => {
          if(b.classList.contains('out-of-stock')) return;
          selectedSize = selectedItem.sizes.find(s => s.id === parseInt(b.dataset.id));
          // Auto-advance to next step
          step = 3; renderStep();
        };
      });
    }

    if (step===3 && !cadetPreselected) {
      document.getElementById('cadet-search')?.addEventListener('input', e => { const s=e.target.value.toLowerCase(); document.querySelectorAll('.cadet-item').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(s)?'':'none';}); });
      document.querySelectorAll('.cadet-item[data-id]').forEach(el => {
        el.onclick = () => {
          selectedCadet = cadets.find(c => c.id === parseInt(el.dataset.id));
          // Check gender appropriateness of selected item
          if (selectedItem && selectedCadet) {
            const name = selectedItem.short_name.toLowerCase();
            const gender = selectedCadet.gender;
            let mismatch = false;
            if ((name.includes('(f)') || name.includes('female') || name.includes('skirt')) && gender === 'male') mismatch = true;
            if ((name.includes('(m)') || name.includes('extra long')) && gender === 'female') mismatch = true;
            if (mismatch) {
              if (!confirm("⚠ " + selectedItem.short_name + " may not be suitable for this cadet gender. Issue anyway?")) {
                selectedItem = null; selectedSize = null; step = 1; renderStep(); return;
              }
            }
          }
          // Auto-advance to confirm
          step = 4; renderStep();
        };
      });
    }

    // Confirm step
    const onConfirmStep = (cadetPreselected && step===3) || (!cadetPreselected && step===4);
    if (onConfirmStep) {
      document.getElementById('i-confirm').onclick = async () => {
        const dupReason=document.getElementById('dup-reason')?.value?.trim()||null;
        const existing=await GET(`/cadets/${selectedCadet.id}/issued`);
        const hasDup=existing.some(i=>i.item_id===selectedItem.id);
        if(hasDup&&selectedItem.allows_multiples&&!dupReason) {
          if(!document.getElementById('dup-reason')) {
            const div=document.createElement('div'); div.className='form-group';
            div.innerHTML=`<div class="alert alert-warning" style="margin-bottom:12px">This cadet already has this item. A reason is required to issue another.</div><label>Reason for Duplicate Issue</label><input id="dup-reason" placeholder="e.g. Size change, lost previous item">`;
            document.getElementById('issue-error').after(div);
          } return;
        }
        if(hasDup&&!selectedItem.allows_multiples){showError('issue-error','This item cannot be issued multiple times to the same cadet.');return;}
        const notes=document.getElementById('issue-notes')?.value?.trim()||null;
        const btn=document.getElementById('i-confirm'); btn.disabled=true; btn.textContent='Issuing...';
        try {
          await POST('/transactions/issue',{cadet_id:selectedCadet.id,item_id:selectedItem.id,size_id:selectedSize.id,quantity:1,duplicate_reason:dupReason,notes});
          S.stock=null;
          showModal(`${mHead('ISSUE UNIFORM')}<div class="modal-body">
            <div class="alert alert-success">&#10003; <strong>${selectedItem.short_name}</strong> (${selectedSize.size_label}) issued to ${selectedCadet.rank} ${selectedCadet.surname}, ${selectedCadet.forename}</div>
            <div style="background:var(--blue-pale);border-radius:var(--r);padding:16px;font-size:13px;color:var(--text2)">
              <strong>Issued by:</strong> ${S.user.forename} ${S.user.surname}<br><strong>Time:</strong> ${fmt(new Date().toISOString())}
            </div>
          </div>
          <div class="modal-footer"><button class="btn btn-ghost" data-action="close">Done</button><button class="btn btn-ghost" id="issue-print">🖨 Print Receipt</button><button class="btn btn-primary" id="issue-another">Issue Another Item</button></div>`);
          document.getElementById('issue-another').onclick = () => openIssueFlow(preselectedCadetId);
          document.getElementById('issue-print').onclick = () => printIssueReceipt(selectedCadet, selectedItem.short_name, selectedSize.size_label, S.user);
        } catch(e) { btn.disabled=false; btn.textContent='Confirm Issue'; showError('issue-error',e.message); }
      };
    }
  }

  let selectedCategory = null;

  function s1() {
    // Gender filtering
    const gender = selectedCadet ? selectedCadet.gender : null;
    function isGenderAppropriate(item) {
      const name = item.short_name.toLowerCase();
      // Female-only items
      if (name.includes('(f)') || name.includes('female') || name.includes('skirt')) {
        return gender === 'female' || gender === 'other' || !gender;
      }
      // Male-only items
      if (name.includes('(m)') || name.includes('extra long')) {
        return gender === 'male' || gender === 'other' || !gender;
      }
      return true; // Neutral items shown to all
    }

    const filteredItems = gender ? items.filter(isGenderAppropriate) : items;

    const catMap = {};
    filteredItems.forEach(i => {
      const cat = i.category || 'Other';
      if (!catMap[cat]) catMap[cat] = [];
      catMap[cat].push(i);
    });

    // Categories with only 1 item - show item directly, no sub-menu
    // Categories with multiple items - show category button first
    const directItems = [];
    const categoryGroups = [];

    Object.entries(catMap).forEach(([cat, catItems]) => {
      if (catItems.length === 1) {
        directItems.push({ cat, item: catItems[0] });
      } else {
        categoryGroups.push({ cat, items: catItems });
      }
    });

    if (!selectedCategory) {
      return `<div class="section-label">Select Item</div>
      <div class="item-grid">
        ${categoryGroups.map(({cat, items: ci}) => `
          <div class="item-card cat-btn" data-cat="${cat}" style="padding:16px">
            <div class="item-card-name">${cat}</div>

// ── RETURN FLOW ──
async function openReturnFlow(issuedId=null, itemName=null, cadetId=null, cadetObj=null) {
  const cadets = await loadCadets();
  let selectedCadet = cadetId ? (cadetObj || cadets.find(c=>c.id===cadetId)) : null;
  let selectedIssue = issuedId ? {issued_id:issuedId, short_name:itemName} : null;
  let issuedItems = null;
  let condition = null;

  async function loadIssued(cid) { issuedItems = await GET(`/cadets/${cid}/issued`); }
  if (cadetId) await loadIssued(cadetId);

  let step = issuedId ? 3 : 1;  // If item pre-selected, go straight to condition step

  async function renderStep() {
    showModal(`${mHead('RETURN UNIFORM')}<div class="modal-body">
      <div class="steps">
        <div class="step ${step===1?'active':step>1?'done':''}">1 · Select Cadet</div>
        <div class="step ${step===2?'active':step>2?'done':''}">2 · Select Item</div>
        <div class="step ${step===3?'active':''}">3 · Condition</div>
      </div>
      <div id="return-error"></div>
      ${step===1?r1():step===2?r2():r3()}
    </div>
    <div class="modal-footer">
      ${step>1&&!issuedId?`<button class="btn btn-ghost" id="r-back">← Back</button>`:''}
      <button class="btn btn-ghost" data-action="close">Cancel</button>
      ${step<3?`<button class="btn btn-primary" id="r-next">Next →</button>`:`<button class="btn btn-danger" id="r-confirm">Confirm Return</button>`}
    </div>`, true);

    document.getElementById('r-back')?.addEventListener('click', async () => { step--; await renderStep(); });

    if (step===1) {
      document.getElementById('cadet-search')?.addEventListener('input', e => { const s=e.target.value.toLowerCase(); document.querySelectorAll('.cadet-item').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(s)?'':'none';}); });
      document.querySelectorAll('.cadet-item[data-id]').forEach(el => {
        el.onclick = async () => { selectedCadet=cadets.find(c=>c.id===parseInt(el.dataset.id)); document.querySelectorAll('.cadet-item').forEach(x=>x.classList.remove('selected')); el.classList.add('selected'); };
      });
      document.getElementById('r-next').onclick = async () => {
        if(!selectedCadet){showError('return-error','Please select a cadet');return;}
        await loadIssued(selectedCadet.id);
        if(issuedItems.length===0){showError('return-error','This cadet has no items currently issued');return;}
        step=2; await renderStep();
      };
    }
    if (step===2) {
      document.querySelectorAll('.issued-item-btn').forEach(btn => {
        btn.onclick = () => {
          const id = parseInt(btn.dataset.id);
          const item = issuedItems.find(i => i.issued_id === id);
          if (!item) return;
          if (item.short_name && item.short_name.toLowerCase().includes('sock')) {
            showError('return-error', '⚠ Socks cannot be returned for hygiene reasons.');
            return;
          }
          const existing = selectedIssues.findIndex(s => s.issued_id === id);
          if (existing >= 0) {
            selectedIssues.splice(existing, 1);
          } else {
            selectedIssues.push({ issued_id: id, short_name: item.short_name, size_label: item.size_label, condition: null, reason: null, notes: null });
          }
          renderStep();
        };
      });
      document.querySelectorAll('.multi-condition').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const id = parseInt(btn.dataset.id);
          const s = selectedIssues.find(s => s.issued_id === id);
          if (s) { s.condition = btn.dataset.val; renderStep(); }
        };
      });
      document.querySelectorAll('.multi-reason').forEach(sel => {
        sel.onchange = (e) => {
          e.stopPropagation();
          const id = parseInt(sel.dataset.id);
          const s = selectedIssues.find(s => s.issued_id === id);
          if (s) s.reason = sel.value;
        };
      });
      document.querySelectorAll('.multi-remove').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const id = parseInt(btn.dataset.id);
          selectedIssues = selectedIssues.filter(s => s.issued_id !== id);
          renderStep();
        };
      });
      document.getElementById('r-next').onclick = () => {
        if (selectedIssues.length === 0) { showError('return-error', 'Please select at least one item to return'); return; }
        const missing = selectedIssues.find(s => !s.condition || !s.reason);
        if (missing) { showError('return-error', 'Please set condition and reason for all selected items'); return; }
        step = 3; renderStep();
      };
    }
    if (step===3) {
      document.querySelectorAll('.condition-btn').forEach(btn => {
        btn.onclick = () => {
          condition=btn.dataset.condition;
          document.querySelectorAll('.condition-btn').forEach(x=>{x.classList.remove('selected-good','selected-bad');});
          btn.classList.add(condition==='serviceable'?'selected-good':'selected-bad');
          const warn=document.getElementById('unsvc-warn');
          if(warn) warn.style.display=condition==='unserviceable'?'block':'none';
        };
      });
      document.getElementById('r-confirm').onclick = async () => {
        const btn=document.getElementById('r-confirm'); btn.disabled=true; btn.textContent='Processing...';
        try {
          // Process all returns
          let warnings = [];
          for (const s of selectedIssues) {
            const fullNotes = s.reason || null;
            const result = await POST('/transactions/return', {issued_item_id: s.issued_id, condition: s.condition, notes: fullNotes});
            if (result.warning) warnings.push(s.short_name + ': ' + result.warning);
          }
          S.stock = null;
          const serviceable = selectedIssues.filter(s => s.condition === 'serviceable');
          const unserviceable = selectedIssues.filter(s => s.condition === 'unserviceable');
          const capturedCadet = selectedCadet;
          const capturedIssues = [...selectedIssues];
          showModal(mHead('RETURNS PROCESSED') + '<div class="modal-body">' +
            '<div class="alert alert-success">✓ ' + selectedIssues.length + ' item(s) returned successfully.</div>' +

async function openSearchUniform() {
  const [items] = await Promise.all([loadItems(), loadStock()]);
  let selectedItem = null;

  function renderSearch() {
    const stockMap={}; (S.stock||[]).forEach(s=>{stockMap[`${s.item_id}-${s.size_id}`]=s.quantity;});

    showModal(`${mHead('SEARCH UNIFORM STOCK')}<div class="modal-body">
      <div class="search-wrap" style="margin-bottom:16px"><span class="search-icon">🔍</span><input id="stock-search" placeholder="Search items..." type="text" autofocus></div>
      ${!selectedItem?`<div id="stock-item-grid" class="item-grid">${items.map(i=>{
        const totalStock = i.sizes ? i.sizes.reduce((sum,s)=>{return sum+(stockMap[i.id+'-'+s.id]||0);},0) : 0;
        return `<div class="item-card" data-id="${i.id}" data-name="${i.short_name.toLowerCase()}" style="${totalStock===0?'opacity:0.5':''}">
          <div class="item-card-name">${i.short_name}</div>
          <div class="item-card-cat" style="color:${totalStock>0?'var(--green)':'var(--red)'}">${totalStock>0?totalStock+' in stock':'Out of stock'}</div>
        </div>`;
      }).join('')}</div>`
      :renderSizes()}
    </div>
    <div class="modal-footer">
      ${selectedItem?`<button class="btn btn-ghost" id="srch-back">← Back to Items</button>`:''}
      <button class="btn btn-ghost" data-action="close">Close</button>
    </div>`, true);

    // Live search filter
    document.getElementById('stock-search')?.addEventListener('input', e => {
      const s = e.target.value.toLowerCase();
      document.querySelectorAll('.item-card[data-name]').forEach(card => {
        card.style.display = card.dataset.name.includes(s) ? '' : 'none';
      });
    });

    document.getElementById('srch-back')?.addEventListener('click', () => { selectedItem=null; renderSearch(); });
    document.querySelectorAll('.item-card').forEach(c => { c.onclick = () => { selectedItem=items.find(i=>i.id===parseInt(c.dataset.id)); renderSearch(); }; });
  }

  function renderSizes() {
    const stockMap={}; (S.stock||[]).forEach(s=>{stockMap[`${s.item_id}-${s.size_id}`]=s.quantity;});
    const sizes=selectedItem.sizes.map(s=>({...s,qty:stockMap[`${selectedItem.id}-${s.id}`]??0}));
    const inStock=sizes.filter(s=>s.qty>0).sort((a,b)=>b.qty-a.qty);
    const outOfStock=sizes.filter(s=>s.qty===0);
    return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div><div style="font-family:var(--head);font-size:28px;letter-spacing:0.04em;color:var(--blue)">${selectedItem.short_name}</div><div style="font-size:12px;color:var(--text3)">${selectedItem.name}</div></div>
      <div style="text-align:right"><div style="font-size:24px;font-weight:800;color:var(--green)">${inStock.length}</div><div style="font-size:11px;font-family:var(--mono);color:var(--text3)">SIZES IN STOCK</div></div>
    </div>
    ${inStock.length>0?`<div class="section-label">In Stock</div><div class="size-grid">${inStock.map(s=>`<div style="padding:10px 14px;border:1.5px solid var(--green);border-radius:6px;background:var(--green-light);text-align:center"><div style="font-family:var(--mono);font-size:13px;font-weight:600;color:var(--green)">${s.size_label}</div><div style="font-size:18px;font-weight:800;color:var(--green)">${s.qty}</div><div style="font-size:10px;color:var(--green);opacity:0.7">in stock</div></div>`).join('')}</div>`:''}
    ${outOfStock.length>0?`<div class="section-label" style="margin-top:16px">Out of Stock</div><div class="size-grid">${outOfStock.map(s=>`<div style="padding:10px 14px;border:1.5px solid var(--border);border-radius:6px;background:#f8f9fd;text-align:center;opacity:0.6"><div style="font-family:var(--mono);font-size:13px;color:var(--text3)">${s.size_label}</div><div style="font-size:13px;color:var(--red);font-weight:700">Out</div></div>`).join('')}</div>`:''}
    ${inStock.length===0?`<div class="alert alert-warning" style="margin-top:12px">⚠ No sizes of this item are currently in stock.</div>`:''}`;
  }

  renderSearch();
}

    '</div></div>' +
    '<div class="modal-footer"><button class="btn btn-ghost" id="cadet-back">← Back</button><button class="btn btn-primary" id="cadet-submit">Add Cadet</button></div>');

  document.getElementById('cadet-submit').onclick = async () => {
    const btn=document.getElementById('cadet-submit'); btn.disabled=true; btn.textContent='Adding...';
    try {
      // Auto-generate service number: get all cadets, find highest 1701xxx number
      const existing = S.cadets || await loadCadets();
      const nums = existing.map(c => {
        const m = String(c.service_number||'').match(/^1701(\d+)$/);
        return m ? parseInt(m[1]) : 0;
      });
      const nextNum = (Math.max(0, ...nums) + 1).toString().padStart(3, '0');
      const svcNum = '1701' + nextNum;
      await POST('/cadets/', {
        service_number: svcNum,
        rank: document.getElementById('c-rank').value,
        forename: document.getElementById('c-fore').value.trim(),
        surname: document.getElementById('c-sur').value.trim(),
        gender: document.getElementById('c-gender').value,
        flight: document.getElementById('c-flight').value.trim()||null
      });
      S.cadets=null;
      showModal(mHead('ADD CADET') + '<div class="modal-body"><div class="alert alert-success">✓ Cadet added successfully. Service number: <strong>' + svcNum + '</strong></div></div><div class="modal-footer"><button class="btn btn-ghost" data-action="close">Done</button><button class="btn btn-primary" data-action="addcadet">Add Another</button></div>');
    } catch(e) { btn.disabled=false; btn.textContent='Add Cadet'; showError('cadet-error',e.message); }
  };
}

async function openBulkStock() {
  const items = await loadItems();
  let selectedItem = null;
  function renderBulk() {
    showModal(`${mHead('BULK ADD STOCK')}<div class="modal-body">
      <div class="alert alert-info">Select an item, enter quantities received. Leave blank to skip a size.</div>
      <div id="stock-error"></div>

    <div class="modal-footer"><button class="btn btn-ghost" data-action="admin">← Back</button>${selectedItem?`<button class="btn btn-primary" id="stk-submit">Add Stock</button>`:''}</div>`, true);

    document.getElementById('stk-change')?.addEventListener('click', ()=>{selectedItem=null;renderBulk();});
    document.querySelectorAll('.item-card').forEach(c=>{c.onclick=()=>{selectedItem=items.find(i=>i.id===parseInt(c.dataset.id));renderBulk();};});
    document.getElementById('stk-submit')?.addEventListener('click', async ()=>{
      const adj=[]; document.querySelectorAll('.size-qty').forEach(inp=>{const q=parseInt(inp.value);if(q>0)adj.push({item_id:selectedItem.id,size_id:parseInt(inp.dataset.sizeId),quantity:q});});
      if(adj.length===0){showError('stock-error','Please enter at least one quantity');return;}
      const btn=document.getElementById('stk-submit'); btn.disabled=true; btn.textContent='Adding...';
      try {
        await POST('/stock/bulk-adjust',adj); S.stock=null;
        showModal(`${mHead('BULK ADD STOCK')}<div class="modal-body"><div class="alert alert-success">✓ Stock updated. ${adj.length} size${adj.length!==1?'s':''} updated.</div></div><div class="modal-footer"><button class="btn btn-ghost" data-action="close">Done</button><button class="btn btn-primary" data-action="bulkstock">Add More</button></div>`);
      } catch(e){btn.disabled=false;btn.textContent='Add Stock';showError('stock-error',e.message);}
    });
  }
  renderBulk();
}

function openEditStaff(userId, users) {
  const u = users.find(u => u.id === userId);
  if (!u) return;
  const ranks = ['CI','Sgt','FS','WO','A/Plt Off','Plt Off','Fg Off','Flt Lt','Sqn Ldr'];
  const roles = ['OC','Adj','Trg Off','SNCO','CI'];
  const rankOpts = ranks.map(r => '<option value="' + r + '"' + (u.rank===r?' selected':'') + '>' + r + '</option>').join('');
  const roleOpts = roles.map(r => '<option value="' + r + '"' + (u.role===r?' selected':'') + '>' + r + '</option>').join('');
  showModal(mHead('EDIT STAFF MEMBER') + '<div class="modal-body">' +
    '<div id="es-error"></div>' +
    '<div class="form-group"><label>Forename</label><input id="es-forename" value="' + u.forename + '"></div>' +
    '<div class="form-group"><label>Surname</label><input id="es-surname" value="' + u.surname + '"></div>' +
    '<div class="form-group"><label>Rank</label><select id="es-rank"><option value="">— Select Rank —</option>' + rankOpts + '</select></div>' +
    '<div class="form-group"><label>Role</label><select id="es-role"><option value="">— Select Role —</option>' + roleOpts + '</select></div>' +
    '<div class="form-group"><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="es-admin"' + (u.is_admin?' checked':'') + '> Admin privileges</label></div>' +
    '</div><div class="modal-footer"><button class="btn btn-ghost" id="es-back">← Back</button><button class="btn btn-primary" id="es-save">Save Changes</button></div>', true);

  document.getElementById('es-back').onclick = () => openManageStaff();
  document.getElementById('es-save').onclick = async () => {
    const btn = document.getElementById('es-save');
    btn.disabled = true; btn.textContent = 'Saving...';
    try {
      await PATCH('/users/' + userId + '/edit', {
        forename: document.getElementById('es-forename').value.trim(),
        surname: document.getElementById('es-surname').value.trim(),
        rank: document.getElementById('es-rank').value || null,
        role: document.getElementById('es-role').value || null,
        is_admin: document.getElementById('es-admin').checked
      });
      S.users = null;
      openManageStaff();
    } catch(e) { btn.disabled=false; btn.textContent='Save Changes'; showError('es-error', e.message); }
  };
}

async function openManageCadets() {
  const cadets = await loadCadets();
  const active = cadets.filter(c => c.active);
  const inactive = cadets.filter(c => !c.active);

  function renderManageCadets() {
    showModal(`${mHead('MANAGE CADETS')}<div class="modal-body">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
        <button class="btn btn-primary" id="mc-addcadet">+ Add Cadet</button>
        <button class="btn btn-ghost" id="mc-import">📥 Import CSV</button>
        <a id="mc-template" download="cadet-import-template.csv" href="data:text/csv;charset=utf-8,service_number%2Crank%2Cforename%2Csurname%2Cgender%2Cflight%0A2501701%2CCadet%2CJane%2CSmith%2Cfemale%2CA" class="btn btn-ghost" style="text-decoration:none">⬇ CSV Template</a>
      </div>
      <div class="search-wrap"><span class="search-icon">🔍</span><input id="mc-search" placeholder="Search by name or service number..." type="text"></div>

      <div class="section-label" style="margin-top:16px">Active Cadets <span style="font-weight:400;color:var(--text3)">(${active.length})</span></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Service No</th><th>Name</th><th>Flight</th><th>Actions</th></tr></thead>
        <tbody id="mc-active-tbody">${activeTableHTML(active)}</tbody>
      </table></div>

      ${inactive.length > 0 ? `
      <div class="section-label" style="margin-top:24px">Inactive Cadets <span style="font-weight:400;color:var(--text3)">(${inactive.length})</span></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Service No</th><th>Name</th><th>Flight</th><th>Actions</th></tr></thead>
        <tbody id="mc-inactive-tbody">${inactiveTableHTML(inactive)}</tbody>
      </table></div>` : ''}
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" data-action="admin">← Back</button></div>`, true);

    document.getElementById('mc-addcadet').onclick = openAddCadet;
    document.getElementById('mc-import').onclick = openImportCadets;

    document.getElementById('mc-search').oninput = e => {
      const s = e.target.value.toLowerCase();
      const fa = active.filter(c => (c.surname+c.forename+(c.flight||'')).toLowerCase().includes(s));
      const fi = inactive.filter(c => (c.surname+c.forename+(c.flight||'')).toLowerCase().includes(s));
      document.getElementById('mc-active-tbody').innerHTML = activeTableHTML(fa);
      if (document.getElementById('mc-inactive-tbody')) document.getElementById('mc-inactive-tbody').innerHTML = inactiveTableHTML(fi);
      bindCadetTableActions();
    };

    bindCadetTableActions();
  }

  function activeTableHTML(list) {
    if (!list.length) return '<tr><td colspan="4"><div class="empty">No active cadets found</div></td></tr>';
    return list.map(c => `<tr>
      
      <td><strong>${c.surname}</strong>, ${c.forename} <span style="color:var(--text3);font-size:12px">${c.rank}</span></td>
      <td style="font-size:13px">${c.flight||'—'}</td>
      <td><button class="btn btn-danger btn-sm mc-deactivate" data-id="${c.id}" data-name="${c.rank} ${c.surname}">Deactivate</button></td>
    </tr>`).join('');
  }

  function inactiveTableHTML(list) {
    if (!list.length) return '<tr><td colspan="4"><div class="empty">No inactive cadets found</div></td></tr>';
    return list.map(c => `<tr style="opacity:0.7">
      
      <td><strong>${c.surname}</strong>, ${c.forename} <span style="color:var(--text3);font-size:12px">${c.rank}</span></td>
      <td style="font-size:13px">${c.flight||'—'}</td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" data-view="${c.id}">View Record</button>
        <button class="btn btn-ghost btn-sm mc-reactivate" data-id="${c.id}">Reactivate</button>
      </td>
    </tr>`).join('');
  }

  function bindCadetTableActions() {
    document.querySelectorAll('[data-view]').forEach(btn => {
      btn.onclick = () => openCadetRecord(parseInt(btn.dataset.view));
    });
    document.querySelectorAll('.mc-deactivate').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm(`Deactivate ${btn.dataset.name}?\n\nThey must have no outstanding kit. Their history will be kept.`)) return;
        btn.disabled = true; btn.textContent = 'Working...';
        try {
          await PATCH(`/cadets/${btn.dataset.id}/deactivate`);
          S.cadets = null;
          await loadCadets();
          renderManageCadets();
        } catch(e) { alert('Error: ' + e.message); btn.disabled=false; btn.textContent='Deactivate'; }
      };
    });

    document.querySelectorAll('.mc-reactivate').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm('Reactivate this cadet?')) return;
        btn.disabled = true; btn.textContent = 'Working...';
        try {
          await PATCH(`/cadets/${btn.dataset.id}/reactivate`);
          S.cadets = null;
          await loadCadets();
          renderManageCadets();
        } catch(e) { alert('Error: ' + e.message); btn.disabled=false; btn.textContent='Reactivate'; }
      };
    });
  }

  renderManageCadets();
}

async function openImportCadets() {
  showModal(`${mHead('IMPORT CADETS — CSV')}
  <div class="modal-body">
    <div class="alert alert-warning" style="margin-bottom:16px">
      ⚠ Each row will be added as a new cadet. Duplicates (same service number) will be skipped.
    </div>
    <div style="background:var(--blue-pale);border-radius:var(--r);padding:14px;margin-bottom:16px;font-size:13px">
      <strong>Required columns:</strong> service_number, rank, forename, surname, gender (male/female)<br>
      <strong>Optional columns:</strong> flight<br>
      <span style="color:var(--text3);font-size:12px">Download the template above for the correct format.</span>
    </div>
    <div class="form-group">
      <label>Select CSV file</label>
      <input type="file" id="import-file" accept=".csv" style="padding:8px;border:1.5px solid var(--border);border-radius:var(--r);width:100%;font-family:var(--body);font-size:13px;cursor:pointer">
    </div>
    <div id="import-preview" style="margin-top:12px"></div>
    <div id="import-error"></div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" id="imp-back">← Back</button>
    <button class="btn btn-primary" id="imp-run" disabled>Import</button>
  </div>`, true);

  document.getElementById('imp-back').onclick = openManageCadets;

  let parsedRows = [];

  document.getElementById('import-file').onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const lines = ev.target.result.trim().split('\n').filter(l => l.trim());
      if (lines.length < 2) { document.getElementById('import-error').innerHTML = '<div class="alert alert-danger">File appears empty or has no data rows.</div>'; return; }
      const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
      const required = ['service_number','rank','forename','surname','gender'];
      const missing = required.filter(r => !headers.includes(r));
      if (missing.length) { document.getElementById('import-error').innerHTML = `<div class="alert alert-danger">Missing columns: ${missing.join(', ')}</div>`; return; }
      parsedRows = [];
      const errors = [];
      lines.slice(1).forEach((line, i) => {
        const vals = line.split(',').map(v => v.trim().replace(/^"|"$/g,''));
        const row = {};
        headers.forEach((h, idx) => row[h] = vals[idx] || '');
        if (!row.service_number || !row.forename || !row.surname) { errors.push(`Row ${i+2}: missing required fields`); return; }
        if (!['male','female'].includes(row.gender?.toLowerCase())) { errors.push(`Row ${i+2}: gender must be 'male' or 'female'`); return; }
        parsedRows.push({ service_number: row.service_number, rank: row.rank||'Cadet', forename: row.forename, surname: row.surname, gender: row.gender.toLowerCase(), flight: row.flight||null });
      });
      const previewHTML = parsedRows.length > 0
        ? `<div class="section-label">${parsedRows.length} cadet(s) ready to import</div>
           <div class="table-wrap" style="max-height:200px;overflow-y:auto"><table>
             <thead><tr><th>Svc No</th><th>Rank</th><th>Name</th><th>Gender</th><th>Flight</th></tr></thead>
             <tbody>${parsedRows.map(r => `<tr><td style="font-family:var(--mono);font-size:12px">${r.service_number}</td><td>${r.rank}</td><td>${r.forename} ${r.surname}</td><td>${r.gender}</td><td>${r.flight||'—'}</td></tr>`).join('')}</tbody>
           </table></div>`
        : '';
      document.getElementById('import-preview').innerHTML = previewHTML + (errors.length ? `<div class="alert alert-warning" style="margin-top:8px">${errors.length} row(s) skipped: ${errors.slice(0,3).join('; ')}${errors.length>3?'…':''}</div>` : '');
      document.getElementById('import-error').innerHTML = '';
      document.getElementById('imp-run').disabled = parsedRows.length === 0;
    };
    reader.readAsText(file);
  };

  document.getElementById('imp-run').onclick = async () => {
    const btn = document.getElementById('imp-run'); btn.disabled = true; btn.textContent = 'Importing...';
    let added = 0, skipped = 0, failed = [];
    for (const row of parsedRows) {
      try { await POST('/cadets/', row); added++; }
      catch(e) { if (e.message.toLowerCase().includes('already') || e.message.includes('409') || e.message.includes('duplicate')) skipped++; else failed.push(row.surname + ': ' + e.message); }
    }
    S.cadets = null;
    showModal(`${mHead('IMPORT COMPLETE')}<div class="modal-body">
      <div class="alert alert-success">✓ ${added} cadet(s) imported successfully.</div>
      ${skipped > 0 ? `<div class="alert alert-warning" style="margin-top:8px">⚠ ${skipped} skipped (service number already exists).</div>` : ''}
      ${failed.length > 0 ? `<div class="alert alert-danger" style="margin-top:8px">✕ ${failed.length} failed: ${failed.slice(0,3).join('; ')}</div>` : ''}
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" data-action="close">Done</button><button class="btn btn-primary" id="imp-manage">View Cadets</button></div>`, true);
    document.getElementById('imp-manage').onclick = openManageCadets;
  };
}

async function openRemoveStock() {
  const [items] = await Promise.all([loadItems(), loadStock()]);
  let selectedItem = null;

  function renderAdjust() {
    showModal(`${mHead('ADJUST STOCK')}<div class="modal-body">
      <div class="alert alert-info">Select an item and size, then enter the quantity to <strong>remove</strong> from inventory. Use this for damaged, lost or written-off stock.</div>
      ${!selectedItem ? `
        <div class="section-label">Select Item</div>
        <div class="item-grid">${items.map(i=>`<div class="item-card" data-id="${i.id}"><div class="item-card-name">${i.short_name}</div><div class="item-card-cat">${i.category||''}</div></div>`).join('')}</div>
      ` : `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div style="font-family:var(--head);font-size:22px;color:var(--blue)">${selectedItem.short_name}</div>
          <button class="btn btn-ghost btn-sm" id="adj-change">Change Item</button>
        </div>
        <div class="section-label">Select Size and Quantity to Remove</div>
        <div id="adj-error"></div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">
          ${selectedItem.sizes.map(s => {
            const qty = (S.stock||[]).find(st=>st.item_id===selectedItem.id&&st.size_id===s.id)?.quantity??0;
            return `<div style="border:1px solid var(--border);border-radius:8px;padding:12px">
              <div style="font-family:var(--mono);font-size:12px;color:var(--text2);margin-bottom:4px">${s.size_label}</div>
              <div style="font-size:13px;color:${qty===0?'var(--red)':'var(--green)'};font-weight:700;margin-bottom:8px">${qty} in stock</div>
              ${qty > 0 ? `
                <input type="number" class="adj-qty" data-item="${selectedItem.id}" data-size="${s.size_id||s.id}" data-max="${qty}" placeholder="Remove qty" min="1" max="${qty}" style="font-size:13px;padding:6px 10px">
              ` : `<div style="font-size:12px;color:var(--text3)">None in stock</div>`}
            </div>`;
          }).join('')}
        </div>
      `}
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-action="admin">← Back</button>
      ${selectedItem ? `<button class="btn btn-danger" id="adj-submit">Remove Stock</button>` : ''}
    </div>`, true);

    document.getElementById('adj-change')?.addEventListener('click', () => { selectedItem=null; renderAdjust(); });
    document.querySelectorAll('.item-card').forEach(c => { c.onclick = () => { selectedItem=items.find(i=>i.id===parseInt(c.dataset.id)); renderAdjust(); }; });

    document.getElementById('adj-submit')?.addEventListener('click', async () => {
      const adjustments = [];
      let hasError = false;
      document.querySelectorAll('.adj-qty').forEach(inp => {
        const qty = parseInt(inp.value);
        const max = parseInt(inp.dataset.max);
        if (!qty || qty <= 0) return;
        if (qty > max) { showError('adj-error', `Cannot remove more than ${max} from a size`); hasError=true; return; }
        adjustments.push({ item_id: parseInt(inp.dataset.item), size_id: parseInt(inp.dataset.size), quantity: -qty });
      });
      if (hasError) return;
      if (adjustments.length === 0) { showError('adj-error', 'Please enter a quantity to remove for at least one size'); return; }

      const btn = document.getElementById('adj-submit');
      btn.disabled = true; btn.textContent = 'Removing...';
      try {
        await POST('/stock/bulk-adjust', adjustments);
        S.stock = null;
        showModal(`${mHead('ADJUST STOCK')}<div class="modal-body">
          <div class="alert alert-success">&#10003; Stock updated. ${adjustments.length} size${adjustments.length!==1?'s':''} adjusted.</div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" data-action="close">Done</button>
          <button class="btn btn-primary" id="adj-another">Adjust More Stock</button>
        </div>`);
        document.getElementById('adj-another').onclick = openRemoveStock;
      } catch(e) { btn.disabled=false; btn.textContent='Remove Stock'; showError('adj-error', e.message); }
    });
  }

  renderAdjust();
}
