<style>
:root {
  --blue: #002868;
  --blue-mid: #0a3d8f;
  --blue-light: #1557c0;
  --blue-pale: #e8eef8;
  --gold: #c9a84c;
  --red: #c0392b;
  --red-light: #fee2e2;
  --green: #166534;
  --green-light: #dcfce7;
  --amber: #92400e;
  --amber-light: #fef3c7;
  --bg: #f4f6fb;
  --bg2: #ffffff;
  --surface: #ffffff;
  --border: #dde3f0;
  --text: #0d1b3e;
  --text2: #4a5578;
  --text3: #9099b5;
  --mono: 'DM Mono', monospace;
  --head: 'Bebas Neue', sans-serif;
  --body: 'Figtree', sans-serif;
  --r: 10px;
  --r-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--body); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; -webkit-font-smoothing: antialiased; }

.login-screen { min-height: 100vh; display: flex; background: var(--blue); position: relative; overflow: hidden; }
.login-left { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px; position: relative; z-index: 2; }
.login-right { width: 420px; background: var(--bg2); display: flex; flex-direction: column; justify-content: center; padding: 56px 48px; }
.login-roundel { width: 80px; height: 80px; border-radius: 50%; background: conic-gradient(#1a5fad 0deg 120deg, #ffffff 120deg 240deg, #c8202d 240deg 360deg); margin-bottom: 24px; box-shadow: 0 0 0 6px rgba(255,255,255,0.1); }
.login-left h1 { font-family: var(--head); font-size: 64px; color: white; letter-spacing: 0.04em; line-height: 0.9; text-align: center; }
.login-left p { color: rgba(255,255,255,0.5); font-family: var(--mono); font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 16px; text-align: center; }
.login-right h2 { font-family: var(--head); font-size: 36px; letter-spacing: 0.05em; color: var(--blue); margin-bottom: 8px; }
.login-right > p { color: var(--text3); font-size: 13px; margin-bottom: 32px; }
.login-bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; }

.home-screen { min-height: 100vh; display: flex; flex-direction: column; }
.topbar { background: var(--blue); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.topbar-brand { display: flex; align-items: center; gap: 14px; }
.topbar-roundel { width: 32px; height: 32px; border-radius: 50%; background: conic-gradient(#4a90d9 0deg 120deg, #ffffff 120deg 240deg, #c8202d 240deg 360deg); flex-shrink: 0; }
.topbar-brand span { font-family: var(--head); font-size: 22px; letter-spacing: 0.08em; color: white; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.topbar-user-name { font-size: 13px; font-weight: 600; color: white; line-height: 1.2; text-align: right; }
.topbar-user-role { font-size: 10px; color: rgba(255,255,255,0.45); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; text-align: right; }
.btn-signout { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); padding: 7px 14px; border-radius: 6px; font-family: var(--body); font-size: 12px; cursor: pointer; transition: all 0.15s; }
.btn-signout:hover { background: rgba(255,255,255,0.18); color: white; }

.home-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; }
.home-greeting { text-align: center; margin-bottom: 56px; }
.home-greeting h2 { font-family: var(--head); font-size: 48px; letter-spacing: 0.04em; color: var(--blue); line-height: 1; }
.home-greeting p { color: var(--text3); font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 8px; }
.home-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: 800px; }
.home-btn { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 32px 24px; cursor: pointer; transition: all 0.2s; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 14px; box-shadow: 0 2px 12px rgba(0,40,104,0.06); position: relative; overflow: hidden; }
.home-btn::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--blue); transform: scaleX(0); transition: transform 0.2s; pointer-events: none; }
.home-btn:hover { border-color: var(--blue-light); box-shadow: 0 8px 32px rgba(0,40,104,0.14); transform: translateY(-2px); }
.home-btn:hover::before { transform: scaleX(1); }
.home-btn.admin::before { background: var(--gold); }
.home-btn-icon { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; background: var(--blue-pale); pointer-events: none; }
.home-btn.green .home-btn-icon { background: var(--green-light); }
.home-btn.red .home-btn-icon { background: var(--red-light); }
.home-btn.amber .home-btn-icon { background: var(--amber-light); }
.home-btn.gold .home-btn-icon { background: #fef9e7; }
.home-btn-label { font-family: var(--head); font-size: 22px; letter-spacing: 0.05em; color: var(--blue); line-height: 1; pointer-events: none; }
.home-btn-sub { font-size: 12px; color: var(--text3); line-height: 1.4; pointer-events: none; }

.overlay { position: fixed; inset: 0; background: rgba(0,24,80,0.55); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(4px); animation: fadeIn 0.15s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal { background: var(--bg2); border-radius: var(--r-lg); width: 100%; max-width: 640px; max-height: 88vh; display: flex; flex-direction: column; box-shadow: 0 32px 80px rgba(0,0,0,0.3); animation: slideUp 0.2s ease; overflow: hidden; }
.modal-wide { max-width: 860px; }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--blue); }
.modal-title { font-family: var(--head); font-size: 24px; letter-spacing: 0.06em; color: white; }
.modal-close { background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.7); width: 32px; height: 32px; border-radius: 6px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.modal-close:hover { background: rgba(255,255,255,0.2); color: white; }
.modal-body { flex: 1; overflow-y: auto; padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0; background: var(--bg2); }

.form-group { margin-bottom: 18px; }
label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text2); margin-bottom: 6px; font-family: var(--mono); }
input, select, textarea { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--body); font-size: 14px; color: var(--text); background: var(--bg2); transition: border-color 0.15s, box-shadow 0.15s; outline: none; appearance: none; }
input:focus, select:focus, textarea:focus { border-color: var(--blue-light); box-shadow: 0 0 0 3px rgba(21,87,192,0.1); }

.btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: 8px; font-family: var(--body); font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap; }
.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover { background: var(--blue-mid); }
.btn-success { background: var(--green); color: white; }
.btn-success:hover { background: #144a2d; }
.btn-danger { background: var(--red); color: white; }
.btn-danger:hover { background: #a93226; }
.btn-ghost { background: var(--bg2); color: var(--text2); border: 1.5px solid var(--border); }
.btn-ghost:hover { background: var(--bg); color: var(--text); }
.btn-sm { padding: 7px 14px; font-size: 13px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; border-left: 4px solid; line-height: 1.5; }
.alert-danger { background: var(--red-light); border-color: var(--red); color: #7f1d1d; }
.alert-success { background: var(--green-light); border-color: var(--green); color: #14532d; }
.alert-warning { background: var(--amber-light); border-color: #d97706; color: var(--amber); }
.alert-info { background: var(--blue-pale); border-color: var(--blue-light); color: var(--blue); }

.badge { display: inline-block; padding: 3px 9px; border-radius: 4px; font-size: 11px; font-family: var(--mono); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
.badge-blue { background: var(--blue-pale); color: var(--blue); }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-red { background: var(--red-light); color: var(--red); }
.badge-gold { background: #fef9c3; color: #854d0e; }
.badge-grey { background: #f1f3f9; color: var(--text3); border: 1px solid var(--border); }

.table-wrap { overflow-x: auto; border-radius: var(--r); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th { background: var(--blue-pale); padding: 10px 14px; text-align: left; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:hover { background: var(--blue-pale); }
tbody tr:last-child { border-bottom: none; }
td { padding: 11px 14px; vertical-align: middle; }

.item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 8px; }
.item-card { background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--r); padding: 16px; cursor: pointer; transition: all 0.15s; text-align: center; }
.item-card:hover { border-color: var(--blue-light); background: var(--blue-pale); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,40,104,0.1); }
.item-card.selected { border-color: var(--blue); background: var(--blue-pale); box-shadow: 0 0 0 2px var(--blue); }
.item-card-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
.item-card-cat { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 4px; }

.size-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.size-btn { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 6px; background: var(--bg2); font-family: var(--mono); font-size: 13px; cursor: pointer; transition: all 0.12s; color: var(--text); }
.size-btn:hover { border-color: var(--blue-light); background: var(--blue-pale); }
.size-btn.selected { border-color: var(--blue); background: var(--blue); color: white; }
.size-btn.out-of-stock { opacity: 0.4; cursor: not-allowed; }
.size-btn.low-stock { border-color: #d97706; color: #92400e; }

.cadet-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: var(--r); cursor: pointer; transition: all 0.12s; border: 1.5px solid transparent; }
.cadet-item:hover { background: var(--blue-pale); border-color: var(--border); }
.cadet-item.selected { background: var(--blue-pale); border-color: var(--blue); }
.cadet-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
.cadet-name { font-size: 14px; font-weight: 600; color: var(--text); }
.cadet-meta { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-top: 1px; }

.search-wrap { position: relative; margin-bottom: 16px; }
.search-wrap input { padding-left: 38px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; }

.section-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); margin-bottom: 10px; margin-top: 20px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.section-label:first-child { margin-top: 0; }

.steps { display: flex; gap: 0; margin-bottom: 24px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.step { flex: 1; padding: 10px; text-align: center; font-size: 12px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); background: var(--bg2); border-right: 1px solid var(--border); transition: all 0.15s; }
.step:last-child { border-right: none; }
.step.active { background: var(--blue); color: white; }
.step.done { background: var(--green-light); color: var(--green); }

.condition-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
.condition-btn { padding: 20px; border: 2px solid var(--border); border-radius: var(--r); background: var(--bg2); cursor: pointer; transition: all 0.15s; text-align: center; }
.condition-btn:hover { border-color: var(--blue-light); }
.condition-btn.selected-good { border-color: var(--green); background: var(--green-light); }
.condition-btn.selected-bad { border-color: var(--red); background: var(--red-light); }
.condition-icon { font-size: 28px; margin-bottom: 8px; }
.condition-label { font-size: 14px; font-weight: 700; color: var(--text); }
.condition-sub { font-size: 12px; color: var(--text3); margin-top: 3px; }

.empty { text-align: center; padding: 40px; color: var(--text3); font-size: 14px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.loading-text { text-align: center; padding: 40px; color: var(--text3); font-family: var(--mono); font-size: 13px; letter-spacing: 0.05em; }
.chip-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; }
.chip { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--bg2); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.12s; color: var(--text2); }
.chip:hover { border-color: var(--blue-light); color: var(--blue); }
.chip.active { background: var(--blue); border-color: var(--blue); color: white; }

@media (max-width: 680px) {
  .login-left { display: none; }
  .login-right { width: 100%; }
  .home-grid { grid-template-columns: 1fr 1fr; }
  .modal { max-width: 100%; }
  .grid-2 { grid-template-columns: 1fr; }
}

<body>
<div id="app"></div>
<script>
const API = 'http://localhost:8000';
let S = {
  // No login — staff selected from dropdown
  user: JSON.parse(sessionStorage.getItem('user')||'null'),
  error: null,
  items: null, cadets: null, stock: null, users: null,
  // Admin auth
  adminVerified: false,
};

// Get a token for the current user on demand
let _tokenCache = null;
let _tokenExpiry = 0;

async function getToken() {
  // Use admin account token for all API calls - backend auth still works
  // We just skip the login screen and select staff from dropdown
  if (_tokenCache && Date.now() < _tokenExpiry) return _tokenCache;
  const form = new URLSearchParams({username: 'admin', password: 'Password1!'});
  const res = await fetch(API + '/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: form.toString()
  });
  if (!res.ok) return null;
  const data = await res.json();
  _tokenCache = data.access_token;
  _tokenExpiry = Date.now() + 55 * 60 * 1000; // 55 min
  return _tokenCache;
}

async function api(method, path, body=null) {
  const h = {'Content-Type':'application/json'};
  const token = await getToken();
  if (token) h['Authorization'] = `Bearer ${token}`;
  if (S.user?.id) h['X-Staff-Id'] = String(S.user.id);
  const opts = {method, headers:h};
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(API+path, opts);
    if (!res.ok) { const e=await res.json().catch(()=>({detail:'Unknown error'})); throw new Error(e.detail||'Request failed'); }
    setConnected(true);
    return res.json();
  } catch(e) {
    if (e instanceof TypeError && e.message.includes('fetch')) {
      setConnected(false);
      throw new Error('Cannot reach the server. Check the backend is running.');
    }
    throw e;
  }
}

let _connected = true;
function setConnected(ok) {
  if (ok === _connected) return;
  _connected = ok;
  const banner = document.getElementById('conn-banner');
  if (!banner) return;
  if (ok) {
    banner.style.display = 'none';
  } else {
    banner.style.display = 'flex';
  }
}
const GET = p => api('GET',p);
const POST = (p,b) => api('POST',p,b);
const PATCH = (p,b) => api('PATCH',p,b);
const DELETE = p => api('DELETE',p);

async function loadItems() { if (!S.items) S.items = await GET('/items/'); return S.items; }
async function loadCadets() { if (!S.cadets) S.cadets = await GET('/cadets/?active_only=false'); return S.cadets; }
async function loadStock() { if (!S.stock) S.stock = await GET('/stock/'); return S.stock; }
async function loadUsers() { if (!S.users) S.users = await GET('/users/'); return S.users; }

async function loadStaffList() {
  const res = await fetch(API + '/users/public');
  if (!res.ok) throw new Error('Could not load staff list');
  return res.json();
}

function selectUser(user) {
  S.user = user;
  S.adminVerified = false;
  sessionStorage.setItem('user', JSON.stringify(user));
  render();
}

function doLogout() {
  S.user = null;
  S.adminVerified = false;
  S.items = null; S.cadets = null; S.stock = null; S.users = null;
  sessionStorage.removeItem('user');
  render();
}

async function verifyAdminPin(userId, pin) {
  const res = await fetch(API + '/users/verify-pin', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({user_id: userId, pin})
  });
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e.detail || 'Incorrect PIN');
  }
  return res.json();
}

function showModal(html, wide=false) {
  document.getElementById('modal-root').innerHTML = `<div class="overlay" id="overlay"><div class="modal${wide?' modal-wide':''}">${html}</div></div>`;
  document.getElementById('overlay').addEventListener('click', e => { if(e.target.id==='overlay') closeModal(); });
  document.querySelectorAll('.modal-close').forEach(b => b.onclick = closeModal);
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const a = btn.dataset.action;
      if (a === 'close') closeModal();
      else if (a === 'cadets') openCadets();
      else if (a === 'admin') openAdmin();
      else if (a === 'addstaff') openAddStaff();
      else if (a === 'addcadet') openAddCadet();
      else if (a === 'bulkstock') openBulkStock();
    });
  });
}
function closeModal() { const r=document.getElementById('modal-root'); if(r) r.innerHTML=''; }
function mHead(title) { return `<div class="modal-header"><span class="modal-title">${title}</span><button class="modal-close">✕</button></div>`; }
function showError(id, msg) { const el=document.getElementById(id); if(el) el.innerHTML=`<div class="alert alert-danger">${msg}</div>`; }
function fmt(dt) { if(!dt) return '—'; return new Date(dt).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }

// ── VIEW CADETS ──
async function openCadets() {
  showModal(`${mHead('VIEW CADETS')}<div class="modal-body"><div class="loading-text">Loading cadets...</div></div>`, true);
  await loadCadets();
  const sortFn = (a,b) => a.surname.localeCompare(b.surname) || a.forename.localeCompare(b.forename);
  const allCadets = (S.cadets||[]).filter(c => c.active).sort(sortFn);
  const inactiveCadets = (S.cadets||[]).filter(c => !c.active).sort(sortFn);
  const flights = [...new Set(allCadets.map(c=>c.flight).filter(Boolean))].sort();
  const flightCounts = {};
  allCadets.forEach(c => { if (c.flight) flightCounts[c.flight] = (flightCounts[c.flight]||0)+1; });
  let selectedFlight = null;
  let showInactive = false;

  function getFiltered() {
    const s = document.getElementById('cadet-search')?.value?.toLowerCase()||'';
    let list = showInactive ? [...allCadets, ...inactiveCadets] : allCadets;
    if (selectedFlight) list = list.filter(c => c.flight === selectedFlight);
    if (s) list = list.filter(c => (c.surname+c.forename+(c.flight||'')+(c.service_number||'')).toLowerCase().includes(s));
    return list;
  }

  function refreshList() {
    document.getElementById('cadet-list').innerHTML = cadetListHTML(getFiltered());
    bindCadetItems();
    document.querySelectorAll('.flight-chip').forEach(chip => {
      const active = chip.dataset.flight === selectedFlight;
      chip.style.background = active ? 'var(--blue)' : '';
      chip.style.color = active ? 'white' : '';
      chip.style.borderColor = active ? 'var(--blue)' : '';
    });
    const btn = document.getElementById('toggle-inactive');
    if (btn) btn.textContent = showInactive ? `Hide Discharged (${inactiveCadets.length})` : `Show Discharged (${inactiveCadets.length})`;
  }

  showModal(`${mHead('VIEW CADETS')}<div class="modal-body">
    <div class="search-wrap"><span class="search-icon">🔍</span><input id="cadet-search" placeholder="Search by name, flight or service number..." type="text"></div>
    ${flights.length>1?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 12px">
      ${flights.map(f=>`<button class="btn btn-ghost flight-chip" data-flight="${f}" style="padding:4px 12px;font-size:12px">${f}<span style="font-size:10px;opacity:0.65;margin-left:4px">${flightCounts[f]}</span></button>`).join('')}
    </div>`:''}
    <div id="cadet-list">${cadetListHTML(allCadets)}</div>
  </div>
  ${inactiveCadets.length>0?`<div class="modal-footer" style="justify-content:center;padding:8px 16px;border-top:1px solid var(--border)">
    <button class="btn btn-ghost btn-sm" id="toggle-inactive" style="font-size:12px;color:var(--text3)">Show Discharged (${inactiveCadets.length})</button>
  </div>`:''}`, true);

  document.getElementById('cadet-search').oninput = () => refreshList();
  document.querySelectorAll('.flight-chip').forEach(chip => {
    chip.onclick = () => {
      selectedFlight = selectedFlight === chip.dataset.flight ? null : chip.dataset.flight;
      refreshList();
    };
  });
  document.getElementById('toggle-inactive')?.addEventListener('click', () => {
    showInactive = !showInactive;
    if (showInactive) selectedFlight = null; // flight filter doesn't apply to discharged
    refreshList();
  });
  bindCadetItems();
}

function cadetListHTML(cadets) {
  if (!cadets.length) return '<div class="empty">No cadets found</div>';
  return cadets.map(c=>`<div class="cadet-item" data-id="${c.id}">
    <div class="cadet-avatar">${c.forename[0]}${c.surname[0]}</div>
    <div style="flex:1"><div class="cadet-name">${c.rank} ${c.surname}, ${c.forename}</div><div class="cadet-meta">${c.service_number}${c.flight?` · ${c.flight}`:''} · ${c.gender}</div></div>
    ${c.active&&c.issued_count>0?`<span style="font-size:11px;font-family:var(--mono);color:var(--blue);background:var(--blue-pale);border-radius:10px;padding:2px 7px;font-weight:700;margin-right:6px">${c.issued_count} items</span>`:''}
    <span class="badge ${c.active?'badge-green':'badge-grey'}">${c.active?'Active':'Inactive'}</span>
    <span style="color:var(--text3);font-size:18px;margin-left:8px">›</span>
  </div>`).join('');
}
function bindCadetItems() { document.querySelectorAll('.cadet-item[data-id]').forEach(el => { el.onclick = () => openCadetRecord(parseInt(el.dataset.id)); }); }

// ── CADET RECORD ──
async function openCadetRecord(cadetId) {
  showModal(`${mHead('CADET RECORD')}<div class="modal-body"><div class="loading-text">Loading record...</div></div>`, true);
  const [data, missingKit] = await Promise.all([
    GET(`/cadets/${cadetId}/history`),
    GET(`/cadets/${cadetId}/missing-kit`).catch(() => []),
  ]);
  if (!data) return;
  const {cadet, summary, outstanding, history} = data;
  showModal(`${mHead('CADET RECORD')}<div class="modal-body">
    <div style="display:flex;align-items:center;gap:16px;padding:16px;background:var(--blue-pale);border-radius:var(--r);margin-bottom:20px">
      <div class="cadet-avatar" style="width:52px;height:52px;font-size:18px">${cadet.forename[0]}${cadet.surname[0]}</div>
      <div style="flex:1">
        <div style="font-family:var(--head);font-size:24px;letter-spacing:0.04em;color:var(--blue)">${cadet.rank} ${cadet.surname}, ${cadet.forename}</div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--text3)">${cadet.service_number} · ${cadet.gender}${cadet.flight?` · ${cadet.flight}`:''}${cadet.joined_at?` · Joined ${new Date(cadet.joined_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`:''}</div>
        ${cadet.notes ? `<div style="margin-top:6px;font-size:12px;color:var(--text2);background:rgba(0,0,0,0.04);border-radius:4px;padding:4px 8px;max-width:500px">📝 ${cadet.notes}</div>` : ''}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-success btn-sm" id="issue-from-record">Issue Kit</button>
        ${outstanding.length > 0 ? `<button class="btn btn-ghost btn-sm" id="return-from-record">Return Kit</button>` : ''}
        <button class="btn btn-ghost btn-sm" id="edit-cadet-btn">✏ Edit</button>
        <button class="btn btn-ghost btn-sm" id="print-cadet-record">🖨 Print</button>
        <button class="btn btn-ghost btn-sm" data-action="cadets">← Back</button>
        ${cadet.active
          ? `<button class="btn btn-danger btn-sm" id="discharge-cadet" data-id="${cadet.id}" data-name="${cadet.rank} ${cadet.surname}">Discharge</button>`
          : `<button class="btn btn-ghost btn-sm" id="reactivate-cadet" data-id="${cadet.id}">Reactivate Cadet</button>`}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
      ${[['Total Issued',summary.total_issued,'var(--blue)'],['Outstanding',summary.outstanding_count,'var(--amber)'],['Returned',summary.returned_count,'var(--green)']].map(([l,v,c])=>`
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center">
          <div style="font-family:var(--head);font-size:32px;color:${c}">${v}</div>
          <div style="font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:0.08em">${l}</div>
        </div>`).join('')}
    </div>
    <div class="section-label">Currently Issued (${outstanding.length})</div>
    ${outstanding.length===0?'<div class="empty" style="padding:20px">No items currently issued</div>':`
    <div class="table-wrap"><table>
      <thead><tr><th>Item</th><th>Size</th><th>Issued By</th><th>Date Issued</th><th>Note</th><th></th></tr></thead>
      <tbody>${outstanding.map(i=>`<tr>
        <td><strong>${i.short_name}</strong></td>
        <td style="font-family:var(--mono)">${i.size_label}</td>
        <td>${i.issued_by}</td>
        <td style="font-family:var(--mono);font-size:12px">${fmt(i.issued_at)}</td>
        <td style="font-size:12px;color:var(--text3)">${i.duplicate_reason?`⚠ ${i.duplicate_reason}`:(i.notes||'—')}</td>
        <td><button class="btn btn-ghost btn-sm" data-return-id="${i.issued_id}" data-return-name="${i.short_name}">Return</button></td>
      </tr>`).join('')}</tbody>
    </table></div>`}
    ${missingKit.length > 0 ? `<div class="section-label" style="margin-top:24px">Missing from Kit List <span style="background:var(--amber-light);color:var(--amber);font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 8px;border-radius:10px;margin-left:6px">${missingKit.length} item${missingKit.length>1?'s':''}</span></div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px">${missingKit.map(m=>`<div style="display:flex;align-items:center;justify-content:space-between;background:var(--amber-light);border:1px solid #d97706;border-radius:var(--r);padding:9px 14px"><span style="font-weight:600;color:var(--amber)">${m.label}</span><button class="btn btn-primary btn-sm missing-kit-issue" data-item-id="${m.item_id||''}">Issue →</button></div>`).join('')}</div>` : ''}
    <div class="section-label" style="margin-top:24px">Full History</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Item</th><th>Size</th><th>Issued</th><th>By</th><th>Status</th><th>Return Info</th></tr></thead>
      <tbody>${history.length===0?'<tr><td colspan="6"><div class="empty">No history</div></td></tr>':history.map(i=>`<tr>
        <td><strong>${i.short_name}</strong></td>
        <td style="font-family:var(--mono)">${i.size_label}</td>

        <td>${i.issued_by}</td>

      </tr>`).join('')}</tbody>
    </table></div>
    <div class="section-label" style="margin-top:24px">Badge History <span id="badge-hist-toggle" style="font-size:12px;font-weight:400;color:var(--blue);cursor:pointer;margin-left:8px">▼ Show</span></div>
    <div id="badge-hist-section" style="display:none"><div class="loading-text">Loading badges...</div></div>
  </div>`, true);

  document.querySelectorAll('[data-return-id]').forEach(btn => {
    btn.onclick = () => openReturnFlow(parseInt(btn.dataset.returnId), btn.dataset.returnName, cadetId, cadet);
  });
  document.getElementById('issue-from-record').onclick = () => openIssueFlow(cadetId);
  document.getElementById('return-from-record')?.addEventListener('click', () => openReturnFlow(null, null, cadetId, cadet));

  document.querySelectorAll('.missing-kit-issue').forEach(btn => {
    const itemId = btn.dataset.itemId ? parseInt(btn.dataset.itemId) : null;
    btn.addEventListener('click', () => openIssueFlow(cadetId, itemId));
  });

  document.getElementById('edit-cadet-btn').onclick = () => {
    const RANKS = ['Cdt','Cpl','Sgt','FS','CWO'];
    showModal(`${mHead('EDIT CADET')}<div class="modal-body">
      <div style="font-size:13px;color:var(--text2);margin-bottom:16px">Editing: <strong>${cadet.rank} ${cadet.surname}, ${cadet.forename}</strong> (${cadet.service_number})</div>

      <div class="grid-2">
        <div class="form-group"><label>Forename</label>
          <input id="ec-fore" value="${cadet.forename}" autofocus>
        </div>
        <div class="form-group"><label>Surname</label>
          <input id="ec-sur" value="${cadet.surname}">
        </div>
        <div class="form-group"><label>Rank</label>
          <select id="ec-rank">
            ${RANKS.map(r=>`<option value="${r}"${r===cadet.rank?' selected':''}>${r}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Gender</label>
          <select id="ec-gender">
            ${['male','female','other'].map(g=>`<option value="${g}"${g===cadet.gender?' selected':''}>${g.charAt(0).toUpperCase()+g.slice(1)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Flight (optional)</label>
          <input id="ec-flight" value="${cadet.flight||''}" placeholder="e.g. Alpha, Bravo...">
        </div>
      </div>
      <div class="form-group" style="margin-top:8px"><label>Notes (optional)</label>
        <textarea id="ec-notes" rows="3" style="width:100%;resize:vertical" placeholder="Any relevant notes about this cadet...">${cadet.notes||''}</textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="ec-cancel">Cancel</button>
      <button class="btn btn-primary" id="ec-save">Save Changes</button>
    </div>`);
    document.getElementById('ec-cancel').onclick = () => openCadetRecord(cadetId);
    document.getElementById('ec-save').onclick = async () => {
      const forename = document.getElementById('ec-fore').value.trim();
      const surname = document.getElementById('ec-sur').value.trim();
      const rank = document.getElementById('ec-rank').value;
      const gender = document.getElementById('ec-gender').value;
      const flight = document.getElementById('ec-flight').value.trim() || null;
      const notes = document.getElementById('ec-notes').value.trim() || null;
      if (!forename || !surname) { showError('edit-cadet-error', 'Forename and surname are required'); return; }
      const saveBtn = document.getElementById('ec-save');
      saveBtn.disabled = true; saveBtn.textContent = 'Saving...';
      try {
        await PATCH(`/cadets/${cadetId}`, { forename, surname, rank, gender, flight, notes });
        S.cadets = null;
        openCadetRecord(cadetId);
      } catch(e) {
        saveBtn.disabled = false; saveBtn.textContent = 'Save Changes';
        showError('edit-cadet-error', e.message);
      }
    };
  };

  document.getElementById('print-cadet-record').onclick = () => {
    const dateStr = new Date().toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'});
    const outRows = outstanding.length === 0
      ? '<tr><td colspan="4" style="padding:12px;text-align:center;color:#166534">No items currently outstanding</td></tr>'
      : outstanding.map(i => `<tr style="border-bottom:1px solid #dde3f0">
          <td style="padding:7px 10px;font-weight:700">${i.short_name}</td>
          <td style="padding:7px 10px;font-family:monospace;font-size:11px">${i.size_label}</td>
          <td style="padding:7px 10px;font-size:11px">${i.issued_by}</td>

    const histRows = history.map(i => `<tr style="border-bottom:1px solid #dde3f0">
      <td style="padding:6px 10px;font-weight:600;font-size:11px">${i.short_name}</td>

      <td style="padding:6px 10px;font-family:monospace;font-size:10px">${fmt(i.issued_at)}</td>

    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Cadet Record — ${cadet.surname}</title>

      <style>*{box-sizing:border-box}body{margin:0;font-family:'Figtree',sans-serif;color:#0d1b3e}

      @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}.no-print{display:none!important}}</style>
    </head><body style="padding:20px 24px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:14px">
          <div style="width:44px;height:44px;border-radius:50%;background:conic-gradient(#4a90d9 0deg 120deg,#ffffff 120deg 240deg,#c8202d 240deg 360deg);flex-shrink:0"></div>
          <div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.05em;color:#002868">${cadet.rank} ${cadet.surname}, ${cadet.forename}</div>
            <div style="font-family:'DM Mono',monospace;font-size:10px;color:#9099b5;letter-spacing:0.08em">SVC NO. ${cadet.service_number} · ${cadet.gender?.toUpperCase()||''}${cadet.flight?' · FLIGHT '+cadet.flight:''}${cadet.joined_at?' · JOINED '+new Date(cadet.joined_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}).toUpperCase():''}</div>
          </div>
        </div>
        <div style="text-align:right;font-size:10px;color:#9099b5;font-family:'DM Mono',monospace;line-height:1.7">
          Printed: ${dateStr}<br>
          <span style="background:${cadet.active?'#dcfce7':'#fee2e2'};color:${cadet.active?'#166534':'#c0392b'};padding:1px 7px;border-radius:4px;font-weight:700;font-size:9px">${cadet.active?'ACTIVE':'INACTIVE'}</span>
        </div>
      </div>
      <div style="border-top:3px solid #002868;padding-top:12px;margin-bottom:16px">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
          ${[['Total Issued',summary.total_issued,'#002868'],['Outstanding',summary.outstanding_count,'#92400e'],['Returned',summary.returned_count,'#166534']].map(([l,v,c])=>`
          <div style="background:#e8eef8;border-radius:8px;padding:12px;text-align:center">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:${c};line-height:1">${v}</div>
            <div style="font-size:9px;font-family:'DM Mono',monospace;color:#9099b5;text-transform:uppercase;letter-spacing:0.08em;margin-top:4px">${l}</div>
          </div>`).join('')}
        </div>
      </div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.05em;color:#002868;margin-bottom:8px">CURRENTLY OUTSTANDING (${outstanding.length})</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:18px">
        <thead><tr style="background:#e8eef8;border-bottom:2px solid #dde3f0">
          ${['Item','Size','Issued By','Date Issued'].map(h=>`<th style="padding:6px 10px;text-align:left;font-size:9px;font-family:'DM Mono',monospace;color:#9099b5;text-transform:uppercase;letter-spacing:0.06em">${h}</th>`).join('')}
        </tr></thead>
        <tbody>${outRows}</tbody>
      </table>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.05em;color:#002868;margin-bottom:8px">FULL HISTORY (${history.length})</div>
      <table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:16px">
        <thead><tr style="background:#e8eef8;border-bottom:2px solid #dde3f0">
          ${['Item','Size','Issued','By','Status'].map(h=>`<th style="padding:5px 10px;text-align:left;font-size:9px;font-family:'DM Mono',monospace;color:#9099b5;text-transform:uppercase;letter-spacing:0.06em">${h}</th>`).join('')}
        </tr></thead>
        <tbody>${histRows||'<tr><td colspan="5" style="padding:10px;text-align:center;color:#9099b5">No history</td></tr>'}</tbody>
      </table>
      ${missingKit.length > 0 ? `<div style="font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.05em;color:#c0392b;margin-bottom:6px">MISSING FROM KIT LIST (${missingKit.length})</div>
      <div style="background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:8px 12px;margin-bottom:14px;font-size:11px">
        ${missingKit.map(m=>`<span style="background:#fef3c7;color:#92400e;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;margin-right:4px;display:inline-block;margin-bottom:2px">${m.label}</span>`).join('')}
      </div>` : `<div style="background:#dcfce7;border:1px solid #b2dfcc;border-radius:6px;padding:6px 12px;margin-bottom:14px;font-size:11px;color:#166534;font-weight:600">✓ All required kit items issued</div>`}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:8px">
        <div><div style="font-size:10px;font-family:'DM Mono',monospace;color:#9099b5;text-transform:uppercase;margin-bottom:24px">Stores Staff Signature</div>
          <div style="border-top:1px solid #0d1b3e;padding-top:4px;font-size:10px;color:#9099b5">Name / Date</div></div>
        <div><div style="font-size:10px;font-family:'DM Mono',monospace;color:#9099b5;text-transform:uppercase;margin-bottom:24px">Cadet Signature</div>
          <div style="border-top:1px solid #0d1b3e;padding-top:4px;font-size:10px;color:#9099b5">I confirm this record is accurate</div></div>
      </div>
      <button class="no-print" onclick="window.print()" style="margin-top:16px;padding:10px 20px;background:#002868;color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Figtree',sans-serif">🖨 Print</button>
      <div style="margin-top:10px;font-size:9px;color:#9099b5;border-top:1px solid #dde3f0;padding-top:8px">OFFICIAL · 1701 (Johnstone) Squadron · AP 1919 stores policy · DPA 2018 applies</div>
    </body></html>`;
    const w = window.open('', '_blank', 'width=820,height:950');
    w.document.write(html); w.document.close(); w.focus(); setTimeout(() => w.print(), 600);
  };

  document.getElementById('reactivate-cadet')?.addEventListener('click', async () => {
    if (!confirm('Reactivate this cadet?')) return;
    try {
      await PATCH(`/cadets/${cadetId}/reactivate`);
      S.cadets = null;
      openCadetRecord(cadetId);
    } catch(e) { alert('Error: ' + e.message); }
  });

  // Badge history toggle
  document.getElementById('badge-hist-toggle')?.addEventListener('click', async () => {
    const sec = document.getElementById('badge-hist-section');
    const tog = document.getElementById('badge-hist-toggle');
    if (sec.style.display === 'none') {
      sec.style.display = 'block';
      tog.textContent = '▲ Hide';
      const badges = await GET('/badges/issued/cadet/' + cadetId);
      if (!badges.length) {
        sec.innerHTML = '<div class="empty" style="padding:16px">No badges issued to this cadet.</div>';
      } else {
        sec.innerHTML = '<div class="table-wrap"><table><thead><tr><th>Badge</th><th>Category</th><th>Issued</th><th>By</th><th>Status</th></tr></thead><tbody>' +
          badges.map(b => '<tr><td><strong>' + b.name + '</strong></td><td style="font-size:12px">' + b.category + '</td><td style="font-family:var(--mono);font-size:11px">' + fmt(b.issued_at) + '</td><td style="font-size:12px">' + b.issued_by + '</td><td><span class="badge ' + (b.returned?'badge-grey':'badge-green') + '">' + (b.returned?'Returned':'Active') + '</span></td></tr>').join('') +
          '</tbody></table></div>';
      }
    } else {
      sec.style.display = 'none';
      tog.textContent = '▼ Show';
    }
  });

  document.getElementById('discharge-cadet')?.addEventListener('click', async () => {
    if (outstanding.length > 0) {
      alert(`Cannot discharge ${cadet.rank} ${cadet.surname} — they have ${outstanding.length} item(s) still outstanding.\n\nAll kit must be returned before discharge.`);
      return;
    }
    if (!confirm(`Discharge ${cadet.rank} ${cadet.surname} from the Corps?\n\nThis will permanently deactivate their record. Their full kit history will be preserved.\n\nProceed?`)) return;
    try {
      await PATCH(`/cadets/${cadetId}/deactivate`);
      S.cadets = null;
      showModal(`${mHead('CADET DISCHARGED')}<div class="modal-body">
        <div class="alert alert-success">✓ ${cadet.rank} ${cadet.surname} has been discharged from the Corps.</div>
        <div style="background:var(--bg);border-radius:var(--r);padding:16px;font-size:13px;color:var(--text2)">
          <strong>Cadet:</strong> ${cadet.rank} ${cadet.surname}, ${cadet.forename}<br>
          <strong>Service No:</strong> ${cadet.service_number}<br>
          <strong>Discharged by:</strong> ${S.user.forename} ${S.user.surname}<br>
          <strong>Total items issued:</strong> ${summary.total_issued}<br>
          <strong>All kit returned:</strong> ✓
        </div>
      </div><div class="modal-footer"><button class="btn btn-primary" data-action="cadets">Done</button></div>`);
    } catch(e) { alert('Error: ' + e.message); }
  });
}

// ── ISSUE FLOW ──
async function openIssueFlow(preselectedCadetId=null, preselectedItemId=null, preselectedSizeId=null) {
  const [items, cadets] = await Promise.all([loadItems(), loadCadets()]);
  await loadStock();
  const cadetPreselected = !!preselectedCadetId;
  let selectedCadet = preselectedCadetId ? cadets.find(c=>c.id===preselectedCadetId) : null;
  let selectedItem = preselectedItemId ? items.find(i=>i.id===preselectedItemId) : null;
  let selectedSize = (preselectedSizeId && selectedItem) ? (selectedItem.sizes?.find(s=>s.id===preselectedSizeId)||null) : null;
  // Start at the earliest unresolved step
  let step = (selectedItem && selectedSize) ? 3 : selectedItem ? 2 : 1;
  // Load cadet history for hint (only needed when cadet is known upfront)
  let cadetHistory = [];
  if (cadetPreselected) {
    try { const h = await GET(`/cadets/${preselectedCadetId}/history`); cadetHistory = h.history || []; } catch {}
  }

  function renderStep() {
    const steps = cadetPreselected
      ? [{l:'1 · Select Item',s:1},{l:'2 · Select Size',s:2},{l:'3 · Confirm',s:3}]
      : [{l:'1 · Select Item',s:1},{l:'2 · Select Size',s:2},{l:'3 · Select Cadet',s:3},{l:'4 · Confirm',s:4}];
    const maxStep = cadetPreselected ? 3 : 4;
    const isLast = step === maxStep;

    showModal(`${mHead('ISSUE UNIFORM')}<div class="modal-body">
      ${cadetPreselected ? `<div style="margin-bottom:16px;padding:10px 14px;background:var(--blue-pale);border-radius:var(--r);font-size:13px;color:var(--blue)">Issuing to: <strong>${selectedCadet.rank} ${selectedCadet.surname}, ${selectedCadet.forename}</strong></div>` : ''}
      <div class="steps">${steps.map(s=>`<div class="step ${step===s.s?'active':step>s.s?'done':''}">${s.l}</div>`).join('')}</div>
      <div id="issue-error"></div>
      ${step===1?s1():step===2?s2():(cadetPreselected&&step===3)?sConfirm():step===3?s3():sConfirm()}
    </div>
    <div class="modal-footer">
      ${step>1?`<button class="btn btn-ghost" id="i-back">← Back</button>`:''}
      <button class="btn btn-ghost" data-action="close">Cancel</button>
      ${!isLast?`<button class="btn btn-primary" id="i-next">Next →</button>`:`<button class="btn btn-success" id="i-confirm">Confirm Issue</button>`}
    </div>`, true);

    document.getElementById('i-back')?.addEventListener('click', () => { step--; if(step===1) selectedCategory=null; renderStep(); });

    if (step===1) {
      // Category buttons
      document.querySelectorAll('.cat-btn').forEach(c => {
        c.onclick = () => { selectedCategory = c.dataset.cat; renderStep(); };
      });

      // Auto-advance: direct items (single-item categories) go straight to sizes
      document.querySelectorAll('.item-card:not(.cat-btn)').forEach(c => {
        c.onclick = () => {
          selectedItem = items.find(i => i.id === parseInt(c.dataset.id));
          selectedSize = null;
          step = 2; renderStep();
        };
      });

      // Back to categories
      document.getElementById('cat-back')?.addEventListener('click', () => { selectedCategory = null; selectedItem = null; renderStep(); });

      // Item cards in category view - auto advance to sizes
      document.querySelectorAll('.item-card:not(.cat-btn)').forEach(c => {
        c.onclick = () => {
          selectedItem = items.find(i => i.id === parseInt(c.dataset.id));
          selectedSize = null;
          step = 2; renderStep();
        };
      });
    }

    if (step===2) {
      document.querySelectorAll('.size-btn').forEach(b => {
        b.onclick = () => {
          if(b.classList.contains('out-of-stock')) return;
          selectedSize = selectedItem.sizes.find(s => s.id === parseInt(b.dataset.id));
          // Auto-advance to next step
          step = 3; renderStep();
        };
      });
    }

    if (step===3 && !cadetPreselected) {
      let s3FlightFilter = null;
      function applyS3Filter() {
        const sv = document.getElementById('cadet-search')?.value?.toLowerCase()||'';
        document.querySelectorAll('.cadet-item[data-id]').forEach(el => {
          const matchFlight = !s3FlightFilter || el.dataset.flight === s3FlightFilter;
          const matchSearch = !sv || el.textContent.toLowerCase().includes(sv);
          el.style.display = (matchFlight && matchSearch) ? '' : 'none';
        });
        document.querySelectorAll('.s3-flight-chip').forEach(chip => {
          const on = chip.dataset.flight === s3FlightFilter;
          chip.style.background = on ? 'var(--blue)' : '';
          chip.style.color = on ? 'white' : '';
          chip.style.borderColor = on ? 'var(--blue)' : '';
        });
      }
      document.getElementById('cadet-search')?.addEventListener('input', applyS3Filter);
      document.querySelectorAll('.s3-flight-chip').forEach(chip => {
        chip.addEventListener('click', () => { s3FlightFilter = s3FlightFilter===chip.dataset.flight ? null : chip.dataset.flight; applyS3Filter(); });
      });
      document.querySelectorAll('.cadet-item[data-id]').forEach(el => {
        el.onclick = () => {
          selectedCadet = cadets.find(c => c.id === parseInt(el.dataset.id));
          // Check gender appropriateness of selected item
          if (selectedItem && selectedCadet) {
            const name = selectedItem.short_name.toLowerCase();
            const gender = selectedCadet.gender;
            let mismatch = false;
            if ((name.includes('(f)') || name.includes('female') || name.includes('skirt')) && gender === 'male') mismatch = true;
            if ((name.includes('(m)') || name.includes('extra long')) && gender === 'female') mismatch = true;
            if (mismatch) {
              if (!confirm("⚠ " + selectedItem.short_name + " may not be suitable for this cadet gender. Issue anyway?")) {
                selectedItem = null; selectedSize = null; step = 1; renderStep(); return;
              }
            }
          }
          // Auto-advance to confirm
          step = 4; renderStep();
        };
      });
    }

    // Confirm step
    const onConfirmStep = (cadetPreselected && step===3) || (!cadetPreselected && step===4);
    if (onConfirmStep) {
      document.getElementById('i-confirm').onclick = async () => {
        const dupReason=document.getElementById('dup-reason')?.value?.trim()||null;
        const existing=await GET(`/cadets/${selectedCadet.id}/issued`);
        const hasDup=existing.some(i=>i.item_id===selectedItem.id);
        if(hasDup&&selectedItem.allows_multiples&&!dupReason) {
          if(!document.getElementById('dup-reason')) {
            const div=document.createElement('div'); div.className='form-group';
            div.innerHTML=`<div class="alert alert-warning" style="margin-bottom:12px">This cadet already has this item. A reason is required to issue another.</div><label>Reason for Duplicate Issue</label><input id="dup-reason" placeholder="e.g. Size change, lost previous item">`;
            document.getElementById('issue-error').after(div);
          } return;
        }
        if(hasDup&&!selectedItem.allows_multiples){showError('issue-error','This item cannot be issued multiple times to the same cadet.');return;}
        const notes=document.getElementById('issue-notes')?.value?.trim()||null;
        const btn=document.getElementById('i-confirm'); btn.disabled=true; btn.textContent='Issuing...';
        try {
          await POST('/transactions/issue',{cadet_id:selectedCadet.id,item_id:selectedItem.id,size_id:selectedSize.id,quantity:1,duplicate_reason:dupReason,notes});
          S.stock=null;
          let remainingKit=[];
          try { remainingKit=await GET(`/cadets/${selectedCadet.id}/missing-kit`); } catch {}
          const remainingSection = remainingKit.length > 0
            ? `<div style="margin-top:14px"><div class="section-label" style="margin-bottom:8px">Still Missing from Kit List <span style="background:var(--amber-light);color:var(--amber);font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 7px;border-radius:8px;margin-left:4px">${remainingKit.length}</span></div>
               <div style="display:flex;flex-direction:column;gap:4px">${remainingKit.slice(0,4).map(m=>`<div style="display:flex;align-items:center;justify-content:space-between;background:var(--amber-light);border:1px solid #d97706;border-radius:6px;padding:7px 12px"><span style="font-size:13px;font-weight:600;color:var(--amber)">${m.label}</span><button class="btn btn-primary btn-sm post-issue-btn" data-item-id="${m.item_id||''}" style="font-size:11px">Issue →</button></div>`).join('')}${remainingKit.length>4?`<div style="font-size:12px;color:var(--text3);padding:4px 8px">+${remainingKit.length-4} more items still missing</div>`:''}</div></div>`
            : `<div class="alert alert-success" style="margin-top:12px;background:var(--green-light);border-color:var(--green)">&#10003; Kit list complete — all required items now issued.</div>`;
          showModal(`${mHead('ISSUE UNIFORM')}<div class="modal-body">
            <div class="alert alert-success">&#10003; <strong>${selectedItem.short_name}</strong> (${selectedSize.size_label}) issued to ${selectedCadet.rank} ${selectedCadet.surname}, ${selectedCadet.forename}</div>
            <div style="background:var(--blue-pale);border-radius:var(--r);padding:16px;font-size:13px;color:var(--text2)">
              <strong>Issued by:</strong> ${S.user.forename} ${S.user.surname}<br><strong>Time:</strong> ${fmt(new Date().toISOString())}
            </div>
            ${remainingSection}
          </div>
          <div class="modal-footer"><button class="btn btn-ghost" data-action="close">Done</button><button class="btn btn-ghost" id="issue-print">🖨 Print Receipt</button><button class="btn btn-primary" id="issue-another">Issue Another Item</button></div>`);
          document.querySelectorAll('.post-issue-btn').forEach(btn2 => {
            const itemId=btn2.dataset.itemId?parseInt(btn2.dataset.itemId):null;
            btn2.addEventListener('click', () => openIssueFlow(selectedCadet.id, itemId));
          });
          document.getElementById('issue-another').onclick = () => openIssueFlow(preselectedCadetId);
          document.getElementById('issue-print').onclick = () => printIssueReceipt(selectedCadet, selectedItem.short_name, selectedSize.size_label, S.user);
        } catch(e) { btn.disabled=false; btn.textContent='Confirm Issue'; showError('issue-error',e.message); }
      };
    }
  }

  let selectedCategory = null;

  function s1() {
    // Gender filtering
    const gender = selectedCadet ? selectedCadet.gender : null;
    function isGenderAppropriate(item) {
      const name = item.short_name.toLowerCase();
      // Female-only items
      if (name.includes('(f)') || name.includes('female') || name.includes('skirt')) {
        return gender === 'female' || gender === 'other' || !gender;
      }
      // Male-only items
      if (name.includes('(m)') || name.includes('extra long')) {
        return gender === 'male' || gender === 'other' || !gender;
      }
      return true; // Neutral items shown to all
    }

    const filteredItems = gender ? items.filter(isGenderAppropriate) : items;

    const catMap = {};
    filteredItems.forEach(i => {
      const cat = i.category || 'Other';
      if (!catMap[cat]) catMap[cat] = [];
      catMap[cat].push(i);
    });

    // Categories with only 1 item - show item directly, no sub-menu
    // Categories with multiple items - show category button first
    const directItems = [];
    const categoryGroups = [];

    Object.entries(catMap).forEach(([cat, catItems]) => {
      if (catItems.length === 1) {
        directItems.push({ cat, item: catItems[0] });
      } else {
        categoryGroups.push({ cat, items: catItems });
      }
    });

    if (!selectedCategory) {
      return `<div class="section-label">Select Item</div>
      <div class="item-grid">
        ${categoryGroups.map(({cat, items: ci}) => `
          <div class="item-card cat-btn" data-cat="${cat}" style="padding:16px">
            <div class="item-card-name">${cat}</div>
            <div class="item-card-cat">${ci.length} options</div>
          </div>
        `).join('')}
        ${directItems.map(({cat, item: i}) => `
          <div class="item-card${selectedItem?.id===i.id?' selected':''}" data-id="${i.id}" style="padding:16px">
            <div class="item-card-name">${i.short_name}</div>
            <div class="item-card-cat">${cat}</div>
          </div>
        `).join('')}
      </div>`;
    } else {
      const catItems = catMap[selectedCategory] || [];
      return `
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <button class="btn btn-ghost btn-sm" id="cat-back">← Back</button>
          <span style="font-size:14px;font-weight:600;color:var(--blue)">${selectedCategory}</span>
        </div>
        <div class="item-grid">
          ${catItems.map(i => `
            <div class="item-card${selectedItem?.id===i.id?' selected':''}" data-id="${i.id}" style="padding:16px">
                <div class="item-card-name">${i.short_name}</div>
            </div>
          `).join('')}
        </div>`;
    }
  }

    function s2() {
    const stockMap={}; (S.stock||[]).forEach(s=>{if(s.item_id===selectedItem.id)stockMap[s.size_id]=s.quantity;});
    // Find the most recently returned size for this item (gives re-issue hint)
    const lastSize = cadetHistory.filter(h=>h.item_id===selectedItem.id&&h.returned).sort((a,b)=>new Date(b.issued_at)-new Date(a.issued_at))[0]?.size_label || null;
    return `<div style="margin-bottom:16px;font-size:13px;color:var(--text2)">Selecting size for: <strong>${selectedItem.short_name}</strong>${lastSize?` &nbsp;<span style="font-size:11px;color:var(--text3)">(previously issued: <strong>${lastSize}</strong>)</span>`:''}</div>

<span style="display:block;font-size:10px;opacity:0.6">${qty} in stock</span></button>`;}).join('')}</div>`;

// ── RETURN FLOW ──
async function openReturnFlow(issuedId=null, itemName=null, cadetId=null, cadetObj=null) {
  const cadets = await loadCadets();
  let selectedCadet = cadetId ? (cadetObj || cadets.find(c=>c.id===cadetId)) : null;
  let issuedItems = null;

  async function loadIssued(cid) { issuedItems = await GET(`/cadets/${cid}/issued`); }
  if (cadetId) await loadIssued(cadetId);

  // Multi-return state — pre-populate if a specific item was requested
  let selectedIssues = [];
  if (issuedId && issuedItems) {
    const preItem = issuedItems.find(i => i.issued_id === issuedId);
    if (preItem) selectedIssues = [{ issued_id: preItem.issued_id, short_name: preItem.short_name, size_label: preItem.size_label, condition: null, reason: null, notes: null }];
  }

  let step = issuedId ? 2 : 1;  // If item pre-selected, go to condition step (step 2)

  async function renderStep() {
    showModal(`${mHead('RETURN UNIFORM')}<div class="modal-body">
      <div class="steps">
        <div class="step ${step===1?'active':step>1?'done':''}">1 · Select Cadet</div>
        <div class="step ${step===2?'active':step>2?'done':''}">2 · Select Item</div>
        <div class="step ${step===3?'active':''}">3 · Condition</div>
      </div>
      <div id="return-error"></div>
      ${step===1?r1():step===2?r2():r3()}
    </div>
    <div class="modal-footer">
      ${step>1&&!issuedId?`<button class="btn btn-ghost" id="r-back">← Back</button>`:''}
      <button class="btn btn-ghost" data-action="close">Cancel</button>
      ${step<3?`<button class="btn btn-primary" id="r-next">Next →</button>`:`<button class="btn btn-danger" id="r-confirm">Confirm Return</button>`}
    </div>`, true);

    document.getElementById('r-back')?.addEventListener('click', async () => { step--; await renderStep(); });

    if (step===1) {
      let r1FlightFilter = null;
      function applyR1Filter() {
        const sv = document.getElementById('cadet-search')?.value?.toLowerCase()||'';
        document.querySelectorAll('.cadet-item[data-id]').forEach(el => {
          const matchFlight = !r1FlightFilter || el.dataset.flight === r1FlightFilter;
          const matchSearch = !sv || el.textContent.toLowerCase().includes(sv);
          el.style.display = (matchFlight && matchSearch) ? '' : 'none';
        });
        document.querySelectorAll('.r1-flight-chip').forEach(chip => {
          const on = chip.dataset.flight === r1FlightFilter;
          chip.style.background = on ? 'var(--blue)' : '';
          chip.style.color = on ? 'white' : '';
          chip.style.borderColor = on ? 'var(--blue)' : '';
        });
      }
      document.getElementById('cadet-search')?.addEventListener('input', applyR1Filter);
      document.querySelectorAll('.r1-flight-chip').forEach(chip => {
        chip.addEventListener('click', () => { r1FlightFilter = r1FlightFilter===chip.dataset.flight ? null : chip.dataset.flight; applyR1Filter(); });
      });
      document.querySelectorAll('.cadet-item[data-id]').forEach(el => {
        el.onclick = async () => { selectedCadet=cadets.find(c=>c.id===parseInt(el.dataset.id)); document.querySelectorAll('.cadet-item').forEach(x=>x.classList.remove('selected')); el.classList.add('selected'); };
      });
      document.getElementById('r-next').onclick = async () => {
        if(!selectedCadet){showError('return-error','Please select a cadet');return;}
        await loadIssued(selectedCadet.id);
        if(issuedItems.length===0){showError('return-error','This cadet has no items currently issued');return;}
        step=2; await renderStep();
      };
    }
    if (step===2) {
      document.querySelectorAll('.issued-item-btn').forEach(btn => {
        btn.onclick = () => {
          const id = parseInt(btn.dataset.id);
          const item = issuedItems.find(i => i.issued_id === id);
          if (!item) return;
          if (item.short_name && item.short_name.toLowerCase().includes('sock')) {
            showError('return-error', '⚠ Socks cannot be returned for hygiene reasons.');
            return;
          }
          const existing = selectedIssues.findIndex(s => s.issued_id === id);
          if (existing >= 0) {
            selectedIssues.splice(existing, 1);
          } else {
            selectedIssues.push({ issued_id: id, short_name: item.short_name, size_label: item.size_label, condition: null, reason: null, notes: null });
          }
          renderStep();
        };
      });
      document.querySelectorAll('.multi-condition').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const id = parseInt(btn.dataset.id);
          const s = selectedIssues.find(s => s.issued_id === id);
          if (s) { s.condition = btn.dataset.val; renderStep(); }
        };
      });
      document.querySelectorAll('.multi-reason').forEach(sel => {
        sel.onchange = (e) => {
          e.stopPropagation();
          const id = parseInt(sel.dataset.id);
          const s = selectedIssues.find(s => s.issued_id === id);
          if (s) s.reason = sel.value;
        };
      });
      document.querySelectorAll('.multi-remove').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const id = parseInt(btn.dataset.id);
          selectedIssues = selectedIssues.filter(s => s.issued_id !== id);
          renderStep();
        };
      });
      document.getElementById('r-next').onclick = () => {
        if (selectedIssues.length === 0) { showError('return-error', 'Please select at least one item to return'); return; }
        const missing = selectedIssues.find(s => !s.condition || !s.reason);
        if (missing) { showError('return-error', 'Please set condition and reason for all selected items'); return; }
        step = 3; renderStep();
      };
      document.getElementById('r-all-svc')?.addEventListener('click', () => {
        selectedIssues = issuedItems
          .filter(i => !i.short_name?.toLowerCase().includes('sock'))
          .map(i => ({ issued_id: i.issued_id, short_name: i.short_name, size_label: i.size_label, condition: 'serviceable', reason: 'End of Loan', notes: null }));
        renderStep();
      });
    }
    if (step===3) {
      document.getElementById('r-confirm').onclick = async () => {
        const btn=document.getElementById('r-confirm'); btn.disabled=true; btn.textContent='Processing...';
        try {
          // Process all returns
          let warnings = [];
          for (const s of selectedIssues) {
            const fullNotes = s.reason || null;
            const result = await POST('/transactions/return', {issued_item_id: s.issued_id, condition: s.condition, notes: fullNotes});
            if (result.warning) warnings.push(s.short_name + ': ' + result.warning);
          }
          S.stock = null;
          const serviceable = selectedIssues.filter(s => s.condition === 'serviceable');
          const unserviceable = selectedIssues.filter(s => s.condition === 'unserviceable');
          const capturedCadet = selectedCadet;
          const capturedIssues = [...selectedIssues];
          showModal(mHead('RETURNS PROCESSED') + '<div class="modal-body">' +
            '<div class="alert alert-success">✓ ' + selectedIssues.length + ' item(s) returned successfully.</div>' +
            (serviceable.length > 0 ? '<div style="background:var(--green-light);border-radius:var(--r);padding:12px;font-size:13px;color:var(--green);margin-top:8px">✓ ' + serviceable.length + ' item(s) returned to stock.</div>' : '') +
            (unserviceable.length > 0 ? '<div class="alert alert-warning" style="margin-top:8px">⚠ ' + unserviceable.length + ' item(s) unserviceable — set aside for stores.</div>' : '') +
            '</div><div class="modal-footer"><button class="btn btn-ghost" data-action="close">Done</button><button class="btn btn-ghost" id="ret-print">🖨 Print Receipt</button><button class="btn btn-primary" id="ret-another">Process Another</button></div>');
          document.getElementById('ret-another').onclick = () => openReturnFlow();
          document.getElementById('ret-print').onclick = () => printReturnReceipt(capturedCadet, capturedIssues, S.user);
        } catch(e) { btn.disabled=false; btn.textContent='Confirm Return'; showError('return-error',e.message); }
      };
    }
  }

  function r1() {
    const activeCadets = cadets.filter(c=>c.active).sort((a,b)=>a.surname.localeCompare(b.surname)||a.forename.localeCompare(b.forename));
    const r1Flights = [...new Set(activeCadets.map(c=>c.flight).filter(Boolean))].sort();
    return `${r1Flights.length>1?`<div id="r1-flight-chips" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      ${r1Flights.map(f=>`<button class="btn btn-ghost r1-flight-chip" data-flight="${f}" style="padding:4px 12px;font-size:12px">${f}</button>`).join('')}
    </div>`:''}
    <div class="search-wrap"><span class="search-icon">🔍</span><input id="cadet-search" placeholder="Search cadets..." type="text"></div>
    <div style="max-height:360px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r);padding:8px">
      ${activeCadets.map(c=>`<div class="cadet-item" data-id="${c.id}" data-flight="${c.flight||''}"><div class="cadet-avatar">${c.forename[0]}${c.surname[0]}</div><div><div class="cadet-name">${c.rank} ${c.surname}, ${c.forename}</div><div class="cadet-meta">${c.service_number}${c.flight?` · ${c.flight}`:''}</div></div></div>`).join('')}
    </div>`;

  function r2() {

    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><div class="section-label" style="margin-bottom:0">Select Items to Return</div>' +
    '<button class="btn btn-ghost btn-sm" id="r-all-svc" style="font-size:11px;padding:5px 10px" title="Select all items, mark as serviceable, reason: End of Loan">⚡ All Serviceable</button></div>' +
    '<div style="font-size:12px;color:var(--text3);margin-bottom:8px">Tap each item to expand and set condition. Select multiple items to return them all at once.</div>' +
    '<div style="display:flex;flex-direction:column;gap:8px">' +
    issuedItems.map(i => {
      const sel = selectedIssues.find(s => s.issued_id === i.issued_id);
      const isSock = i.short_name && i.short_name.toLowerCase().includes('sock');
      return '<div style="border:1.5px solid ' + (sel ? 'var(--blue)' : 'var(--border)') + ';border-radius:var(--r);overflow:hidden">' +
        '<div class="issued-item-btn cadet-item" data-id="' + i.issued_id + '" style="border:none;' + (isSock?'opacity:0.5':'') + '">' +
          '<div style="flex:1"><div class="cadet-name">' + i.short_name + (isSock?' <span style="font-size:10px;color:var(--red)">(cannot return)</span>':'') + '</div><div class="cadet-meta">Size: ' + (i.size_label||'—') + ' · Issued: ' + fmt(i.issued_at) + '</div></div>' +

// ── SEARCH STOCK ──
async function openSearchUniform() {
  const [items] = await Promise.all([loadItems(), loadStock()]);
  let selectedItem = null;
  let srchCat = null;
  const categories = [...new Set(items.map(i=>i.category).filter(Boolean))].sort();

  function applyStockFilter() {
    const s = document.getElementById('stock-search')?.value?.toLowerCase()||'';
    document.querySelectorAll('.item-card[data-name]').forEach(card => {
      const matchSearch = !s || card.dataset.name.includes(s);
      const matchCat = !srchCat || card.dataset.cat === srchCat;
      card.style.display = (matchSearch && matchCat) ? '' : 'none';
    });
    document.querySelectorAll('.srch-cat-chip').forEach(chip => {
      const on = chip.dataset.cat === srchCat;
      chip.style.background = on ? 'var(--blue)' : '';
      chip.style.color = on ? 'white' : '';
      chip.style.borderColor = on ? 'var(--blue)' : '';
    });
  }

  function renderSearch() {
    const stockMap={}; (S.stock||[]).forEach(s=>{stockMap[`${s.item_id}-${s.size_id}`]=s.quantity;});

    showModal(`${mHead('SEARCH UNIFORM STOCK')}<div class="modal-body">
      <div class="search-wrap" style="margin-bottom:${!selectedItem&&categories.length>1?'8':'16'}px"><span class="search-icon">🔍</span><input id="stock-search" placeholder="Search items..." type="text" autofocus></div>
      ${!selectedItem&&categories.length>1?`<div id="srch-cat-chips" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        ${categories.map(c=>`<button class="btn btn-ghost srch-cat-chip" data-cat="${c}" style="padding:4px 12px;font-size:12px">${c}</button>`).join('')}
      </div>`:''}
      ${!selectedItem?`<div id="stock-item-grid" class="item-grid">${items.map(i=>{
        const totalStock = i.sizes ? i.sizes.reduce((sum,s)=>{return sum+(stockMap[i.id+'-'+s.id]||0);},0) : 0;
        const lowSizes = i.sizes ? i.sizes.filter(s=>{const q=stockMap[i.id+'-'+s.id]??0;return q>0&&q<=3;}).length : 0;
        return `<div class="item-card" data-id="${i.id}" data-name="${i.short_name.toLowerCase()}" data-cat="${i.category||''}" style="${totalStock===0?'opacity:0.5':''}${lowSizes>0&&totalStock<=lowSizes*3?';border-color:#d97706':''}" title="${lowSizes>0?lowSizes+' size(s) running low':''}">
          <div class="item-card-name">${i.short_name}</div>
          <div class="item-card-cat" style="color:${totalStock===0?'var(--red)':lowSizes>0?'#d97706':'var(--green)'}">${totalStock===0?'Out of stock':lowSizes>0?totalStock+' ('+lowSizes+' low)':totalStock+' in stock'}</div>
        </div>`;
      }).join('')}</div>`
      :renderSizes()}
    </div>
    <div class="modal-footer">
      ${selectedItem?`<button class="btn btn-ghost" id="srch-back">← Back to Items</button>`:''}
      <button class="btn btn-ghost" data-action="close">Close</button>
    </div>`, true);

    document.getElementById('stock-search')?.addEventListener('input', applyStockFilter);
    document.querySelectorAll('.srch-cat-chip').forEach(chip => {
      chip.onclick = () => { srchCat = srchCat===chip.dataset.cat ? null : chip.dataset.cat; applyStockFilter(); };
    });
    // Restore chip highlight state after re-render
    if (srchCat) applyStockFilter();

    document.getElementById('srch-back')?.addEventListener('click', () => { selectedItem=null; renderSearch(); });
    document.querySelectorAll('.item-card').forEach(c => { c.onclick = () => { selectedItem=items.find(i=>i.id===parseInt(c.dataset.id)); renderSearch(); }; });
    document.querySelectorAll('.srch-issue-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        openIssueFlow(null, selectedItem.id, parseInt(btn.dataset.issueSize));
      });
    });
  }

  function renderSizes() {
    const stockMap={}; (S.stock||[]).forEach(s=>{stockMap[`${s.item_id}-${s.size_id}`]=s.quantity;});
    const sizes=selectedItem.sizes.map(s=>({...s,qty:stockMap[`${selectedItem.id}-${s.id}`]??0}));
    const good=sizes.filter(s=>s.qty>3).sort((a,b)=>b.qty-a.qty);
    const low=sizes.filter(s=>s.qty>0&&s.qty<=3).sort((a,b)=>b.qty-a.qty);
    const outOfStock=sizes.filter(s=>s.qty===0);
    const inStockCount=good.length+low.length;
    return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div><div style="font-family:var(--head);font-size:28px;letter-spacing:0.04em;color:var(--blue)">${selectedItem.short_name}</div><div style="font-size:12px;color:var(--text3)">${selectedItem.name}</div></div>
      <div style="text-align:right"><div style="font-size:24px;font-weight:800;color:${inStockCount>0?'var(--green)':'var(--red)'}">${inStockCount}</div><div style="font-size:11px;font-family:var(--mono);color:var(--text3)">SIZES IN STOCK</div></div>
    </div>
    ${good.length>0?`<div class="section-label">In Stock</div><div class="size-grid">${good.map(s=>`<div style="padding:10px 14px;border:1.5px solid var(--green);border-radius:6px;background:var(--green-light);text-align:center"><div style="font-family:var(--mono);font-size:13px;font-weight:600;color:var(--green)">${s.size_label}</div><div style="font-size:18px;font-weight:800;color:var(--green)">${s.qty}</div><div style="font-size:10px;color:var(--green);opacity:0.7">in stock</div><button class="btn btn-primary srch-issue-btn" data-issue-size="${s.id}" style="margin-top:8px;font-size:11px;padding:4px 10px;width:100%">Issue</button></div>`).join('')}</div>`:''}
    ${low.length>0?`<div class="section-label" style="margin-top:${good.length?'14px':'0'};color:#d97706">⚠ Low Stock</div><div class="size-grid">${low.map(s=>`<div style="padding:10px 14px;border:1.5px solid #d97706;border-radius:6px;background:var(--amber-light,#fef3c7);text-align:center"><div style="font-family:var(--mono);font-size:13px;font-weight:600;color:#92400e">${s.size_label}</div><div style="font-size:18px;font-weight:800;color:#d97706">${s.qty}</div><div style="font-size:10px;color:#d97706;opacity:0.8">low stock</div><button class="btn btn-primary srch-issue-btn" data-issue-size="${s.id}" style="margin-top:8px;font-size:11px;padding:4px 10px;width:100%">Issue</button></div>`).join('')}</div>`:''}
    ${outOfStock.length>0?`<div class="section-label" style="margin-top:${(good.length||low.length)?'14px':'0'}">Out of Stock</div><div class="size-grid">${outOfStock.map(s=>`<div style="padding:10px 14px;border:1.5px solid var(--border);border-radius:6px;background:var(--bg2);text-align:center;opacity:0.6"><div style="font-family:var(--mono);font-size:13px;color:var(--text3)">${s.size_label}</div><div style="font-size:13px;color:var(--red);font-weight:700">Out</div></div>`).join('')}</div>`:''}
    ${inStockCount===0?`<div class="alert alert-warning" style="margin-top:12px">⚠ No sizes of this item are currently in stock.</div>`:''}`;
  }

  renderSearch();
}
